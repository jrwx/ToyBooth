<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #eee; overflow-x: hidden; }
        
        /* --- หน้าแรก: โหมดกล้อง --- */
        #camera-page { display: block; padding-top: 30px; }
        #booth-machine { position: relative; width: 340px; margin: 0 auto; background: #333; padding: 12px; border-radius: 15px; border: 4px solid #555; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        #main-display { position: relative; width: 310px; height: 310px; margin: 0 auto; background: #000; overflow: hidden; border: 2px solid #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .cam-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: 'VT323', monospace; color: #fff; }
        .cam-top-right { position: absolute; top: 10px; right: 10px; color: #f00; animation: blink 1s infinite; }
        .cam-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; opacity: 0.2; }
        .cam-grid div { border: 0.5px solid #fff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #shutter-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 20; pointer-events: none; }
        .timer-overlay { font-family: 'Press Start 2P', cursive; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 30; font-size: 50px; display: none; }

        /* --- ป๊อปอัพรอสักครู่ --- */
        #loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            font-family: 'VT323'; font-size: 30px; color: #fff; letter-spacing: 2px;
        }

        /* --- หน้าสอง: โหมดใบเสร็จ (ไหลจากขอบบนหน้าว่าง) --- */
        #print-page { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; background: #000; 
            z-index: 999; overflow-y: auto; scrollbar-width: none; 
        }
        #print-page::-webkit-scrollbar { display: none; }

        .receipt-paper { 
            position: relative; width: 300px; 
            background: #fdfaf5; margin: 0 auto 50px auto;
            transform: translateY(-100%); 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        
        .printing-act { animation: slideDownSmooth 7s linear forwards; }
        
        @keyframes slideDownSmooth { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(0); } 
        }

        #result-img { width: 100%; display: block; mix-blend-mode: multiply; }
        .torn-edge { width: 100%; height: 15px; background: #000; clip-path: polygon(0% 100%, 5% 15%, 10% 100%, 15% 20%, 20% 100%, 25% 15%, 30% 100%, 35% 25%, 40% 100%, 45% 15%, 50% 100%, 55% 20%, 60% 100%, 65% 15%, 70% 100%, 75% 25%, 80% 100%, 85% 15%, 90% 100%, 95% 20%, 100% 100%); }

        /* ปุ่มกดและฟิลเตอร์ */
        .controls { margin-top: 20px; }
        .filter-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .f-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px; font-size: 9px; cursor: pointer; font-family: 'Press Start 2P', cursive; border-radius: 8px; }
        .f-btn.active { background: #fff; color: #000; }
        
        .btn-snap { background: #ff3e3e; color: #fff; padding: 20px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: none; width: 260px; cursor: pointer; border-radius: 50px; box-shadow: 0 6px 0 #b32a2a; }
        .btn-action { background: #fff; color: #000; padding: 18px; font-family: 'Press Start 2P', cursive; font-size: 12px; border: none; width: 280px; margin-top: 20px; cursor: pointer; border-radius: 10px; box-shadow: 0 6px 0 #ccc; display: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">รอสักครู่นะจ๊ะ...<br>กำลังปริ้นท์ใบเสร็จ</div>

    <div id="camera-page">
        <div style="font-family: 'VT323', monospace; font-size: 30px; margin-bottom: 20px; color: #fff; letter-spacing: 3px;">JARAWEE PHOTO BOOTH</div>
        <div id="booth-machine">
            <div id="main-display">
                <div class="cam-ui">
                    <div class="cam-top-right">● REC</div>
                    <div class="cam-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
                </div>
                <div id="shutter-flash"></div>
                <video id="video" autoplay playsinline muted></video>
                <div id="timer-num" class="timer-overlay">3</div>
            </div>
        </div>
        <div class="controls">
            <div class="filter-nav">
                <button class="f-btn active" onclick="updateFilter('none', this)">ปกติ</button>
                <button class="f-btn" onclick="updateFilter('kodak', this)">โกดัก</button>
                <button class="f-btn" onclick="updateFilter('bw', this)">ขาวดำ</button>
                <button class="f-btn" onclick="updateFilter('vintage', this)">ซีเปีย</button>
            </div>
            <button class="btn-snap" id="btn-snap" onclick="startCapture()">SHOT</button>
        </div>
    </div>

    <div id="print-page">
        <div class="receipt-paper" id="receipt-paper">
            <img id="result-img">
            <div class="torn-edge"></div>
        </div>
        <button class="btn-action" id="btn-save" onclick="sharePhoto()">เซฟรูปใบเสร็จ (PNG)</button>
        <button class="btn-action" id="btn-retake" style="background:#444; color:#fff; box-shadow:0 6px 0 #222;" onclick="location.reload()">ถ่ายใหม่</button>
        <div style="height: 60px;"></div>
    </div>

    <canvas id="c" width="600" height="1520" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const flash = document.getElementById('shutter-flash');
        const tNum = document.getElementById('timer-num');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const camPage = document.getElementById('camera-page');
        const printPage = document.getElementById('print-page');
        const loading = document.getElementById('loading-overlay');
        const receiptPaper = document.getElementById('receipt-paper');
        
        let currentBlob = null;
        let currentFilterStyle = 'none';
        let stream = null;

        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = stream;
            } catch (e) { alert("กรุณาอนุญาตให้เข้าถึงกล้องครับ"); }
        }
        init();

        function updateFilter(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let fs = 'none';
            if(mode === 'kodak') fs = 'contrast(1.2) saturate(1.5) sepia(0.1)';
            else if(mode === 'bw') fs = 'grayscale(1) contrast(1.4)';
            else if(mode === 'vintage') fs = 'sepia(0.8) contrast(1.1)';
            v.style.filter = fs;
            currentFilterStyle = fs;
        }

        async function startCapture() {
            const photos = [];
            document.getElementById('btn-snap').style.display = 'none';

            for (let i = 0; i < 2; i++) {
                tNum.style.display = 'block';
                for (let j = 3; j > 0; j--) { tNum.innerText = j; await new Promise(r => setTimeout(r, 1000)); }
                tNum.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const tmp = document.createElement('canvas');
                tmp.width = 420; tmp.height = 420;
                const tCtx = tmp.getContext('2d');
                tCtx.filter = currentFilterStyle;
                tCtx.translate(420, 0); tCtx.scale(-1, 1);
                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 420, 420);
                
                photos.push(tmp);
                if(i === 0) await new Promise(r => setTimeout(r, 1200)); 
            }
            
            // แสดงป๊อปอัพรอสักครู่
            loading.style.display = 'flex';
            setTimeout(() => {
                if(stream) stream.getTracks().forEach(track => track.stop());
                generateFinalReceipt(photos);
            }, 1500);
        }

        function generateFinalReceipt(photos) {
            const orderNo = Math.floor(100000 + Math.random() * 900000);
            ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Texture
            for(let i=0; i<8000; i++) { ctx.fillStyle = `rgba(0,0,0,0.05)`; ctx.fillRect(Math.random()*600, Math.random()*1520, 1.2, 1.2); }

            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = "bold 70px 'VT323'"; ctx.fillText("Congrats!!", 300, 100);
            ctx.font = "30px 'VT323'"; ctx.fillText("To Jarawee <3", 300, 145);
            ctx.font = "20px monospace"; ctx.fillText("==============================", 300, 180);

            // Order No ชิดซ้าย (ย้ายมาตรงนี้)
            ctx.textAlign = "left"; 
            ctx.font = "22px 'VT323'"; ctx.fillText("Order No: #" + orderNo, 90, 215);

            photos.forEach((img, i) => {
                const y = (i * 440) + 240;
                ctx.drawImage(img, 90, y, 420, 420);
                ctx.strokeStyle = "#444"; ctx.lineWidth = 1.5; ctx.strokeRect(90, y, 420, 420);
            });

            ctx.font = "bold 24px Sarabun"; ctx.fillText("รายการ: ค่ารักเอ็ง ฮี่ๆๆ ;-)", 90, 1150);
            
            // บาร์โค้ด
            ctx.fillStyle = "#111"; const bx = 90; const by = 1220;
            for(let k=0; k<70; k++) { let w = [2, 4, 7][Math.floor(Math.random()*3)]; ctx.fillRect(bx + (k*6), by, w, 80); }
            
            ctx.textAlign = "center"; 
            ctx.font = "bold 28px 'VT323'"; ctx.fillText(new Date().toLocaleString('th-TH'), 300, 1360);
            ctx.font = "18px 'VT323'"; ctx.fillText("*** THANK YOU - LOVE YOU ***", 300, 1410);

            // ตัดขอบหยัก
            const tornCanvas = document.createElement('canvas');
            tornCanvas.width = canvas.width; tornCanvas.height = canvas.height;
            const tCtx = tornCanvas.getContext('2d');
            tCtx.beginPath(); tCtx.moveTo(0, 0);
            tCtx.lineTo(canvas.width, 0);
            tCtx.lineTo(canvas.width, canvas.height - 15);
            for (let i = canvas.width; i > 0; i -= 12) {
                tCtx.lineTo(i - 6, canvas.height);
                tCtx.lineTo(i - 12, canvas.height - 15);
            }
            tCtx.closePath(); tCtx.clip();
            tCtx.drawImage(canvas, 0, 0);

            tornCanvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
                startPrinting();
            }, 'image/png');
        }

        function startPrinting() {
            loading.style.display = 'none';
            camPage.style.display = 'none'; // ซ่อนหน้ากล้อง
            printPage.style.display = 'block'; // แสดงหน้าปริ้นท์ว่างๆ
            receiptPaper.classList.add('printing-act');
            
            // แสดงป๊อปอัพเซฟหลังจากไหลเสร็จ
            setTimeout(() => { 
                document.getElementById('btn-save').style.display = 'inline-block';
                document.getElementById('btn-retake').style.display = 'inline-block';
            }, 7200);
        }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "jarawee_receipt.png", {type:"image/png"});
            if (navigator.share) await navigator.share({ files: [f] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "jarawee_receipt.png"; a.click(); }
        }
    </script>
</body>
</html>
