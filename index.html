<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Realistic Receipt</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper-bg: #fdfdfd; }
        body { background-color: #c0c0c0; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 20px 0; color: #333; }
        
        /* กล้อง */
        #video-container { 
            position: relative; width: 300px; height: 300px; margin: 0 auto; 
            border: 5px solid #000; background: #000; overflow: hidden;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .timer { 
            font-family: 'Press Start 2P', cursive; font-size: 50px; position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: white; z-index: 10;
        }

        /* ปุ่มกด */
        .btn { 
            background: #000; color: #fff; padding: 15px; font-family: 'Press Start 2P', cursive; 
            font-size: 10px; border: none; margin-top: 20px; width: 85%; cursor: pointer;
        }
        
        /* ส่วนเลือกฟิลเตอร์ */
        .filter-group { display: none; margin-top: 15px; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .f-btn { 
            background: #eee; border: 2px solid #000; padding: 10px; font-size: 8px; 
            cursor: pointer; font-family: 'Press Start 2P', cursive;
        }
        .f-btn.active { background: #000; color: #fff; }

        /* ผลลัพธ์ใบเสร็จ */
        #result-area { display: none; margin-top: 30px; position: relative; padding-bottom: 80px; }
        
        /* Texture กระดาษใบเสร็จ */
        #paper-overlay {
            position: relative; display: inline-block; width: 85%; max-width: 500px;
            background: var(--paper-bg);
            /* สร้างรอยกระดาษยับและ Grain */
            background-image: 
                linear-gradient(30deg, rgba(0,0,0,0.02) 12%, transparent 12.5%, transparent 87%, rgba(0,0,0,0.02) 87.5%, rgba(0,0,0,0.02)),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.5), rgba(0,0,0,0.05));
            box-shadow: 2px 5px 20px rgba(0,0,0,0.3);
            padding: 1px;
        }
        
        #result-img { width: 100%; display: block; mix-blend-mode: multiply; }
    </style>
</head>
<body>

    <div style="font-family: 'Press Start 2P', cursive; font-size: 10px; margin-bottom: 20px;">[ JARAWEE FILM BOOTH ]</div>
    
    <div id="video-container">
        <div id="timer" class="timer">3</div>
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <button class="btn" id="btn-snap" onclick="startCapture()">[ มาถ่ายเริ่ดๆ ]</button>

    <div id="filter-selection" class="filter-group">
        <button class="f-btn active" onclick="applyFilter('normal', this)">ORIGINAL</button>
        <button class="f-btn" onclick="applyFilter('kodak', this)">KODAK 400</button>
        <button class="f-btn" onclick="applyFilter('fuji', this)">FUJI 200</button>
        <button class="f-btn" onclick="applyFilter('bw', this)">NOIR B&W</button>
        <button class="f-btn" onclick="applyFilter('sepia', this)">1970s</button>
    </div>

    <div id="result-area">
        <div id="paper-overlay">
            <img id="result-img">
        </div>
        <br>
        <button class="btn" style="background:#1a73e8;" onclick="sharePhoto()">[ เอารูปไปจ่ะ ]</button>
    </div>

    <canvas id="c" width="600" height="1600" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let currentBlob = null;
        let rawPhotos = []; 

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = s;
                v.play();
            } catch (e) { alert("Please allow camera access via HTTPS"); }
        }
        init();

        async function startCapture() {
            rawPhotos = [];
            const timer = document.getElementById('timer');
            document.getElementById('btn-snap').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('filter-selection').style.display = 'none';

            for (let i = 0; i < 2; i++) {
                timer.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timer.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                timer.innerText = "!"; await new Promise(r => setTimeout(r, 300));
                timer.style.display = 'none';

                const tmp = document.createElement('canvas');
                tmp.width = 480; tmp.height = 480;
                const tCtx = tmp.getContext('2d');
                tCtx.translate(480, 0); tCtx.scale(-1, 1);
                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 480, 480);
                rawPhotos.push(tmp);
            }

            drawReceipt('normal');
            document.getElementById('filter-selection').style.display = 'flex';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('btn-snap').style.display = 'inline-block';
            document.getElementById('btn-snap').innerText = "[ เอาใหม่ ]";
        }

        function drawReceipt(filter) {
            // พื้นหลังกระดาษขาวอมเหลืองนิดๆ
            ctx.fillStyle = "#fdfdfd"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // ใส่เม็ดสีกระดาษ (Grain)
            for (let i = 0; i < 5000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.05})`;
                ctx.fillRect(Math.random() * 600, Math.random() * 1600, 1, 1);
            }

            ctx.fillStyle = "black"; ctx.textAlign = "center";
            ctx.font = "38px 'Press Start 2P'"; ctx.fillText("CONGRATULATIONS", 300, 100);
            ctx.font = "20px 'Press Start 2P'"; ctx.fillText("To Jarawee <3", 300, 150);
            
            ctx.font = "20px monospace"; ctx.fillText("----------------------------", 300, 195);

            rawPhotos.forEach((img, i) => {
                const x = 60; const y = (i * 510) + 230;
                ctx.save();
                // ตั้งค่าโทนฟิล์ม
                if(filter === 'kodak') ctx.filter = 'contrast(1.2) saturate(1.5) sepia(0.2)';
                else if(filter === 'fuji') ctx.filter = 'contrast(1.1) hue-rotate(-15deg) saturate(1.2)';
                else if(filter === 'bw') ctx.filter = 'grayscale(1) contrast(1.4)';
                else if(filter === 'sepia') ctx.filter = 'sepia(0.8) contrast(1.1) brightness(0.9)';
                
                ctx.drawImage(img, x, y, 480, 480);
                
                // ใส่ขอบฟิล์มจางๆ
                ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 2;
                ctx.strokeRect(x, y, 480, 480);
                ctx.restore();
            });

            ctx.textAlign = "left"; ctx.font = "700 28px Sarabun";
            ctx.fillText("รายการ: ค่ารักเอ็ง 3000 บาท", 65, 1280);
            
            // บาร์โค้ด
            ctx.fillStyle = "black";
            const bx = 130; const by = 1330;
            for(let k=0; k<70; k++) {
                let w = [1, 3, 5][Math.floor(Math.random()*3)];
                ctx.fillRect(bx + (k*5), by, w, 80);
            }
            
            ctx.textAlign = "center"; ctx.font = "14px monospace";
            ctx.fillText(new Date().toLocaleString('th-TH'), 300, 1470);
            ctx.fillText("THANK YOU FOR THE LOVE", 300, 1500);

            // รอยหยักท้ายใบเสร็จ
            ctx.beginPath(); ctx.moveTo(0, 1600);
            for(let m=0; m<600; m+=20) { ctx.lineTo(m+10, 1585); ctx.lineTo(m+20, 1600); }
            ctx.fillStyle = "#c0c0c0"; ctx.fill();

            canvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
            }, 'image/jpeg', 0.95);
        }

        function applyFilter(type, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            drawReceipt(type);
        }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "jarawee-receipt.jpg", {type:"image/jpeg"});
            if (navigator.share) await navigator.share({ files: [f] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "jarawee.jpg"; a.click(); }
        }
    </script>
</body>
</html>
