<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth - Video Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #ff3e3e; --video-accent: #00ff88; --text-dim: #a0a0a0; }
        body { background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #fff; overflow-x: hidden; }

        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'VT323'; font-size: 28px; letter-spacing: 2px; margin-bottom: 25px; color: #a0a0a0; text-transform: uppercase; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .m-btn { background: #333; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase; }
        .m-btn.active { background: var(--accent); box-shadow: 0 0 15px rgba(255, 62, 62, 0.4); }

        #booth-machine { position: relative; width: 100%; max-width: 360px; background: var(--card-bg); padding: 8px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        #display-box { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; border-radius: 15px; border: 3px solid #333; }
        
        #display-box video {
            position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; object-fit: cover !important; transform: scaleX(-1); z-index: 1;
        }

        #booth-machine.news-mode { max-width: 400px; }
        #display-box.news-mode { aspect-ratio: 1000/1400 !important; background: #e3dccb; }
        #display-box.news-mode video { width: 80% !important; height: 32.14% !important; left: 14.5% !important; top: 24.28% !important; }

        #preview-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 5; object-fit: fill; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 10; pointer-events: none; }
        .timer { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 11; font-size: 70px; display: none; font-family: 'Press Start 2P'; text-shadow: 4px 4px 0px #000; }
        #rec-indicator { position: absolute; top: 20px; right: 20px; color: red; font-family: 'VT323'; z-index: 12; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .controls { margin-top: 25px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; }
        .action-btns { display: flex; gap: 10px; }
        .btn-snap { background: var(--accent); color: #fff; padding: 18px; font-size: 16px; font-weight: bold; border: none; flex: 1; border-radius: 100px; cursor: pointer; text-transform: uppercase; }
        .btn-video { background: #333; color: #fff; padding: 18px; font-size: 16px; font-weight: bold; border: 2px solid var(--video-accent); flex: 1; border-radius: 100px; cursor: pointer; text-transform: uppercase; }
        .btn-video.recording { background: var(--video-accent); color: #000; }

        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: auto; padding-bottom: 100px; }
        .result-container { margin: 40px auto; width: 90%; max-width: 350px; }
        #result-img, #result-video { width: 100%; display: block; border-radius: 5px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        #final-actions { position: fixed; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 110; }
        .btn-save { background: #fff; color: #000; padding: 15px 30px; font-size: 12px; font-weight: bold; border: none; border-radius: 100px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">Jarawee Studio</div>
        
        <div class="mode-selector">
            <button class="m-btn active" id="btn-m-receipt" onclick="changeMode('receipt')">Receipt</button>
            <button class="m-btn" id="btn-m-news" onclick="changeMode('news')">Newspaper</button>
        </div>

        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <img id="preview-overlay" src="https://raw.githubusercontent.com/jrwx/my-booth/refs/heads/main/harry.PNG">
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
                <div id="rec-indicator">● REC</div>
            </div>
        </div>

        <div class="controls">
            <div class="action-btns">
                <button class="btn-snap" id="snap-btn" onclick="takePhotos()">Take Photo</button>
                <button class="btn-video" id="vid-btn" onclick="toggleVideo()">Record Video</button>
            </div>
        </div>
    </div>

    <div id="print-page">
        <div class="result-container" id="res-cont">
            <img id="result-img" style="display:none;">
            <video id="result-video" controls style="display:none;"></video>
        </div>
        <div id="final-actions">
            <button class="btn-save" onclick="saveToDevice()">Save to Gallery</button>
            <button class="btn-save" style="background: #333; color: #fff;" onclick="location.reload()">Back</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const resultVid = document.getElementById('result-video');
        const recIndicator = document.getElementById('rec-indicator');
        
        let currentMode = 'receipt';
        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];
        let finalFileUrl = null;
        let newsFrame = new Image();
        newsFrame.crossOrigin = "anonymous";
        newsFrame.src = 'https://raw.githubusercontent.com/jrwx/my-booth/refs/heads/main/harry.PNG';

        const NEWS_FILTER = 'grayscale(1) contrast(1.5) brightness(0.8)';

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
            video.srcObject = stream;
        }
        init();

        function changeMode(mode) {
            currentMode = mode;
            const booth = document.getElementById('booth-machine');
            const display = document.getElementById('display-box');
            document.getElementById('btn-m-receipt').classList.toggle('active', mode === 'receipt');
            document.getElementById('btn-m-news').classList.toggle('active', mode === 'news');
            
            if (mode === 'news') {
                booth.classList.add('news-mode');
                display.classList.add('news-mode');
                document.getElementById('preview-overlay').style.display = 'block';
                video.style.filter = NEWS_FILTER;
            } else {
                booth.classList.remove('news-mode');
                display.classList.remove('news-mode');
                document.getElementById('preview-overlay').style.display = 'none';
                video.style.filter = 'none';
            }
        }

        // --- Photo Logic ---
        async function takePhotos() {
            const pics = [];
            const count = (currentMode === 'news') ? 1 : 2;
            for(let i=0; i<count; i++) {
                document.getElementById('timer').style.display = 'block';
                for(let s=3; s>0; s--) { document.getElementById('timer').innerText = s; await new Promise(r => setTimeout(r, 1000)); }
                document.getElementById('timer').style.display = 'none';
                document.getElementById('flash').style.opacity = '1'; setTimeout(() => document.getElementById('flash').style.opacity = '0', 100);
                
                const pCanvas = document.createElement('canvas');
                pCanvas.width = video.videoWidth; pCanvas.height = video.videoHeight;
                const pCtx = pCanvas.getContext('2d');
                if(currentMode === 'news') pCtx.filter = NEWS_FILTER;
                pCtx.translate(pCanvas.width, 0); pCtx.scale(-1, 1);
                pCtx.drawImage(video, 0, 0);
                pics.push(pCanvas);
            }
            if(currentMode === 'news') buildNews(pics[0]); else buildReceipt(pics);
        }

        function buildNews(pic) {
            canvas.width = 1000; canvas.height = 1400;
            ctx.fillStyle = "#e3dccb"; ctx.fillRect(0,0,1000,1400);
            ctx.drawImage(pic, 0, 0, pic.width, pic.height, 145, 340, 800, 450);
            if(newsFrame.complete) ctx.drawImage(newsFrame, 0,0,1000,1400);
            showResult('img');
        }

        function buildReceipt(pics) {
            canvas.width = 600; canvas.height = 1200;
            ctx.fillStyle = "#fff"; ctx.fillRect(0,0,600,1200);
            pics.forEach((p, i) => ctx.drawImage(p, 0, 0, p.width, p.height, 50, 50 + (i*500), 500, 450));
            showResult('img');
        }

        // --- Video Logic ---
        function toggleVideo() {
            if(!isRecording) startRecording(); else stopRecording();
        }

        function startRecording() {
            recordedChunks = [];
            const stream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                finalFileUrl = URL.createObjectURL(blob);
                resultVid.src = finalFileUrl;
                showResult('vid');
            };
            mediaRecorder.start();
            isRecording = true;
            recIndicator.style.display = 'block';
            document.getElementById('vid-btn').classList.add('recording');
            document.getElementById('vid-btn').innerText = "Stop (Max 10s)";
            setTimeout(() => { if(isRecording) stopRecording(); }, 10000);
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            recIndicator.style.display = 'none';
            document.getElementById('vid-btn').classList.remove('recording');
            document.getElementById('vid-btn').innerText = "Record Video";
        }

        // --- Finalize ---
        function showResult(type) {
            document.getElementById('camera-ui').style.display = 'none';
            document.getElementById('print-page').style.display = 'block';
            if(type === 'img') {
                finalFileUrl = canvas.toDataURL('image/png');
                resultImg.src = finalFileUrl;
                resultImg.style.display = 'block';
                resultVid.style.display = 'none';
            } else {
                resultVid.style.display = 'block';
                resultImg.style.display = 'none';
            }
        }

        function saveToDevice() {
            const link = document.createElement('a');
            link.href = finalFileUrl;
            link.download = currentMode + (resultVid.style.display === 'block' ? '_video.webm' : '_photo.png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
