<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Smooth Top-Down</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background-color: #a5a5a5; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 10px 0; color: #333; overflow-x: hidden; }
        #booth-machine { position: relative; width: 330px; margin: 20px auto; background: #222; padding: 10px; border-radius: 12px; border: 5px solid #000; box-shadow: 0 25px 50px rgba(0,0,0,0.6); z-index: 10; }
        #video-container { position: relative; width: 310px; height: 310px; margin: 0 auto; background: #000; overflow: hidden; border: 4px solid #111; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #shutter-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 20; pointer-events: none; }
        .timer-overlay { font-family: 'Press Start 2P', cursive; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; z-index: 10; text-shadow: 0 0 10px #000; text-align: center; width: 100%; }
        #timer-num { font-size: 50px; display: none; }
        #timer-msg { font-size: 10px; display: none; background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid white; }
        #printer-slot { width: 280px; height: 12px; background: #000; margin: 10px auto 0; border-radius: 20px; border-bottom: 4px solid #333; position: relative; z-index: 5; }
        #print-area { position: relative; width: 100%; display: none; justify-content: center; margin-top: -5px; z-index: 1; overflow: hidden; }
        
        /* กระดาษใบเสร็จที่เริ่มต้นอยู่สูง (ซ่อนตัว) */
        .receipt-paper { position: relative; width: 260px; background: #fdfaf5; box-shadow: 0 5px 20px rgba(0,0,0,0.3); transform: translateY(-100%); margin-bottom: 30px;}
        
        /* การไหลจากบนลงล่างแบบสมูท 6.5 วินาที */
        .printing-act { animation: slideOutTopDown 6.5s linear forwards; }
        
        @keyframes slideOutTopDown { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(0); } 
        }

        #result-img { width: 100%; display: block; filter: contrast(1.1); mix-blend-mode: multiply; opacity: 0.95; }
        .torn-edge { position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; background: #a5a5a5; clip-path: polygon(0% 100%, 5% 15%, 10% 100%, 15% 20%, 20% 100%, 25% 15%, 30% 100%, 35% 25%, 40% 100%, 45% 15%, 50% 100%, 55% 20%, 60% 100%, 65% 15%, 70% 100%, 75% 25%, 80% 100%, 85% 15%, 90% 100%, 95% 20%, 100% 100%); }
        .filter-nav { display: flex; justify-content: center; gap: 5px; margin: 15px 0; flex-wrap: wrap; }
        .f-btn { background: #eee; border: 1px solid #444; padding: 10px 12px; font-size: 8px; cursor: pointer; font-family: 'Press Start 2P', cursive; border-radius: 4px; }
        .f-btn.active { background: #000; color: #fff; }
        .btn-main { background: #d00; color: #fff; padding: 18px; font-family: 'Press Start 2P', cursive; font-size: 11px; border: none; margin-top: 15px; width: 85%; cursor: pointer; border-radius: 50px; box-shadow: 0 6px 0 #800; transition: 0.1s; }
        #action-buttons { display: none; margin-top: 25px; padding-bottom: 100px; }
    </style>
</head>
<body>

    <div style="font-family: 'VT323', monospace; font-size: 30px; margin-top: 20px; color: #eee; letter-spacing: 3px;">JARAWEE PHOTO SERVICE</div>

    <div id="booth-machine">
        <div id="video-container">
            <div id="shutter-flash"></div>
            <div class="timer-overlay">
                <div id="timer-msg">READY?</div>
                <div id="timer-num">3</div>
            </div>
            <video id="video" autoplay playsinline muted></video>
        </div>
        <div id="printer-slot"></div>
    </div>

    <div id="print-area">
        <div class="receipt-paper" id="receipt-paper">
            <img id="result-img">
            <div class="torn-edge"></div>
        </div>
    </div>

    <div class="filter-nav" id="filter-box">
        <button class="f-btn active" onclick="updateFilter('none', this)">ปกติ</button>
        <button class="f-btn" onclick="updateFilter('kodak', this)">โกดัก</button>
        <button class="f-btn" onclick="updateFilter('bw', this)">ขาวดำ</button>
        <button class="f-btn" onclick="updateFilter('vintage', this)">ซีเปีย</button>
    </div>
    
    <button class="btn-main" id="btn-snap" onclick="startCapture()">SHOT</button>

    <div id="action-buttons">
        <button class="btn-main" style="background:#222; box-shadow: 0 6px 0 #000;" onclick="sharePhoto()">SAVE RECEIPT (PNG)</button>
        <br>
        <button class="btn-main" style="background:#666; box-shadow: 0 6px 0 #333;" onclick="resetBooth()">RETAKE</button>
    </div>

    <canvas id="c" width="600" height="1520" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const flash = document.getElementById('shutter-flash');
        const tNum = document.getElementById('timer-num');
        const tMsg = document.getElementById('timer-msg');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const printArea = document.getElementById('print-area');
        const receiptPaper = document.getElementById('receipt-paper');
        const actionButtons = document.getElementById('action-buttons');
        
        let currentBlob = null;
        let currentFilterStyle = 'none';
        let stream = null;

        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = stream;
            } catch (e) { alert("กรุณาเปิดกล้อง!"); }
        }
        init();

        function updateFilter(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let fs = 'none';
            if(mode === 'kodak') fs = 'contrast(1.2) saturate(1.5) sepia(0.1)';
            else if(mode === 'bw') fs = 'grayscale(1) contrast(1.4)';
            else if(mode === 'vintage') fs = 'sepia(0.8) contrast(1.1) saturate(0.8)';
            v.style.filter = fs;
            currentFilterStyle = fs;
        }

        async function startCapture() {
            const photos = [];
            document.getElementById('btn-snap').style.display = 'none';
            document.getElementById('filter-box').style.opacity = '0';

            for (let i = 0; i < 2; i++) {
                tMsg.style.display = 'block'; tMsg.innerText = i === 0 ? "POSE 1" : "POSE 2";
                await new Promise(r => setTimeout(r, 1500));
                tMsg.style.display = 'none'; tNum.style.display = 'block';
                for (let j = 3; j > 0; j--) { tNum.innerText = j; await new Promise(r => setTimeout(r, 1000)); }
                tNum.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const tmp = document.createElement('canvas');
                tmp.width = 420; tmp.height = 420;
                const tCtx = tmp.getContext('2d');
                tCtx.filter = currentFilterStyle;
                tCtx.translate(420, 0); tCtx.scale(-1, 1);
                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 420, 420);
                
                // Add minor noise texture but keep filter colors
                tCtx.globalCompositeOperation = 'source-atop';
                tCtx.fillStyle = 'rgba(0,0,0,0.05)';
                for(let y=0; y<420; y+=2) { for(let x=0; x<420; x+=2) { if(Math.random()>0.9) tCtx.fillRect(x,y,1,1); } }
                tCtx.globalCompositeOperation = 'source-over';
                
                photos.push(tmp);
                if(i === 0) await new Promise(r => setTimeout(r, 1000)); 
            }
            v.style.opacity = "0"; if(stream) stream.getTracks().forEach(track => track.stop());
            generateFinalReceipt(photos);
        }

        function generateFinalReceipt(photos) {
            const orderNo = Math.floor(100000 + Math.random() * 900000);
            ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<8000; i++) { ctx.fillStyle = `rgba(0,0,0,0.06)`; ctx.fillRect(Math.random()*600, Math.random()*1520, 1.2, 1.2); }

            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = "bold 65px 'VT323'"; ctx.fillText("Congrats!!", 300, 100);
            ctx.font = "30px 'VT323'"; ctx.fillText("To Jarawee <3", 300, 145);
            ctx.font = "20px monospace"; ctx.fillText("==============================", 300, 180);

            // Order No ใต้เส้นประ ชิดซ้าย
            ctx.textAlign = "left"; 
            ctx.font = "18px 'VT323'"; ctx.fillText("Order No: #" + orderNo, 90, 215);

            photos.forEach((img, i) => {
                const y = (i * 440) + 240;
                ctx.drawImage(img, 90, y, 420, 420);
                ctx.strokeStyle = "#333"; ctx.lineWidth = 1; ctx.strokeRect(90, y, 420, 420);
            });

            ctx.font = "bold 24px Sarabun"; ctx.fillText("รายการ: ค่ารักเอ็ง ฮี่ๆๆ ;-)", 90, 1150);
            
            ctx.fillStyle = "#111"; const bx = 90; const by = 1220;
            for(let k=0; k<70; k++) { let w = [2, 4, 6][Math.floor(Math.random()*3)]; ctx.fillRect(bx + (k*6), by, w, 80); }
            
            ctx.textAlign = "center"; 
            ctx.font = "bold 28px 'VT323'"; ctx.fillText(new Date().toLocaleString('th-TH'), 300, 1360);
            ctx.font = "18px 'VT323'"; ctx.fillText("*** THANK YOU - LOVE YOU ***", 300, 1410);

            // แปลงเป็น PNG แบบมีรอยฉีก
            const tornCanvas = document.createElement('canvas');
            tornCanvas.width = canvas.width; tornCanvas.height = canvas.height;
            const tCtx = tornCanvas.getContext('2d');
            tCtx.beginPath(); tCtx.moveTo(0, 0);
            for (let i = 0; i < tornCanvas.width; i += 12) {
                tCtx.lineTo(i + 6, tornCanvas.height - 15);
                tCtx.lineTo(i + 12, tornCanvas.height);
            }
            tCtx.lineTo(tornCanvas.width, tornCanvas.height); tCtx.lineTo(tornCanvas.width, 0);
            tCtx.closePath(); tCtx.clip();
            tCtx.drawImage(canvas, 0, 0);

            tornCanvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
                startPrinting();
            }, 'image/png');
        }

        function startPrinting() {
            printArea.style.display = 'flex';
            receiptPaper.classList.add('printing-act');
            
            // รอจนกว่าจะไหลเสร็จ (ประมาณ 6 วินาที) แล้วค่อยโชว์ปุ่ม
            setTimeout(() => { 
                actionButtons.style.display = 'block'; 
                actionButtons.scrollIntoView({ behavior: 'smooth' }); 
            }, 6800);
        }

        function resetBooth() { location.reload(); }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "jarawee_print.png", {type:"image/png"});
            if (navigator.share) await navigator.share({ files: [f] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "jarawee_print.png"; a.click(); }
        }
    </script>
</body>
</html>
