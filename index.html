<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Jarawee Pro Booth - Fixed</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{--bg-color:#121212;--card-bg:#1e1e1e;--accent:#ff3e3e;--text-dim:#a0a0a0}
body{background:#121212;font-family:'Sarabun',sans-serif;text-align:center;margin:0;color:#fff;overflow-x:hidden}
#camera-ui{padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.header-title{font-family:'VT323';font-size:28px;margin-bottom:25px;color:#a0a0a0}
.mode-selector{display:flex;gap:10px;margin-bottom:25px}.m-btn{background:#333;color:#fff;border:none;padding:12px 24px;border-radius:10px}.m-btn.active{background:var(--accent)}
#booth-machine{width:100%;max-width:360px;background:#1e1e1e;padding:8px;border-radius:20px}
#display-box{position:relative;width:100%;aspect-ratio:1/1;background:#000;overflow:hidden;border-radius:15px}
#display-box video{position:absolute;inset:0;width:100%!important;height:100%!important;object-fit:cover!important;transform:scaleX(-1)}
#preview-overlay{position:absolute;inset:0;display:none;width:100%;height:100%;object-fit:fill}
#flash{position:absolute;inset:0;background:#fff;opacity:0;transition:opacity .08s ease}
.timer{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:70px;display:none;font-family:'Press Start 2P'}
.controls{margin-top:25px;width:100%;max-width:360px}.btn-snap{background:var(--accent);color:#fff;padding:22px;border:none;width:100%;border-radius:100px}

/* FIXED PRINT AREA */
#print-page{display:none;position:fixed;inset:0;background:#000;z-index:100;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding-bottom:40px}
.printer-shell{display:flex;flex-direction:column;align-items:center}
.printer-top{width:340px;height:88px;background:linear-gradient(to bottom,#2d2d2d,#111);border-radius:0 0 18px 18px;position:relative;z-index:30}
.printer-slot{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);width:300px;height:12px;background:#000;border-radius:10px;box-shadow:inset 0 2px 6px rgba(0,0,0,.9)}
.paper-window{width:300px;overflow:hidden;margin-top:-2px}
.print-container{width:100%;transform:translateY(-94%)}
.flow-animation{animation:printReceiptOut 4.8s linear forwards}
@keyframes printReceiptOut{from{transform:translateY(-94%)}to{transform:translateY(0)}}
.news-roll{animation:newspaperUnroll 2.8s ease forwards}
@keyframes newspaperUnroll{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
#result-img{width:100%;display:block;box-shadow:0 0 70px rgba(0,0,0,1)}
#final-actions{margin-top:18px;width:100%;display:none;text-align:center}
.btn-save{background:rgba(255,255,255,.9);color:#000;padding:16px 32px;border:none;border-radius:100px;margin:8px}
</style>
</head>
<body>
<div id="camera-ui">
  <div class="header-title">Congratulations to Jarawee!</div>
  <div id="booth-machine">
    <div id="display-box">
      <video id="video" autoplay playsinline muted></video>
      <img id="preview-overlay" src="https://raw.githubusercontent.com/jrwx/my-booth/refs/heads/main/harry.PNG">
      <div id="flash"></div>
      <div id="timer" class="timer">3</div>
    </div>
  </div>
  <div class="controls">
    <button class="btn-snap" id="snap-btn" onclick="takePhotos()">กดถ่ายเลย!</button>
  </div>
</div>

<div id="print-page">
  <div class="printer-shell">
    <div class="printer-top"><div class="printer-slot"></div></div>
    <div class="paper-window">
      <div class="print-container" id="print-cont"><img id="result-img"></div>
    </div>
  </div>
  <div id="final-actions">
    <button class="btn-save" onclick="saveImage()">เซฟรูปภาพ</button>
    <button class="btn-save" onclick="location.reload()">ถ่ายใหม่</button>
  </div>
</div>

<canvas id="canvas" style="display:none"></canvas>
<script>
const video=document.getElementById('video');
const timer=document.getElementById('timer');
const flash=document.getElementById('flash');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const resultImg=document.getElementById('result-img');
const printPage=document.getElementById('print-page');
const printCont=document.getElementById('print-cont');
const finalActions=document.getElementById('final-actions');
let finalBlob=null;

const printSound=new Audio('https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c9d6d4f5f.mp3?filename=receipt-printer-110021.mp3');
printSound.volume=0.45;

async function startCam(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
    video.srcObject=stream;
  }catch(e){alert('กรุณาเปิดกล้องจ้า')}
}
startCam();

async function takePhotos(){
  timer.style.display='block';
  for(let s=3;s>0;s--){timer.innerText=s;await new Promise(r=>setTimeout(r,1000));}
  timer.style.display='none';
  flash.style.opacity='1';setTimeout(()=>flash.style.opacity='0',100);

  const pCanvas=document.createElement('canvas');
  pCanvas.width=video.videoWidth;
  pCanvas.height=video.videoHeight;
  const pCtx=pCanvas.getContext('2d');
  pCtx.translate(pCanvas.width,0);pCtx.scale(-1,1);
  pCtx.drawImage(video,0,0);
  buildReceipt2(pCanvas);
}

function buildReceipt2(pic){
  canvas.width=600;canvas.height=930;
  ctx.fillStyle='#fdfaf5';ctx.fillRect(0,0,600,930);
  const s=Math.min(pic.width,pic.height);
  const sx=(pic.width-s)/2; const sy=(pic.height-s)/2;
  ctx.drawImage(pic,sx,sy,s,s,100,155,400,400);
  ctx.strokeStyle='#222';ctx.strokeRect(100,155,400,400);
  ctx.font='bold 28px monospace';ctx.fillStyle='#111';ctx.fillText('RECEIPT',70,600);
  ctx.font='18px monospace';ctx.textAlign='center';ctx.fillText('THANK YOU FOR BEING TOGETHER <3',300,845);
  renderFinal();
}

function renderFinal(){
  canvas.toBlob((blob)=>{
    finalBlob=blob;
    resultImg.src=URL.createObjectURL(blob);
    document.getElementById('camera-ui').style.display='none';
    printPage.style.display='flex';
    finalActions.style.display='none';
    printCont.classList.remove('flow-animation','news-roll');
    void printCont.offsetWidth;
    setTimeout(()=>{
      printCont.classList.add('flow-animation');
      printSound.currentTime=0;
      printSound.play().catch(()=>{});
    },200);
    setTimeout(()=>{
      finalActions.style.display='block';
      printSound.pause();
    },4800);
  },'image/png');
}

async function saveImage(){
  if(!finalBlob) return;
  const file=new File([finalBlob],'jarawee_receipt.png',{type:'image/png'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:'Jarawee Booth'});return;}catch(e){}
  }
  const a=document.createElement('a');a.href=resultImg.src;a.download='jarawee_receipt.png';a.click();
}
</script>
</body>
</html>
