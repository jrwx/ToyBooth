<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Real-time Receipt</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --paper-color: #fdfdfd; }
        body { background-color: #b0b0b0; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 10px 0; color: #333; }
        
        /* หัวข้อ */
        .header-text { font-family: 'Press Start 2P', cursive; font-size: 10px; margin: 15px 0; color: #222; }

        /* กล้องและฟิลเตอร์ Real-time */
        #video-container { 
            position: relative; width: 320px; height: 320px; margin: 0 auto; 
            border: 6px solid #1a1a1a; background: #000; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.3s ease; }
        
        /* ฟิลเตอร์ต่างๆ */
        .f-normal { filter: scaleX(-1); }
        .f-kodak { filter: scaleX(-1) contrast(1.2) saturate(1.4) sepia(0.25); }
        .f-fuji { filter: scaleX(-1) contrast(1.1) hue-rotate(-15deg) saturate(1.2) brightness(1.05); }
        .f-bw { filter: scaleX(-1) grayscale(1) contrast(1.3); }
        .f-sepia { filter: scaleX(-1) sepia(0.8) contrast(1.1) brightness(0.9); }

        .timer { 
            font-family: 'Press Start 2P', cursive; font-size: 60px; position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: white; z-index: 10;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* กลุ่มปุ่มเลือกฟิลเตอร์หน้าแรก */
        .filter-nav { display: flex; justify-content: center; gap: 5px; margin-top: 15px; padding: 0 10px; flex-wrap: wrap; }
        .filter-dot { 
            background: #eee; border: 2px solid #333; padding: 8px 12px; font-size: 8px; 
            cursor: pointer; font-family: 'Press Start 2P', cursive; transition: 0.2s;
        }
        .filter-dot.active { background: #333; color: #fff; transform: translateY(-3px); }

        .btn-main { 
            background: #1a1a1a; color: #fff; padding: 18px; font-family: 'Press Start 2P', cursive; 
            font-size: 12px; border: none; margin-top: 20px; width: 85%; cursor: pointer;
            box-shadow: 0 5px 0 #000; transition: 0.1s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }

        /* การแสดงผลใบเสร็จ */
        #result-area { display: none; margin-top: 30px; padding-bottom: 80px; }
        
        /* ตัวใบเสร็จสมจริง */
        .receipt-paper {
            position: relative; display: inline-block; width: 90%; max-width: 450px;
            background: var(--paper-color);
            background-image: 
                repeating-linear-gradient(rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 1px, transparent 2px),
                radial-gradient(circle at 50% 0%, rgba(255,255,255,0.8), transparent);
            box-shadow: 5px 15px 35px rgba(0,0,0,0.2);
            padding-bottom: 20px;
            overflow: hidden;
        }
        
        #result-img { width: 100%; display: block; mix-blend-mode: multiply; }

        /* รอยฉีกกระดาษด้านล่าง */
        .torn-edge {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 15px;
            background: #b0b0b0; /* สีพื้นหลังเว็บ */
            clip-path: polygon(0% 100%, 5% 40%, 10% 100%, 15% 40%, 20% 100%, 25% 40%, 30% 100%, 35% 40%, 40% 100%, 45% 40%, 50% 100%, 55% 40%, 60% 100%, 65% 40%, 70% 100%, 75% 40%, 80% 100%, 85% 40%, 90% 100%, 95% 40%, 100% 100%);
        }
    </style>
</head>
<body>

    <div class="header-text">[ REAL-TIME FILM RECEIPT ]</div>
    
    <div id="video-container">
        <div id="timer" class="timer">3</div>
        <video id="video" class="f-normal" autoplay playsinline muted></video>
    </div>

    <div class="filter-nav">
        <div class="filter-dot active" onclick="setLiveFilter('normal', this)">NORMAL</div>
        <div class="filter-dot" onclick="setLiveFilter('kodak', this)">KODAK</div>
        <div class="filter-dot" onclick="setLiveFilter('fuji', this)">FUJI</div>
        <div class="filter-dot" onclick="setLiveFilter('bw', this)">B&W</div>
        <div class="filter-dot" onclick="setLiveFilter('sepia', this)">SEPIA</div>
    </div>
    
    <button class="btn-main" id="btn-snap" onclick="startCapture()">[ SHOOT NOW ]</button>

    <div id="result-area">
        <div class="receipt-paper">
            <img id="result-img">
            <div class="torn-edge"></div>
        </div>
        <br>
        <button class="btn-main" style="background:#28a745; box-shadow: 0 5px 0 #1e7e34;" onclick="sharePhoto()">[ SAVE RECEIPT ]</button>
    </div>

    <canvas id="c" width="600" height="1580" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let currentBlob = null;
        let selectedFilter = 'normal';

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = s;
            } catch (e) { alert("Please allow camera access!"); }
        }
        init();

        // เปลี่ยนฟิลเตอร์ Real-time
        function setLiveFilter(filter, el) {
            selectedFilter = filter;
            v.className = 'f-' + filter;
            document.querySelectorAll('.filter-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        async function startCapture() {
            const timer = document.getElementById('timer');
            const photos = [];
            document.getElementById('btn-snap').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';

            for (let i = 0; i < 2; i++) {
                timer.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timer.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                timer.innerText = "!"; await new Promise(r => setTimeout(r, 300));
                timer.style.display = 'none';

                const tmp = document.createElement('canvas');
                tmp.width = 480; tmp.height = 480;
                const tCtx = tmp.getContext('2d');
                tCtx.translate(480, 0); tCtx.scale(-1, 1);
                
                // ใช้ Filter เดียวกับที่เลือกไว้บนหน้าจอลงในรูปที่ถ่าย
                if(selectedFilter === 'kodak') tCtx.filter = 'contrast(1.2) saturate(1.4) sepia(0.25)';
                else if(selectedFilter === 'fuji') tCtx.filter = 'contrast(1.1) hue-rotate(-15deg) saturate(1.2) brightness(1.05)';
                else if(selectedFilter === 'bw') tCtx.filter = 'grayscale(1) contrast(1.3)';
                else if(selectedFilter === 'sepia') tCtx.filter = 'sepia(0.8) contrast(1.1) brightness(0.9)';

                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 480, 480);
                photos.push(tmp);
            }

            drawFinalReceipt(photos);
        }

        function drawFinalReceipt(photos) {
            // พื้นหลังกระดาษขาว + Grain ละเอียด
            ctx.fillStyle = "#fdfdfd"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 8000; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.04})`;
                ctx.fillRect(Math.random() * 600, Math.random() * 1580, 1, 1);
            }

            ctx.fillStyle = "black"; ctx.textAlign = "center";
            ctx.font = "36px 'Press Start 2P'"; ctx.fillText("CONGRATULATIONS", 300, 100);
            ctx.font = "20px 'Press Start 2P'"; ctx.fillText("to jarawee <3", 300, 150);
            ctx.font = "20px monospace"; ctx.fillText("----------------------------", 300, 200);

            photos.forEach((img, i) => {
                const y = (i * 510) + 240;
                ctx.drawImage(img, 60, y, 480, 480);
                // ขอบรูปบางๆ ให้ดูเหมือนพิมพ์ลงกระดาษ
                ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.strokeRect(60, y, 480, 480);
            });

            // ส่วนท้าย
            ctx.textAlign = "left"; ctx.font = "700 28px Sarabun";
            ctx.fillText("รายการ: ค่ารักเอ็ง 3000 บาท", 65, 1280);
            
            // บาร์โค้ด
            ctx.fillStyle = "black";
            const bx = 135; const by = 1320;
            for(let k=0; k<66; k++) {
                let w = [1, 3, 5][Math.floor(Math.random()*3)];
                ctx.fillRect(bx + (k*5), by, w, 85);
            }
            
            ctx.textAlign = "center"; ctx.font = "14px monospace";
            ctx.fillText(new Date().toLocaleString('th-TH'), 300, 1460);
            ctx.fillText("THANK YOU FOR THE LOVE", 300, 1490);

            canvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
                document.getElementById('result-area').style.display = 'block';
                document.getElementById('btn-snap').style.display = 'inline-block';
                document.getElementById('btn-snap').innerText = "[ TAKE NEW ]";
            }, 'image/jpeg', 0.95);
        }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "jarawee-film.jpg", {type:"image/jpeg"});
            if (navigator.share) await navigator.share({ files: [f] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "jarawee.jpg"; a.click(); }
        }
    </script>
</body>
</html>
