<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Story Photobooth</title>
    <style>
        body { background-color: #71C5EE; font-family: sans-serif; text-align: center; margin: 0; color: white; }
        #video { width: 90%; max-width: 400px; border: 10px solid #FFD700; border-radius: 20px; margin-top: 20px; }
        .timer { font-size: 80px; font-weight: bold; color: #E63946; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); display: none; text-shadow: 3px 3px 0 #FFD700; z-index: 10; }
        .btn { background: #FFD700; color: #004AAD; padding: 20px 40px; font-size: 24px; border-radius: 50px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 0 #b89b00; }
        #result { display: none; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 90%; }
    </style>
</head>
<body>
    <h1>🎬 TOY STORY BOOTH</h1>
    <div id="timer" class="timer">3</div>
    <video id="video" autoplay playsinline></video>
    
    <canvas id="c" width="800" height="1600" style="display:none;"></canvas>
    
    <br>
    <button class="btn" id="btn" onclick="start()">กดเพื่อถ่ายรูป (2 ช่อง)</button>
    <br>
    <img id="result">
    <p id="msg" style="display:none; color: #004AAD;"><b>เสร็จแล้ว! กดค้างที่รูปเพื่อบันทึกไปปริ้นท์</b></p>

    <script>
        const v = document.getElementById('video');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const timer = document.getElementById('timer');
        const resImg = document.getElementById('result');
        const btn = document.getElementById('btn');

        // --- ตั้งค่ารูปกรอบของคุณที่นี่ ---
        // ถ้าคุณอัปโหลดไฟล์ชื่อ frame.png ไว้ใน GitHub ที่เดียวกัน ให้ใช้ "./frame.png"
        const frameSrc = "./frame.png"; 
        
        const frameImg = new Image();
        frameImg.src = frameSrc;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => v.srcObject = s);

        async function start() {
            btn.style.display = 'none';
            resImg.style.display = 'none';
            document.getElementById('msg').style.display = 'none';
            
            // เคลียร์ Canvas เก่า
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < 2; i++) {
                timer.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timer.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                timer.innerText = "แชะ!";
                
                // ถ่ายรูปแปะลง Canvas (ปรับตำแหน่งความสูงตามต้องการ)
                // รูปที่ 1 อยู่ที่ความสูง 150, รูปที่ 2 อยู่ที่ความสูง 850 (เว้นที่ว่างให้กรอบ)
                ctx.drawImage(v, 100, (i * 700) + 150, 600, 600); 
                
                await new Promise(r => setTimeout(r, 500));
                timer.style.display = 'none';
            }
            
            // --- ขั้นตอนสำคัญ: แปะกรอบทับ ---
            // รอให้รูปกรอบโหลดเสร็จก่อน (ปกติโหลดเสร็จตั้งแต่เปิดเว็บ)
            if (frameImg.complete) {
                ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
            } else {
                alert("รูปกรอบยังโหลดไม่เสร็จ กรุณารอสักครู่แล้วลองใหม่");
            }
            
            // แสดงผลลัพธ์
            resImg.src = canvas.toDataURL('image/jpeg', 0.8);
            resImg.style.display = 'inline-block';
            document.getElementById('msg').style.display = 'block';
            btn.style.display = 'inline-block';
            btn.innerText = "ถ่ายใหม่";
        }
    </script>
</body>
</html>
