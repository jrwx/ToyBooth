<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Official Receipt - Congrats Jang</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #e0e0e0; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 20px 0; color: #333; }
        #video-container { 
            position: relative; width: 300px; height: 300px; margin: 0 auto; 
            border: 6px solid #333; border-radius: 10px; overflow: hidden; background: #000; 
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: grayscale(100%); }
        .timer { 
            font-size: 80px; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); display: none; 
            font-weight: bold; z-index: 10; -webkit-text-stroke: 1px white;
        }
        .btn { 
            background: #333; color: white; padding: 15px 30px; font-size: 18px; 
            border-radius: 5px; border: none; font-weight: bold; 
            margin-top: 20px; width: 80%; cursor: pointer;
        }
        #result-area { display: none; margin-top: 20px; padding-bottom: 50px; }
        #result-img { width: 85%; border-radius: 0; box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

    <div style="font-family: 'Caveat', cursive; font-size: 45px; color: #333; margin-bottom: -10px;">Congratulations</div>
    <div style="font-size: 20px; font-weight: bold; margin-bottom: 15px;">SAO JANG</div>
    
    <div id="video-container">
        <div id="timer" class="timer">3</div>
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <button class="btn" id="btn-snap" onclick="startCapture()">📸 ถ่ายรูปกันเล้ย!!</button>

    <div id="result-area">
        <img id="result-img">
        <br>
        <button class="btn" style="background:#28a745;" onclick="sharePhoto()">💾 เอารูปไปเลยจ้าา</button>
    </div>

    <canvas id="c" width="600" height="1550" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        let currentBlob = null;

        async function init() {
            try {
                // ซ่อมตรงนี้: ใส่ปีกกาและค่าให้ครบ
                const constraints = { 
                    video: { facingMode: "user" }, 
                    audio: false 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                v.srcObject = stream;
                v.onloadedmetadata = () => { v.play(); };
            } catch (e) { 
                console.error("Camera error:", e);
                alert("กล้องไม่ทำงาน! กรุณาเช็คการอนุญาตสิทธิ์กล้อง หรือเปิดผ่าน Safari/Chrome นะครับ"); 
            }
        }
        init();

        async function startCapture() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const timerEl = document.getElementById('timer');
            
            document.getElementById('btn-snap').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';

            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "black"; ctx.textAlign = "center";
            ctx.font = "700 80px Caveat"; ctx.fillText("Congratulations", 300, 100);
            ctx.font = "700 28px Sarabun"; ctx.fillText("OFFICIAL CELEBRATION RECEIPT", 300, 150);
            ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(50, 175); ctx.lineTo(550, 175); ctx.stroke();

            for (let i = 0; i < 2; i++) {
                timerEl.style.display = 'block';
                const colors = ["#004AAD", "#E63946", "#FFD700"];
                for (let j = 3; j > 0; j--) {
                    timerEl.innerText = j;
                    timerEl.style.color = colors[j-1];
                    await new Promise(r => setTimeout(r, 1000));
                }
                timerEl.innerText = "GO!"; timerEl.style.color = "green";
                await new Promise(r => setTimeout(r, 400));
                timerEl.style.display = 'none';

                const pSize = 460; const x = 70; const y = (i * 500) + 210;
                ctx.save();
                ctx.translate(x + pSize, y); ctx.scale(-1, 1);
                ctx.filter = 'grayscale(100%)';
                const min = Math.min(v.videoWidth, v.videoHeight);
                const sx = (v.videoWidth - min) / 2;
                const sy = (v.videoHeight - min) / 2;
                ctx.drawImage(v, sx, sy, min, min, 0, 0, pSize, pSize);
                ctx.restore();
            }

            ctx.textAlign = "left"; ctx.font = "700 30px Sarabun"; ctx.fillText("รายการ: ค่ารักเอ็ง", 70, 1280);
            ctx.textAlign = "right"; ctx.font = "700 45px Sarabun"; ctx.fillText("3000 นะจ๊ะ", 530, 1350);
            ctx.textAlign = "center"; ctx.font = "400 20px Sarabun";
            ctx.fillText("--------------------------------------------------", 300, 1400);
            const d = new Date(); ctx.font = "400 16px Sarabun";
            ctx.fillText("ออกเมื่อ: " + d.toLocaleString('th-TH'), 300, 1480);

            canvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
                document.getElementById('result-area').style.display = 'block';
                document.getElementById('btn-snap').style.display = 'inline-block';
                document.getElementById('btn-snap').innerText = "ถ่ายใหม่อีกครั้ง";
            }, 'image/jpeg', 0.95);
        }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "receipt.jpg", {type:"image/jpeg"});
            if (navigator.share) {
                try { await navigator.share({ files: [f] }); } catch (e) {}
            } else {
                const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "receipt.jpg"; a.click();
            }
        }
    </script>
</body>
</html>
