<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth - Ultimate Ultimate Newspaper</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Courier+Prime:wght@400;700&family=Sarabun:wght@300;400;700&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #ff3e3e; --text-dim: #a0a0a0; }
        body { background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #fff; overflow-x: hidden; }

        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'VT323'; font-size: 28px; letter-spacing: 2px; margin-bottom: 25px; color: #a0a0a0; text-transform: uppercase; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .m-btn { background: #333; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase; }
        .m-btn.active { background: var(--accent); box-shadow: 0 0 15px rgba(255, 62, 62, 0.4); }

        #booth-machine { position: relative; width: 100%; max-width: 360px; background: var(--card-bg); padding: 8px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        #display-box { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; border-radius: 15px; border: 3px solid #333; transition: 0.3s ease; }
        #display-box.news-mode { aspect-ratio: 3/4; }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: 0.3s ease; }
        
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 10; pointer-events: none; transition: 0.1s; }
        .timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 11; font-size: 70px; display: none; font-weight: bold; }

        .controls { margin-top: 25px; width: 100%; max-width: 360px; }
        #news-themes { display: none; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .sub-btn { background: #2a2a2a; color: #aaa; border: 1px solid #444; padding: 8px 12px; font-size: 8px; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .sub-btn.active { border-color: #fff; color: #fff; background: #444; }

        .filter-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; pointer-events: auto; opacity: 1; transition: 0.2s; }
        .f-btn { background: transparent; color: var(--text-dim); border: 2px solid #333; width: 60px; height: 60px; border-radius: 50%; font-size: 9px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; transform: scale(1.1); }
        
        .btn-snap { background: var(--accent); color: #fff; padding: 22px; font-size: 18px; font-weight: bold; border: none; width: 100%; border-radius: 100px; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 62, 62, 0.4); text-transform: uppercase; transition: 0.2s; }

        /* Print Overlay */
        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; }
        .print-container { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); width: 90%; max-width: 300px; }
        .flow-animation { animation: slideDownPaper 7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDownPaper { 0% { transform: translate(-50%, -100%); } 100% { transform: translate(-50%, 40px); } }

        #result-img { width: 100%; display: block; height: auto; box-shadow: 0 0 70px rgba(0,0,0,1); }
        #final-actions { position: absolute; bottom: 50px; left: 0; width: 100%; display: none; text-align: center; animation: fadeIn 1s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-save { background: rgba(255, 255, 255, 0.9); color: #000; padding: 16px 32px; font-size: 11px; font-weight: bold; border: none; border-radius: 100px; cursor: pointer; margin: 8px; backdrop-filter: blur(5px); text-transform: uppercase; }
        .btn-retry { background: rgba(40, 40, 40, 0.8); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">CHOOSE YOUR FRAME</div>
        
        <div class="mode-selector">
            <button class="m-btn active" id="btn-m-receipt" onclick="changeMode('receipt')">Receipt Strip</button>
            <button class="m-btn" id="btn-m-news" onclick="changeMode('news')">Newspaper Page</button>
        </div>

        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
            </div>
        </div>

        <div class="controls">
            <div id="news-themes">
                <button class="sub-btn active" onclick="setNewsTheme(1, this)">DAILY PROPHET</button>
                <button class="sub-btn" onclick="setNewsTheme(2, this)">VINTAGE POST</button>
                <button class="sub-btn" onclick="setNewsTheme(3, this)">THE CHRONICLE</button>
            </div>

            <div class="filter-group">
                <button class="f-btn active" id="f-norm" onclick="setF('none', this)">Normal</button>
                <button class="f-btn" id="f-film" onclick="setF('kodak', this)">Film</button>
                <button class="f-btn" id="f-bw" onclick="setF('bw', this)">B&W</button>
            </div>
            <button class="btn-snap" id="snap-btn" onclick="takePhotos()">กดถ่ายเลย!</button>
        </div>
    </div>

    <div id="print-page">
        <div class="print-container" id="print-cont">
            <img id="result-img">
        </div>
        <div id="final-actions">
            <button class="btn-save" onclick="saveImage()">เซฟรูปภาพ</button>
            <button class="btn-save btn-retry" onclick="location.reload()">ถ่ายใหม่</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const timer = document.getElementById('timer');
        const flash = document.getElementById('flash');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const printPage = document.getElementById('print-page');
        const printCont = document.getElementById('print-cont');
        const finalActions = document.getElementById('final-actions');

        let filterStyle = 'none';
        let currentMode = 'receipt'; 
        let newsTheme = 1;
        let finalBlob = null;

        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch(e) { alert("Please grant camera access!"); }
        }
        startCam();

        function changeMode(mode) {
            currentMode = mode;
            document.getElementById('btn-m-receipt').classList.toggle('active', mode === 'receipt');
            document.getElementById('btn-m-news').classList.toggle('active', mode === 'news');
            document.getElementById('display-box').classList.toggle('news-mode', mode === 'news');
            
            const newsSub = document.getElementById('news-themes');
            const filterGroup = document.querySelector('.filter-group');

            if(mode === 'news') {
                newsSub.style.display = 'flex';
                // บังคับฟิลเตอร์ขาวดำในพรีวิวเมื่อเลือก NEWS
                setF('bw', document.getElementById('f-bw'));
                filterGroup.style.pointerEvents = 'none';
                filterGroup.style.opacity = '0.5';
            } else {
                newsSub.style.display = 'none';
                filterGroup.style.pointerEvents = 'auto';
                filterGroup.style.opacity = '1';
                setF('none', document.querySelectorAll('.f-btn')[0]);
            }
        }

        function setNewsTheme(t, btn) {
            newsTheme = t;
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setF(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'none') filterStyle = 'none';
            else if(mode === 'kodak') filterStyle = 'contrast(1.2) saturate(1.4) sepia(0.1)';
            else if(mode === 'bw') filterStyle = 'grayscale(1) contrast(1.4) brightness(1.1)'; // ขาวดำที่คมชัดขึ้นสำหรับหนังสือพิมพ์
            video.style.filter = filterStyle;
        }

        async function takePhotos() {
            const pics = [];
            document.getElementById('snap-btn').style.opacity = '0';
            document.getElementById('snap-btn').style.pointerEvents = 'none';

            // หนังสือพิมพ์เอาแค่ 1 รูป, ใบเสร็จเอา 2 รูปตามเดิม
            const photoCount = (currentMode === 'news') ? 1 : 2;

            for(let i=0; i<photoCount; i++) {
                timer.style.display = 'block';
                for(let s=3; s>0; s--) { timer.innerText = s; await new Promise(r => setTimeout(r, 1000)); }
                timer.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const pCanvas = document.createElement('canvas');
                pCanvas.width = 600; pCanvas.height = (currentMode === 'news') ? 750 : 600;
                const pCtx = pCanvas.getContext('2d');
                pCtx.filter = filterStyle;
                
                // กลับด้านภาพ (Mirror)
                pCtx.translate(pCanvas.width, 0); 
                pCtx.scale(-1, 1);
                
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                const targetAspect = pCanvas.width / pCanvas.height;
                let sW, sH, sX, sY;

                // Center Crop Logic เพื่อแก้ปัญหาภาพบีบ
                if (vW/vH > targetAspect) {
                    sH = vH;
                    sW = vH * targetAspect;
                    sX = (vW - sW) / 2;
                    sY = 0;
                } else {
                    sW = vW;
                    sH = vW / targetAspect;
                    sX = 0;
                    sY = (vH - sH) / 2;
                }

                pCtx.drawImage(video, sX, sY, sW, sH, 0, 0, pCanvas.width, pCanvas.height);
                pics.push(pCanvas);
                if(i < photoCount - 1) await new Promise(r => setTimeout(r, 1000));
            }
            
            if(currentMode === 'receipt') buildReceipt(pics);
            else buildNewspaper(pics
