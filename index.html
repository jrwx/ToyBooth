<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth - Global Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Press+Start+2P&family=Roboto:wght@300;400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #d32f2f;
            --text-main: #f0f0f0;
            --text-dim: #999999;
        }

        body { background-color: var(--bg-color); font-family: 'Roboto', sans-serif; text-align: center; margin: 0; padding: 0; color: var(--text-main); overflow-x: hidden; }

        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 25px; color: #fff; letter-spacing: -1px; }

        /* ส่วนเลือกโหมดหลัก */
        .mode-selector { display: flex; gap: 12px; margin-bottom: 25px; }
        .m-btn { background: #2a2a2a; color: #fff; border: none; padding: 14px 24px; font-family: 'Roboto', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .m-btn.active { background: var(--accent); box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4); }

        #booth-machine { position: relative; width: 100%; max-width: 360px; background: var(--card-bg); padding: 10px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #333; }
        #display-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; border-radius: 12px; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 20; pointer-events: none; transition: opacity 0.1s; }
        .timer { font-family: 'Playfair Display', serif; font-weight: 700; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 30; font-size: 80px; display: none; text-shadow: 0 4px 20px rgba(0,0,0,0.7); }

        .controls { margin-top: 35px; width: 100%; max-width: 360px; }
        
        /* ตัวเลือกย่อยสำหรับหนังสือพิมพ์ */
        #news-themes { display: none; gap: 10px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .sub-btn { background: #222; color: #bbb; border: 1px solid #444; padding: 10px 16px; font-size: 10px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .sub-btn.active { border-color: #fff; color: #fff; background: #333; }

        .filter-group { display: flex; justify-content: center; gap: 18px; margin-bottom: 35px; }
        .f-btn { background: transparent; color: var(--text-dim); border: 2px solid #333; width: 64px; height: 64px; border-radius: 50%; font-size: 9px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        
        .btn-snap { background: var(--accent); color: #fff; padding: 22px; font-size: 18px; font-weight: 700; border: none; width: 100%; border-radius: 50px; cursor: pointer; box-shadow: 0 8px 25px rgba(211, 47, 47, 0.4); transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-snap:active { transform: scale(0.96); box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4); }

        /* Print Page Animation */
        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; }
        .print-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); width: 90%; max-width: 800px; }
        .print-paper { width: 100%; box-shadow: 0 10px 60px rgba(0,0,0,0.8); position: relative; background: #fdfaf5; border-radius: 4px; overflow: hidden; }
        .flow-animation { animation: slideInPaper 5s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes slideInPaper { 0% { transform: translate(-50%, -100%); } 100% { transform: translate(-50%, -50%); } }

        #result-img { width: 100%; display: block; height: auto; }
        #final-actions { position: absolute; bottom: 40px; left: 0; width: 100%; display: none; text-align: center; animation: fadeIn 1s ease forwards; z-index: 110; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-save { background: rgba(255, 255, 255, 0.95); color: #000; padding: 18px 36px; font-size: 12px; font-weight: 700; border: none; border-radius: 50px; cursor: pointer; margin: 10px; backdrop-filter: blur(5px); text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-retry { background: rgba(30, 30, 30, 0.9); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-save:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">Jarawee Pro Booth</div>
        
        <div class="mode-selector">
            <button class="m-btn active" id="mode-receipt" onclick="changeMainMode('receipt')">Receipt Strip</button>
            <button class="m-btn" id="mode-news" onclick="changeMainMode('news')">Newspaper Page</button>
        </div>

        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
            </div>
        </div>

        <div class="controls">
            <div id="news-themes">
                <button class="sub-btn active" onclick="setNewsTheme(1, this)">Modern Society</button>
                <button class="sub-btn" onclick="setNewsTheme(2, this)">Daily Chronicle</button>
                <button class="sub-btn" onclick="setNewsTheme(3, this)">The Prophet Style</button>
            </div>

            <div class="filter-group">
                <button class="f-btn active" id="f-norm" onclick="setF('none', this)">Normal</button>
                <button class="f-btn" id="f-film" onclick="setF('kodak', this)">Film</button>
                <button class="f-btn" id="f-bw" onclick="setF('bw', this)">B&W</button>
            </div>
            <button class="btn-snap" id="snap-btn" onclick="takePhotos()">Take the Shot!</button>
        </div>
    </div>

    <div id="print-page">
        <div class="print-container" id="print-cont">
            <div class="print-paper">
                <img id="result-img">
            </div>
        </div>
        <div id="final-actions">
            <button class="btn-save" onclick="saveImage()">Save to Gallery</button>
            <button class="btn-save btn-retry" onclick="location.reload()">Try Again</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const timer = document.getElementById('timer');
        const flash = document.getElementById('flash');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const printPage = document.getElementById('print-page');
        const printCont = document.getElementById('print-cont');
        const finalActions = document.getElementById('final-actions');

        let filterStyle = 'none';
        let currentMode = 'receipt'; 
        let newsTheme = 1;
        let stream;
        let finalBlob = null;

        async function startCam() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', aspectRatio: 16/9 } });
                video.srcObject = stream;
            } catch(e) { alert("Please grant camera access!"); }
        }
        startCam();

        function changeMainMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
            
            const newsSub = document.getElementById('news-themes');
            const filterGroup = document.querySelector('.filter-group');
            const displayBox = document.getElementById('display-box');

            if(mode === 'news') {
                newsSub.style.display = 'flex';
                displayBox.style.aspectRatio = '16/9';
                setF('bw', document.getElementById('f-bw'));
                filterGroup.style.pointerEvents = 'none';
                filterGroup.style.opacity = '0.5';
            } else {
                newsSub.style.display = 'none';
                displayBox.style.aspectRatio = '1/1';
                filterGroup.style.pointerEvents = 'auto';
                filterGroup.style.opacity = '1';
                setF('none', document.getElementById('f-norm'));
            }
        }

        function setNewsTheme(t, btn) {
            newsTheme = t;
