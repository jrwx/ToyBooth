<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Printing Booth</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #a5a5a5; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 10px 0; color: #333; overflow-x: hidden; }
        
        #profile-pic { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #111; margin: 10px auto 10px; object-fit: cover; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* กล่องกล้อง */
        #video-container { 
            position: relative; width: 310px; height: 310px; margin: 0 auto; 
            border: 6px solid #111; border-radius: 4px; background: #000; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); z-index: 10;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.2s; }
        
        /* เอฟเฟกต์แฟลช */
        #shutter-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 20; pointer-events: none; }

        .timer-overlay { 
            font-family: 'Press Start 2P', cursive; position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; z-index: 10; text-shadow: 0 0 10px #000; text-align: center; width: 100%;
        }
        #timer-num { font-size: 50px; display: none; }
        #timer-msg { font-size: 10px; display: none; background: rgba(0,0,0,0.6); padding: 8px; border: 2px solid white; }

        .filter-nav { display: flex; justify-content: center; gap: 4px; margin: 15px 0; flex-wrap: wrap; z-index: 5; position: relative; }
        .f-btn { background: #fff; border: 2px solid #222; padding: 8px 10px; font-size: 8px; cursor: pointer; font-family: 'Press Start 2P', cursive; }
        .f-btn.active { background: #000; color: #fff; transform: scale(1.05); }

        .btn-main { 
            background: #111; color: #fff; padding: 16px; font-family: 'Press Start 2P', cursive; 
            font-size: 11px; border: none; margin-top: 15px; width: 85%; cursor: pointer;
            box-shadow: 0 5px 0 #000; z-index: 5; position: relative;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }

        /* --- สไตล์สำหรับการปริ้นท์ใบเสร็จ --- */
        #print-area { 
            position: relative; margin-top: -10px; /* ให้เริ่มจากใต้กล้องพอดี */
            display: none; justify-content: center; z-index: 1; /* อยู่หลังกล้อง */
            perspective: 1000px; /* เพิ่มมิติ */
        }

        .receipt-paper {
            position: relative; width: 90%; max-width: 450px;
            background: #fdfdfd;
            background-image: linear-gradient(to right, rgba(0,0,0,0.02) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.02) 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding-bottom: 35px;
            
            /* อนิเมชันค่อยๆ เลื่อนออกมา */
            transform-origin: top center;
            transform: translateY(-100%) rotateX(-15deg); /* เริ่มจากซ่อนอยู่ด้านบน */
            opacity: 0;
        }

        /* Class สำหรับเริ่มอนิเมชันปริ้นท์ */
        .receipt-paper.printing {
            animation: printPaper 4s ease-out forwards; /* ใช้เวลา 4 วินาทีในการเลื่อนออก */
        }

        @keyframes printPaper {
            0% { transform: translateY(-100%) rotateX(-15deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(0) rotateX(0deg); opacity: 1; }
        }
        
        #result-img { width: 100%; display: block; mix-blend-mode: multiply; }
        .torn-edge {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 18px; background: #a5a5a5;
            clip-path: polygon(0% 100%, 3% 30%, 6% 100%, 9% 30%, 12% 100%, 15% 30%, 18% 100%, 21% 30%, 24% 100%, 27% 30%, 30% 100%, 33% 30%, 36% 100%, 39% 30%, 42% 100%, 45% 30%, 48% 100%, 51% 30%, 54% 100%, 57% 30%, 60% 100%, 63% 30%, 66% 100%, 69% 30%, 72% 100%, 75% 30%, 78% 100%, 81% 30%, 84% 100%, 87% 30%, 90% 100%, 93% 30%, 96% 100%, 100% 30%, 100% 100%);
        }
        
        #action-buttons { display: none; margin-top: 20px; padding-bottom: 80px; }
    </style>
</head>
<body>

    <img id="profile-pic" src="YOUR_IMAGE_URL_HERE" alt="Profile">

    <div style="font-family: 'Press Start 2P', cursive; font-size: 10px; margin-bottom: 15px;">[ JARAWEE LOVE YOU ]</div>
    
    <div id="video-container">
        <div id="shutter-flash"></div>
        <div class="timer-overlay">
            <div id="timer-msg">READY?</div>
            <div id="timer-num">3</div>
        </div>
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="filter-nav">
        <button class="f-btn active" onclick="updateFilter('none', this)">ปกติ</button>
        <button class="f-btn" onclick="updateFilter('kodak', this)">โกดัก</button>
        <button class="f-btn" onclick="updateFilter('fuji', this)">ฟูจิ</button>
        <button class="f-btn" onclick="updateFilter('bw', this)">ขาวดำ</button>
    </div>
    
    <button class="btn-main" id="btn-snap" onclick="startCapture()">[ เริ่มถ่ายรูป ]</button>

    <div id="print-area">
        <div class="receipt-paper" id="receipt-paper">
            <img id="result-img">
            <div class="torn-edge"></div>
        </div>
    </div>
    
    <div id="action-buttons">
        <button class="btn-main" style="background:#28a745; box-shadow: 0 5px 0 #1c7430;" onclick="sharePhoto()">[ บันทึกใบเสร็จ ]</button>
        <br>
        <button class="btn-main" id="btn-retake" onclick="resetBooth()">[ ถ่ายใหม่อีกรอบ ]</button>
    </div>

    <canvas id="c" width="600" height="1580" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const flash = document.getElementById('shutter-flash');
        const tNum = document.getElementById('timer-num');
        const tMsg = document.getElementById('timer-msg');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const printArea = document.getElementById('print-area');
        const receiptPaper = document.getElementById('receipt-paper');
        const actionButtons = document.getElementById('action-buttons');
        
        let currentBlob = null;
        let currentFilterStyle = 'none';

        // เสียงจำลองการปริ้นท์ (Thermal Printer Sound)
        // สร้างเสียงแบบ Web Audio API เพื่อความเสถียร
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playPrintSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(110, audioCtx.currentTime); // เสียงต่ำๆ ครืดๆ
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); // เสียงเบาๆ
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            // หยุดเสียงหลังจาก 3.5 วินาที (ก่อนอนิเมชันจบเล็กน้อย)
            setTimeout(() => oscillator.stop(), 3500);
        }

        async function init() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = s;
                v.play();
            } catch (e) { alert("Camera Error: Please use HTTPS"); }
        }
        init();

        function updateFilter(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let fs = 'none';
            if(mode === 'kodak') fs = 'contrast(1.2) saturate(1.4) sepia(0.2)';
            else if(mode === 'fuji') fs = 'contrast(1.1) hue-rotate(-15deg) saturate(1.2) brightness(1.05)';
            else if(mode === 'bw') fs = 'grayscale(1) contrast(1.3)';
            v.style.filter = fs;
            currentFilterStyle = fs;
        }

        async function startCapture() {
            const photos = [];
            // ซ่อนปุ่มและพื้นที่ใบเสร็จเก่า
            document.getElementById('btn-snap').style.display = 'none';
            document.querySelectorAll('.filter-nav, .header-text, #profile-pic').forEach(el => el.style.opacity = '0');
            printArea.style.display = 'none';
            receiptPaper.classList.remove('printing');
            actionButtons.style.display = 'none';

            for (let i = 0; i < 2; i++) {
                tMsg.style.display = 'block';
                tMsg.innerText = i === 0 ? "เตรียมตัว: รูปที่ 1" : "เตรียมตัว: รูปที่ 2";
                await new Promise(r => setTimeout(r, 1500));
                tMsg.style.display = 'none';

                tNum.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    tNum.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                tNum.style.display = 'none';

                // เอฟเฟกต์ชัตเตอร์
                flash.style.opacity = '1';
                setTimeout(() => flash.style.opacity = '0', 150);

                const tmp = document.createElement('canvas');
                tmp.width = 480; tmp.height = 480;
                const tCtx = tmp.getContext('2d');
                tCtx.translate(480, 0); tCtx.scale(-1, 1);
                tCtx.filter = currentFilterStyle; // บันทึกฟิลเตอร์ลงในรูป
                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 480, 480);
                photos.push(tmp);

                if(i === 0) await new Promise(r => setTimeout(r, 1200)); 
            }
            generateReceipt(photos);
        }

        function generateReceipt(photos) {
            ctx.fillStyle = "#fdfdfd"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            // ลายกระดาษจางๆ
            for (let i = 0; i < 5000; i++) {
                ctx.fillStyle = `rgba(0,0,0,0.05)`;
                ctx.fillRect(Math.random() * 600, Math.random() * 1580, 1, 1);
            }

            ctx.fillStyle = "black"; ctx.textAlign = "center";
            ctx.font = "36px 'Press Start 2P'"; ctx.fillText("CONGRATULATIONS", 300, 110);
            ctx.font = "20px 'Press Start 2P'"; ctx.fillText("to jarawee <3", 300, 165);
            ctx.font = "20px monospace"; ctx.fillText("----------------------------", 300, 210);

            photos.forEach((img, i) => {
                const y = (i * 510) + 250;
                ctx.drawImage(img, 60, y, 480, 480);
                ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.strokeRect(60, y, 480, 480);
            });

            ctx.textAlign = "left"; ctx.font = "700 30px Sarabun";
            ctx.fillText("รายการ: ค่ารักเอ็ง 3000 บาท", 65, 1285);
            
            ctx.fillStyle = "black";
            const bx = 135; const by = 1325;
            for(let k=0; k<66; k++) {
                let w = [1.5, 3, 5][Math.floor(Math.random()*3)];
                ctx.fillRect(bx + (k*5), by, w, 85);
            }
            
            ctx.textAlign = "center"; ctx.font = "14px monospace";
            ctx.fillText(new Date().toLocaleString('th-TH'), 300, 1465);
            ctx.fillText("THANK YOU FOR YOUR LOVE", 300, 1495);

            canvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
                startPrintingAnimation(); // เริ่มการปริ้นท์
            }, 'image/jpeg', 0.95);
        }

        function startPrintingAnimation() {
            // แสดงพื้นที่ใบเสร็จ
            printArea.style.display = 'flex';
            // เริ่มอนิเมชันเลื่อนออก
            setTimeout(() => {
                receiptPaper.classList.add('printing');
                playPrintSound(); // เล่นเสียงครืดๆ
            }, 100);

            // เมื่ออนิเมชันจบ (4 วินาที) แสดงปุ่มบันทึก
            setTimeout(() => {
                actionButtons.style.display = 'block';
                // เลื่อนหน้าจอลงไปที่ปุ่มบันทึก
                actionButtons.scrollIntoView({ behavior: 'smooth' });
            }, 4200);
        }

        function resetBooth() {
            // ล้างค่าสถานะและแสดงหน้าจอหลัก
            document.getElementById('btn-snap').style.display = 'inline-block';
            document.querySelectorAll('.filter-nav, .header-text, #profile-pic').forEach(el => el.style.opacity = '1');
            printArea.style.display = 'none';
            receiptPaper.classList.remove('printing');
            actionButtons.style.display = 'none';
            // เลื่อนหน้าจอกลับไปด้านบน
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "jarawee.jpg", {type:"image/jpeg"});
            if (navigator.share) await navigator.share({ files: [f] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "jarawee.jpg"; a.click(); }
        }
    </script>
</body>
</html>
