<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toy Story Booth 1:1</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Kanit:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #71C5EE; font-family: 'Fredoka One', 'Kanit', sans-serif; text-align: center; margin: 0; color: white; overflow-x: hidden; }
        
        h1 {
            font-size: 40px; color: #FFD700; margin: 15px 0; text-transform: uppercase;
            text-shadow: 3px 3px 0 #004AAD, -2px -2px 0 #004AAD, 2px -2px 0 #004AAD, -2px 2px 0 #004AAD;
        }

        #video-container { position: relative; width: 320px; height: 320px; margin: 10px auto; border: 8px solid #FFD700; border-radius: 20px; overflow: hidden; background: #000; }
        
        /* ฟลิปกล้องหน้าจอ Preview */
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* ตัวเลขย้ายมาไว้ข้างบน ไม่ให้บังหน้า */
        .timer { 
            font-size: 80px; color: #E63946; position: absolute; top: 10px; left: 50%; 
            transform: translateX(-50%); display: none; text-shadow: 4px 4px 0 #FFD700; z-index: 10; 
        }

        .btn { 
            background: #E63946; color: white; padding: 15px 35px; font-size: 20px; 
            border-radius: 50px; border: 4px solid #FFD700; font-weight: bold; 
            margin-top: 15px; cursor: pointer; box-shadow: 0 4px 0 #A61D24; width: 85%;
        }

        #result-area { display: none; margin-top: 15px; padding-bottom: 60px; }
        #result-img { max-width: 80%; border: 6px solid white; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>Toy Booth</h1>
    
    <div id="video-container">
        <div id="timer" class="timer">3</div>
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <button class="btn" id="btn-snap" onclick="startCapture()">📸 ถ่ายรูปเริ่ดๆ (1:1)</button>

    <div id="result-area">
        <img id="result-img">
        <br>
        <a id="download-link" class="btn" style="background:#28a745; text-decoration:none; display:inline-block;">💾 บันทึกรูปไปปริ้นท์</a>
    </div>

    <canvas id="c" width="800" height="1600" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const btnSnap = document.getElementById('btn-snap');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 720, height: 720 }, 
                    audio: false 
                });
                v.srcObject = stream;
            } catch (err) {
                alert("กรุณาเปิดใน Safari/Chrome และอนุญาตกล้องนะครับ");
            }
        }

        initCamera();

        async function startCapture() {
            const canvas = document.getElementById('c');
