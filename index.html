<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตู้ถ่ายรูปของ Jarawee</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Press+Start+2P&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #a5a5a5; font-family: 'Itim', cursive; text-align: center; margin: 0; padding: 10px 0; color: #333; overflow-x: hidden; }
        
        #video-container { 
            position: relative; width: 310px; height: 310px; margin: 0 auto; 
            border: 6px solid #111; background: #000; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* เอฟเฟกต์แฟลช */
        #shutter-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 20; pointer-events: none; transition: opacity 0.1s;
        }

        .timer-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            color: white; z-index: 10; text-shadow: 0 2px 10px #000; text-align: center; width: 100%;
        }
        #timer-num { font-family: 'Press Start 2P', cursive; font-size: 60px; display: none; }
        #timer-msg { font-size: 24px; display: none; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; }

        /* ปุ่มเลือกฟิลเตอร์ */
        .filter-nav { display: flex; justify-content: center; gap: 6px; margin: 15px 0; flex-wrap: wrap; }
        .f-btn { 
            background: #fff; border: 2px solid #222; padding: 10px 14px; font-size: 16px; 
            cursor: pointer; font-family: 'Itim', cursive; border-radius: 50px; transition: 0.2s;
        }
        .f-btn.active { background: #ff69b4; color: #fff; border-color: #ff69b4; transform: scale(1.1); }

        .btn-main { 
            background: #111; color: #fff; padding: 16px; font-family: 'Itim', cursive; 
            font-size: 20px; border: none; margin-top: 15px; width: 85%; cursor: pointer;
            box-shadow: 0 5px 0 #000; border-radius: 15px;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }

        /* การแสดงผลใบเสร็จ */
        #result-area { display: none; margin-top: 30px; padding-bottom: 80px; }
        .receipt-paper {
            position: relative; display: inline-block; width: 90%; max-width: 450px;
            background: #fdfdfd;
            background-image: linear-gradient(to right, rgba(0,0,0,0.02) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.02) 100%);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            padding-bottom: 30px;
        }
        #result-img { width: 100%; display: block; mix-blend-mode: multiply; }

            position: absolute; bottom: 0; left: 0; width: 100%; height: 18px; background: #a5a5a5;
