<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Story Photobooth</title>
    <style>
        body { background-color: #71C5EE; font-family: sans-serif; text-align: center; margin: 0; color: white; }
        #video { width: 90%; max-width: 400px; border: 10px solid #FFD700; border-radius: 20px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .timer { font-size: 80px; font-weight: bold; color: #E63946; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); display: none; text-shadow: 3px 3px 0 #FFD700; z-index: 10; }
        .btn { background: #E63946; color: white; padding: 20px 40px; font-size: 24px; border-radius: 50px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 0 #A61D24; }
        #result { display: none; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 90%; }
    </style>
</head>
<body>
    <h1>🎬 TOY STORY BOOTH</h1>
    <div id="timer" class="timer">3</div>
    <video id="video" autoplay playsinline></video>
    
    <canvas id="c" width="800" height="1600" style="display:none;"></canvas>
    
    <br>
    <button class="btn" id="btn" onclick="start()">กดเพื่อถ่ายรูป (2 ช่อง)</button>
    <br>
    <img id="result">
    <p id="msg" style="display:none; color: #004AAD;"><b>เสร็จแล้ว! กดค้างที่รูปเพื่อบันทึกไปปริ้นท์</b></p>

    <script>
        const v = document.getElementById('video');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const timer = document.getElementById('timer');
        const resImg = document.getElementById('result');
        const btn = document.getElementById('btn');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => v.srcObject = s);

        async function start() {
            btn.style.display = 'none';
            resImg.style.display = 'none';
            document.getElementById('msg').style.display = 'none';
            
            // 1. เคลียร์ Canvas และวาดพื้นหลังกรอบ (สีขาว)
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. ถ่ายรูป 2 รอบ
            for (let i = 0; i < 2; i++) {
                timer.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timer.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                timer.innerText = "แชะ!";
                
                // ถ่ายรูปแปะลง Canvas (เว้นที่ว่างด้านบน 150px และด้านซ้าย 100px)
                // รูปที่ 1 อยู่ที่ความสูง 150, รูปที่ 2 อยู่ที่ความสูง 850
                ctx.drawImage(v, 100, (i * 700) + 150, 600, 600); 
                
                await new Promise(r => setTimeout(r, 500));
                timer.style.display = 'none';
            }
            
            // 3. --- ขั้นตอนสำคัญ: วาดกรอบด้วยโค้ด ---
            
            // วาดเส้นขอบนอกสุด (สีน้ำเงิน)
            ctx.lineWidth = 15;
            ctx.strokeStyle = "#004AAD";
            ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

            // วาดเส้นขอบใน (สีเหลือง Woody)
            ctx.lineWidth = 30;
            ctx.strokeStyle = "#FFD700";
            ctx.strokeRect(40, 40, canvas.width - 80, canvas.height - 80);

            // วาดเส้นแบ่งรูป 2 ช่อง (สีแดง)
            ctx.lineWidth = 10;
            ctx.strokeStyle = "#E63946";
            ctx.beginPath();
            ctx.moveTo(100, 800);
            ctx.lineTo(700, 800);
            ctx.stroke();

            // ใส่ตัวหนังสือ "TOY STORY" ด้านบน
            ctx.fillStyle = "#004AAD"; // สีน้ำเงิน
            ctx.font = "bold 60px Arial Rounded MT Bold";
            ctx.textAlign = "center";
            ctx.fillText("TOY STORY", 400, 100);

            // ใส่ตัวหนังสือ "PHOT0BOOTH" ด้านล่าง
            ctx.font = "bold 40px Arial Rounded MT Bold";
            ctx.fillText("PHOT0BOOTH", 400, canvas.height - 70);
            
            // แสดงผลลัพธ์
            resImg.src = canvas.toDataURL('image/jpeg', 0.8);
            resImg.style.display = 'inline-block';
            document.getElementById('msg').style.display = 'block';
            btn.style.display = 'inline-block';
            btn.innerText = "ถ่ายใหม่";
        }
    </script>
</body>
</html>
