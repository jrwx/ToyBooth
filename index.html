<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Final Receipt</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #eee; overflow-x: hidden; }
        
        /* --- หน้าแรก: โหมดกล้องดิจิทัล --- */
        #camera-page { display: block; padding-top: 20px; }
        #booth-machine { position: relative; width: 340px; margin: 0 auto; background: #333; padding: 12px; border-radius: 15px; border: 4px solid #555; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        #main-display { position: relative; width: 310px; height: 310px; margin: 0 auto; background: #000; overflow: hidden; border: 2px solid #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .cam-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: 'VT323', monospace; color: #fff; }
        .cam-top-right { position: absolute; top: 10px; right: 10px; color: #f00; animation: blink 1s infinite; }
        .cam-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; opacity: 0.2; }
        .cam-grid div { border: 0.5px solid #fff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #shutter-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 20; pointer-events: none; }
        .timer-overlay { font-family: 'Press Start 2P', cursive; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 30; font-size: 50px; display: none; }

        /* --- หน้าสอง: โหมดใบเสร็จ (ลบทุกอย่างออก) --- */
        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999; overflow-y: auto; scrollbar-width: none; }
        #print-page::-webkit-scrollbar { display: none; }

        .receipt-paper { 
            position: relative; 
            width: 90%; max-width: 500px; /* ขยายขนาดใบเสร็จขึ้น */
            background: #fdfaf5; 
            margin: 0 auto 50px auto;
            transform: translateY(-100%); 
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        
        /* อนิเมชั่นไหลลื่น 6.5 วินาที */
        .printing-act { animation: slideDownSmooth 6.5s linear forwards; }
        
        @keyframes slideDownSmooth { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(0); } 
        }

        #result-img { width: 100%; display: block; mix-blend-mode: multiply; }
        .torn-edge { width: 100%; height: 20px; background: #000; clip-path: polygon(0% 100%, 5% 15%, 10% 100%, 15% 20%, 20% 100%, 25% 15%, 30% 100%, 35% 25%, 40% 100%, 45% 15%, 50% 100%, 55% 20%, 60% 100%, 65% 15%, 70% 100%, 75% 25%, 80% 100%, 85% 15%, 90% 100%, 95% 20%, 100% 100%); }

        /* ปุ่มกด */
        .controls { margin-top: 30px; }
        .btn-snap { background: #ff3e3e; color: #fff; padding: 20px; font-family: 'Press Start 2P', cursive; font-size: 14px; border: none; width: 250px; cursor: pointer; border-radius: 50px; box-shadow: 0 6px 0 #b32a2a; }
        .btn-save { background: #fff; color: #000; padding: 20px; font-family: 'Press Start 2P', cursive; font-size: 14px; border: none; width: 280px; margin-top: 20px; cursor: pointer; border-radius: 10px; box-shadow: 0 6px 0 #ccc; display: none; }
    </style>
</head>
<body>

    <div id="camera-page">
        <div style="font-family: 'VT323', monospace; font-size: 28px; margin-bottom: 15px;">DIGITAL CAM SERVICE</div>
        <div id="booth-machine">
            <div id="main-display">
                <div class="cam-ui">
                    <div class="cam-top-right">● REC</div>
                    <div class="cam-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
                </div>
                <div id="shutter-flash"></div>
                <video id="video" autoplay playsinline muted></video>
                <div id="timer-num" class="timer-overlay">3</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn-snap" id="btn-snap" onclick="startCapture()">SHOT</button>
        </div>
    </div>

    <div id="print-page">
        <div class="receipt-paper" id="receipt-paper">
            <img id="result-img">
            <div class="torn-edge"></div>
        </div>
        <button class="btn-save" id="btn-save" onclick="sharePhoto()">SAVE RECEIPT</button>
        <div style="height: 50px;"></div>
    </div>

    <canvas id="c" width="800" height="2000" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const flash = document.getElementById('shutter-flash');
        const tNum = document.getElementById('timer-num');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const camPage = document.getElementById('camera-page');
        const printPage = document.getElementById('print-page');
        const receiptPaper = document.getElementById('receipt-paper');
        const btnSave = document.getElementById('btn-save');
        
        let currentBlob = null;
        let stream = null;

        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = stream;
            } catch (e) { alert("Camera error!"); }
        }
        init();

        async function startCapture() {
            const photos = [];
            document.getElementById('btn-snap').style.display = 'none';

            for (let i = 0; i < 2; i++) {
                tNum.style.display = 'block';
                for (let j = 3; j > 0; j--) { tNum.innerText = j; await new Promise(r => setTimeout(r, 1000)); }
                tNum.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const tmp = document.createElement('canvas');
                tmp.width = 600; tmp.height = 600; // ขยายขนาดรูปถ่าย
                const tCtx = tmp.getContext('2d');
                tCtx.translate(600, 0); tCtx.scale(-1, 1);
                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 600, 600);
                
                photos.push(tmp);
                if(i === 0) await new Promise(r => setTimeout(r, 1200)); 
            }
            generateFinalReceipt(photos);
        }

        function generateFinalReceipt(photos) {
            const orderNo = Math.floor(100000 + Math.random() * 900000);
            ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Texture
            for(let i=0; i<10000; i++) { ctx.fillStyle = `rgba(0,0,0,0.04)`; ctx.fillRect(Math.random()*800, Math.random()*2000, 1.5, 1.5); }

            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = "bold 80px 'VT323'"; ctx.fillText("JARAWEE BOOTH", 400, 120);
            ctx.font = "30px monospace"; ctx.fillText("===========================", 400, 180);

            // Order No ชิดซ้าย
            ctx.textAlign = "left"; 
            ctx.font = "30px 'VT323'"; ctx.fillText("Order: #" + orderNo, 100, 230);

            // วาดรูปถ่าย (ขนาดใหญ่ขึ้น)
            photos.forEach((img, i) => {
                const y = (i * 640) + 280;
                ctx.drawImage(img, 100, y, 600, 600);
                ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.strokeRect(100, y, 600, 600);
            });

            ctx.font = "bold 35px Sarabun"; ctx.fillText("รายการ: ค่าความน่ารัก (Full Ver.)", 100, 1620);
            
            // Barcode
            ctx.fillStyle = "#111"; const bx = 100; const by = 1700;
            for(let k=0; k<100; k++) { let w = [3, 5, 8][Math.floor(Math.random()*3)]; ctx.fillRect(bx + (k*6), by, w, 100); }
            
            ctx.textAlign = "center"; 
            ctx.font = "bold 30px 'VT323'"; ctx.fillText(new Date().toLocaleString('th-TH'), 400, 1880);

            canvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
                startPrinting();
            }, 'image/png');
        }

        function startPrinting() {
            // สลับหน้า: ซ่อนกล้อง โชว์ปริ้นท์
            camPage.style.display = 'none';
            printPage.style.display = 'block';
            receiptPaper.classList.add('printing-act');
            
            // ปุ่ม Save มาหลังจากไหลเสร็จ
            setTimeout(() => { 
                btnSave.style.display = 'inline-block';
            }, 6800);
        }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "jarawee_full.png", {type:"image/png"});
            if (navigator.share) await navigator.share({ files: [f] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "jarawee_full.png"; a.click(); }
        }
    </script>
</body>
</html>
