<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Receipt - Jarawee</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #d1d1d1; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 20px 0; color: #333; }
        
        #video-container { 
            position: relative; width: 300px; height: 300px; margin: 0 auto; 
            border: 4px solid #000; border-radius: 2px; overflow: hidden; background: #000; 
            box-shadow: 10px 10px 0px #000;
        }
        
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scaleX(-1); 
            filter: grayscale(100%) contrast(120%);
        }
        
        .timer { 
            font-family: 'Press Start 2P', cursive; font-size: 50px; 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); display: none; 
            color: #fff; z-index: 10; text-shadow: 4px 4px #000;
        }

        .btn { 
            background: #000; color: #fff; padding: 15px 30px; 
            font-family: 'Press Start 2P', cursive; font-size: 12px; 
            border: none; margin-top: 30px; width: 85%; cursor: pointer;
            box-shadow: 5px 5px 0px #555;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #555; }
        
        #result-area { display: none; margin-top: 20px; padding-bottom: 50px; }
        #result-img { width: 85%; filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

    <div style="font-family: 'Press Start 2P', cursive; font-size: 14px; margin-bottom: 15px; line-height: 1.5;">
        CONGRATS!<br><span style="font-size: 10px;">JARAWEE EDITION</span>
    </div>
    
    <div id="video-container">
        <div id="timer" class="timer">3</div>
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <button class="btn" id="btn-snap" onclick="startCapture()">[ START SNAP ]</button>

    <div id="result-area">
        <img id="result-img">
        <br>
        <button class="btn" style="background:#28a745;" onclick="sharePhoto()">[ SAVE PHOTO ]</button>
    </div>

    <canvas id="c" width="600" height="1650" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        let currentBlob = null;

        async function initCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = s;
                v.play();
            } catch (err) { alert("Camera Error: " + err); }
        }
        initCamera();

        async function startCapture() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const timer = document.getElementById('timer');
            
            document.getElementById('btn-snap').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';

            // วาดใบเสร็จ
            ctx.fillStyle = "white"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "black";
            ctx.textAlign = "center";
            
            // ส่วนหัว: CONGRATULATIONS (ตัวใหญ่)
            ctx.font = "38px 'Press Start 2P'";
            ctx.fillText("CONGRATULATIONS", 300, 100);
            
            // ส่วนหัว: to jarawee (ตัวเล็ก)
            ctx.font = "20px 'Press Start 2P'";
            ctx.fillText("to jarawee <3", 300, 150);
            
            ctx.font = "20px monospace";
            ctx.fillText("==============================", 300, 190);

            for (let i = 0; i < 2; i++) {
                timer.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timer.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                timer.innerText = "!"; 
                await new Promise(r => setTimeout(r, 300));
                timer.style.display = 'none';

                const pSize = 480; const x = 60; const y = (i * 510) + 220;
                ctx.save();
                ctx.translate(x + pSize, y); ctx.scale(-1, 1);
                ctx.filter = 'grayscale(100%) contrast(130%)';
                const min = Math.min(v.videoWidth, v.videoHeight);
                ctx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, pSize, pSize);
                ctx.restore();
            }

            // ส่วนท้าย
            ctx.textAlign = "center";
            ctx.font = "20px monospace";
            ctx.fillText("==============================", 300, 1260);
            
            ctx.textAlign = "left";
            ctx.font = "700 28px Sarabun";
            ctx.fillText("รายการ: ค่ารักเอ็ง 3000 บาท", 65, 1310);
            
            // --- วาดบาร์โค้ด ---
            ctx.fillStyle = "black";
            const barcodeX = 140;
            const barcodeY = 1360;
            // ว
