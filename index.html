<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth - บกน Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Courier+Prime:wght@400;700&family=Sarabun:wght@300;400;700&family=Pirata+One&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #ff3e3e; --text-main: #ffffff; --text-dim: #a0a0a0; }
        body { background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: var(--text-main); overflow-x: hidden; }

        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'VT323'; font-size: 28px; letter-spacing: 2px; margin-bottom: 30px; color: var(--text-dim); text-transform: uppercase; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .m-btn { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-family: 'VT323'; cursor: pointer; font-size: 18px; }
        .m-btn.active { background: var(--accent); }

        #booth-machine { position: relative; width: 100%; max-width: 340px; background: var(--card-bg); padding: 8px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #display-box { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; border-radius: 18px; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 20; pointer-events: none; }
        .timer { font-family: 'Press Start 2P', cursive; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 30; font-size: 60px; display: none; }

        .controls { margin-top: 40px; width: 100%; max-width: 340px; }
        .filter-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .f-btn { background: transparent; color: var(--text-dim); border: 1px solid #333; width: 60px; height: 60px; border-radius: 50%; font-size: 8px; cursor: pointer; font-family: 'Press Start 2P'; display: flex; align-items: center; justify-content: center; }
        .f-btn.active { background: var(--text-main); color: #000; border-color: var(--text-main); }
        
        .btn-snap { background: var(--accent); color: #fff; padding: 20px 40px; font-family: 'Press Start 2P'; font-size: 14px; border: none; width: 100%; border-radius: 100px; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 62, 62, 0.3); }

        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; }
        .receipt-container { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); width: 300px; }
        .flow-animation { animation: slideDownFull 7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDownFull { 0% { transform: translate(-50%, -100%); } 100% { transform: translate(-50%, 40px); } }

        #result-img { width: 100%; display: block; box-shadow: 0 0 60px rgba(0,0,0,1); }
        #final-actions { position: absolute; bottom: 30px; left: 0; width: 100%; display: none; text-align: center; z-index: 200; }
        
        .btn-action { background: #ffffff; color: #000; padding: 14px 20px; font-family: 'Press Start 2P'; font-size: 8px; border: none; border-radius: 50px; cursor: pointer; margin: 5px; display: inline-flex; align-items: center; justify-content: center; min-width: 140px; }
        .btn-print { background: var(--accent); color: #fff; }
        .btn-retry { background: #444; color: #fff; display: block; margin: 15px auto; width: 120px; font-size: 8px; padding: 8px; }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">Congratulations to Jarawee!</div>
        <div class="mode-selector">
            <button class="m-btn active" id="btn-m-receipt" onclick="setMode('receipt')">Receipt</button>
            <button class="m-btn" id="btn-m-news" onclick="setMode('news')">Newspaper</button>
        </div>
        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
            </div>
        </div>
        <div class="controls">
            <div class="filter-group">
                <button class="f-btn active" onclick="setF('none', this)">NORM</button>
                <button class="f-btn" onclick="setF('kodak', this)">FILM</button>
                <button class="f-btn" id="f-bw" onclick="setF('bw', this)">B&W</button>
            </div>
            <button class="btn-snap" id="snap-btn" onclick="takePhotos()">มาถ่ายด่วนน</button>
        </div>
    </div>

    <div id="print-page">
        <div class="receipt-container" id="receipt-cont">
            <img id="result-img">
        </div>
        <div id="final-actions">
            <button class="btn-action" onclick="saveImage()">เซฟเข้าเครื่อง</button>
            <button class="btn-action btn-print" onclick="print80mm()">กดเพื่อปริ้นต์ (80mm)</button>
            <button class="btn-action btn-retry" onclick="location.reload()">ถ่ายใหม่เถอะ</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const timer = document.getElementById('timer');
        const flash = document.getElementById('flash');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const printPage = document.getElementById('print-page');
        const receiptCont = document.getElementById('receipt-cont');
        const finalActions = document.getElementById('final-actions');

        let filterStyle = 'none';
        let currentMode = 'receipt';
        let capturedPics = [];

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
        }
        startCam();

        function setMode(m) {
            currentMode = m;
            document.getElementById('btn-m-receipt').classList.toggle('active', m === 'receipt');
            document.getElementById('btn-m-news').classList.toggle('active', m === 'news');
            if(m === 'news') { setF('bw', document.getElementById('f-bw')); } 
            else { setF('none', document.querySelectorAll('.f-btn')[0]); }
        }

        function setF(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'none') filterStyle = 'none';
            else if(mode === 'kodak') filterStyle = 'contrast(1.2) saturate(1.4) sepia(0.1)';
            else if(mode === 'bw') filterStyle = 'grayscale(1) contrast(1.2)';
            video.style.filter = filterStyle;
        }

        async function takePhotos() {
            capturedPics = [];
            const count = (currentMode === 'receipt') ? 2 : 1;
            document.getElementById('snap-btn').style.opacity = '0';

            for(let i=0; i<count; i++) {
                timer.style.display = 'block';
                for(let s=3; s>0; s--) { timer.innerText = s; await new Promise(r => setTimeout(r, 1000)); }
                timer.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const pCanvas = document.createElement('canvas');
                pCanvas.width = 800; pCanvas.height = 800;
                const pCtx = pCanvas.getContext('2d');
                pCtx.filter = filterStyle;
                pCtx.translate(pCanvas.width, 0); pCtx.scale(-1, 1);
                const side = Math.min(video.videoWidth, video.videoHeight);
                pCtx.drawImage(video, (video.videoWidth-side)/2, (video.videoHeight-side)/2, side, side, 0, 0, 800, 800);
                capturedPics.push(pCanvas);
                if(i < count-1) await new Promise(r => setTimeout(r, 1000));
            }
            drawCanvas(600, (currentMode === 'receipt') ? 1520 : 1000);
            showResult();
        }

        function drawCanvas(baseW, baseH) {
            canvas.width = baseW; canvas.height = baseH;
            ctx.clearRect(0,0,baseW,baseH);
            
            if(currentMode === 'receipt') {
                ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, baseW, baseH);
                ctx.fillStyle = "#111"; ctx.textAlign = "center";
                ctx.font = "bold 90px 'VT323'"; ctx.fillText("Congrats!!", 300, 115);
                ctx.font = "48px 'VT323'"; ctx.fillText("To Jarawee <3", 300, 175);
                ctx.font = "20px monospace"; ctx.fillText("------------------------------", 300, 215);
                
                ctx.textAlign = "left"; ctx.font = "32px 'VT323'";
                ctx.fillText("Order: #" + Math.floor(100000 + Math.random()*900000), 90, 260);
                
                capturedPics.forEach((p, idx) => {
                    const y = 300 + (idx * 440);
                    ctx.drawImage(p, 90, y, 420, 420);
                    ctx.strokeStyle = "#222"; ctx.lineWidth = 2; ctx.strokeRect(90, y, 420, 420);
                });

                ctx.font = "bold 25px Sarabun"; ctx.fillText("รายการ: ค่ารักเอ็ง ;-)", 90, 1200);
                const barWidth = 420;
                const barX = (baseW - barWidth) / 2;
                for(let k=0; k<60; k++) { ctx.fillRect(barX+(k*7), 1250, [2,4,5][Math.floor(Math.random()*3)], 80); }
                
                ctx.textAlign = "center"; ctx.font = "26px 'VT323'"; ctx.fillText(new Date().toLocaleString(), 300, 1380);
                
                ctx.globalAlpha = 0.5; ctx.font = "32px 'VT323'";
                ctx.fillText("THANK YOU FOR BEING TOGETHER <3", 300, 1440);
                ctx.globalAlpha = 1.0;
            } else {
                // --- แก้ไขเฉพาะโหมดหนังสือพิมพ์ ---
                
                // 1. พื้นหลังโต๊ะไม้เก่า (จำลองด้วย Gradient และ Noise)
                ctx.fillStyle = "#4a3121"; ctx.fillRect(0,0,baseW,baseH); // สีไม้พื้นฐาน
                for(let i=0; i<3000; i++) { ctx.fillStyle=`rgba(20,10,5,${Math.random()*0.15})`; ctx.fillRect(Math.random()*baseW, Math.random()*baseH, 2, 2); } // ลายไม้

                // 2. ตัวกระดาษหนังสือพิมพ์เวทมนตร์ย้อนยุค
                const paperW = baseW - 40; const paperH = baseH - 40;
                const paperX = 20; const paperY = 20;
                ctx.fillStyle = "#e3dccb"; ctx.fillRect(paperX, paperY, paperW, paperH); // กระดาษเหลืองนวลเก่า

                // 3. ริ้วรอยตามกาลเวลา, ขอบขาดแหว่ง, รอยไหม้ (ใช้ Destination-Out และ Gradient จำลอง)
                applyOldPaperEffects(paperX, paperY, paperW, paperH);

                // 4. แสงนวลตาเหมือนได้รับแสงจากตะเกียงเก่า (Warm Light Overlay)
                applyLampLightEffect(paperX, paperY, paperW, paperH);

                // --- ข้อความตาม Prompt ---
                
                // 5. ที่มุมซ้ายบน: HE WHO IS BARR- (ฟอนต์ Gothic/Old English)
                ctx.fillStyle = "#1a1a1a"; ctx.textAlign = "left";
                ctx.font = "bold 28px 'Pirata One'"; // Gothic style font
                ctx.fillText("HE WHO IS BARR-", paperX + 20, paperY + 45);

                // 6. หัวหนังสือพิมพ์: THE DAILY PROPHET พร้อมรายละเอียด
                ctx.textAlign = "center"; 
                ctx.font = "bold 85px 'Pirata One'"; // ขนาดใหญ่ที่สุด โบราณ
                ctx.fillText("THE DAILY PROPHET", paperX + paperW/2, paperY + 110);
                ctx.font = "bold 22px 'IM Fell English SC'"; // สัญลักษณ์ dp เล็กๆ (จำลองด้วย Text)
                ctx.fillText("d p", paperX + paperW/2, paperY + 135);
                ctx.font = "bold 16px 'Courier Prime'"; // ข้อความเล็กๆ ด้านล่าง
                ctx.fillText("LONDON, TUESDAY, 25 DECEMBER 2025 | GALLEON 3", paperX + paperW/2, paperY + 160);

                ctx.fillRect(paperX + 40, paperY + 175, paperW - 80, 5); // เส้นหนาคั่น

                // 7. หัวข้อข่าวหลัก: TWO AZKABAN... (ขนาดใหญ่ที่สุด โบราณ)
                ctx.font = "bold 38px 'IM Fell English SC'"; 
                ctx.fillText("TWO AZKABAN PRISONERS ESCAPED ON CHRISTMAS EVE!", paperX + paperW/2, paperY + 230); // ชิดหัวข้อขึ้น

                // 8. ตรงกลาง: ช่องสี่เหลี่ยมว่างสำหรับใส่รูปถ่าย (สไตล์โหมดข่าวเดิม)
                const imgS = 320; 
                const imgX = paperX + (paperW - imgS) / 2;
                const imgY = paperY + 260;
                ctx.drawImage(capturedPics[0], imgX, imgY, imgS, imgS); // วาดรูปถ่ายจัตุรัสตรงกลาง
                ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 10; ctx.strokeRect(imgX, imgY, imgS, imgS); // กรอบรูปถ่าย

                // 9. เนื้อหาคอลัมน์ข่าวเยอะเต็มหน้ากระดาษ (จัดเป็น 3 คอลัมน์ด้านล่าง)
                ctx.textAlign = "left"; ctx.font = "bold 22px 'Courier Prime'"; 
                const colTopY = imgY + imgS + 50; // ชิดรูปมากขึ้น
                ctx.fillText("FEATURE REPORT:", paperX + 50, colTopY - 10);
                
                ctx.font = "14px 'Courier Prime'"; // ขนาดใหญ่ขึ้น
                
                // ข้อความอวยยาวๆ อัดแน่นเต็มพื้นที่
                let c1 = "CREATE HARRY POTTER INSPIRED PHOTOBOOTH NEWSPAPER WITH ME! Exclusive report: joy captured in London. Witnesses are in awe of the resonance. The smile represents a pivotal moment in history. Experts confirm 100% happiness increase.";
                let c2 = "CREATE HARRY POTTER INSPIRED PHOTOBOOTH NEWSPAPER WITH ME! Ministry declares celebration. This radiance is seen from miles away. Photographers are queuing to see the technique. A true masterpiece of modern journalism. Stay tuned for our morning special edition.";
                let c3 = "CREATE HARRY POTTER INSPIRED PHOTOBOOTH NEWSPAPER WITH ME! Staggering levels of delight reported globally. A magical essence seems to permeate every single released copy. Citizens are flocking to Diagon Alley to witness the phenomenon firsthand. Detailed magical resonance analysis inside.";
                
                const colW = (paperW - 140) / 3;
                wrapText(c1, paperX + 50, colTopY, colW, 18);
                wrapText(c2, paperX + 70 + colW, colTopY, colW, 18);
                wrapText(c3, paperX + 90 + colW*2, colTopY, colW, 18);

                // 10. ที่มุมล่างซ้ายสุด: THE DARK LORD... (ขนาดใหญ่ ขาดหาย)
                ctx.font = "bold 45px 'Pirata One'"; 
                ctx.fillText("THE DARK LORD...", paperX + 50, paperY + paperH - 60);

                // 11. ภาพวาดลายเส้นเล็กๆ (จำลองด้วย Text/Emoji ซ่อนตามขอบ)
                ctx.font = "20px Serif"; ctx.textAlign = "right";
                ctx.fillText("🦉", paperX + paperW - 20, paperY + paperH - 20); // นกฮูก
                ctx.fillText("✨", paperX + paperW - 40, paperY + paperH - 20); // วัตถุเวทมนตร์
                ctx.fillText("💰", paperX + paperW - 60, paperY + paperH - 20); // Galleon
            }
        }

        // --- ฟังก์ชันเสริมเฉพาะโหมดหนังสือพิมพ์ ---

        // จำลองริ้วรอย, ขอบขาด, รอยไหม้
        function applyOldPaperEffects(x, y, w, h) {
            // ริ้วรอย Noise กระดาษเก่า
            for(let i=0; i<9000; i++) { ctx.fillStyle=`rgba(20,10,5,${Math.random()*0.1})`; ctx.fillRect(x+Math.random()*w, y+Math.random()*h, 1, 1); }

            // ขอบขาดแหว่ง (จำลองด้วย Destination-Out)
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            let step = 30;
            for(let sx=x; sx<=x+w; sx+=step) { ctx.lineTo(sx + step/2, y + (Math.random()*15)); ctx.lineTo(sx + step, y); } // ขอบบนขาด
            for(let sy=y; sy<=y+h; sy+=step) { ctx.lineTo(x+w - (Math.random()*15), sy + step/2); ctx.lineTo(x+w, sy + step); } // ขอบขวาขาด
            for(let sx=x+w; sx>=x; sx-=step) { ctx.lineTo(sx - step/2, y+h - (Math.random()*15)); ctx.lineTo(sx - step, y+h); } // ขอบล่างขาด
            for(let sy=y+h; sy>=y; sy-=step) { ctx.lineTo(x + (Math.random()*15), sy - step/2); ctx.lineTo(x, sy - step); } // ขอบซ้ายขาด
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';

            // รอยไหม้ (จำลองด้วย Gradient คลุมขอบขาด)
            const gradientB = ctx.createLinearGradient(x, y+h, x, y+h-50); // ไหม้ขอบล่าง
            gradientB.addColorStop(0, "rgba(50,20,5,0.8)"); gradientB.addColorStop(1, "rgba(227,220,203,0)");
            ctx.fillStyle = gradientB; ctx.fillRect(x, y+h-50, w, 50);
            const gradientR = ctx.createLinearGradient(x+w, y, x+w-50, y); // ไหม้ขอบขวา
            gradientR.addColorStop(0, "rgba(50,20,5,0.8)"); gradientR.addColorStop(1, "rgba(227,220,203,0)");
            ctx.fillStyle = gradientR; ctx.fillRect(x+w-50, y, 50, h);
        }

        // แสงนวลตาเหมือนได้รับแสงจากตะเกียงเก่า
        function applyLampLightEffect(x, y, w, h) {
            const lampGradient = ctx.createRadialGradient(x + w/2, y + h/2, 50, x + w/2, y + h/2, Math.max(w,h));
            lampGradient.addColorStop(0, "rgba(255,245,220,0.15)"); // แสงนวลกึ่งกลาง
            lampGradient.addColorStop(1, "rgba(200,150,100,0.05)"); // แสงขอบเข้มขึ้น
            ctx.fillStyle = lampGradient; ctx.fillRect(x, y, w, h);
        }

        // --- ฟังก์ชัน Wrap Text คงเดิม ---
        function wrapText(text, x, y, maxWidth, lineHeight) {
            let words = text.split(' '); let line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                    ctx.fillText(line, x, y); line = words[n] + ' '; y += lineHeight;
                } else line = testLine;
            }
            ctx.fillText(line, x, y);
        }

        function showResult() {
            canvas.toBlob(blob => {
                resultImg.src = URL.createObjectURL(blob);
                document.getElementById('camera-ui').style.display = 'none';
                printPage.style.display = 'block';
                setTimeout(() => receiptCont.classList.add('flow-animation'), 500);
                setTimeout(() => finalActions.style.display = 'block', 6500);
            });
        }

        function saveImage() {
            const link = document.createElement('a'); link.download = 'jarawee_booth.png';
            link.href = resultImg.src; link.click();
        }

        function print80mm() {
            let w, h, isLandscape = false;
            if(currentMode === 'receipt') {
                w = 945; h = 2400; // แนวตั้งปกติ
            } else {
                // หนังสือพิมพ์เปลี่ยนเป็นแนวนอน กว้าง 80mm (945px) สูง 50mm (590px)
                w = 945; h = 590; 
                isLandscape = true;
            }
            
            drawCanvas(w, h);
            
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const printWin = window.open('', '_blank');
                printWin.document.write(`
                    <html>
                        <head><title>Print to Barigan PR-01W</title></head>
                        <body style="margin:0; text-align:center;">
                            <p style="font-family:sans-serif; font-size:12px;">Connecting to Barigan PR-01W via Wi-Fi...</p>
                            <img src="${url}" style="width: 80mm; ${isLandscape ? 'height: 50mm;' : ''}">
                            <script>
                                window.onload = function() { 
                                    window.print(); 
                                    setTimeout(() => { window.close(); }, 500);
                                };
                            <\/script>
                        </body>
                    </html>
                `);
            });
        }
    </script>
</body>
</html>
