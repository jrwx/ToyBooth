<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Wizarding News - 1:1 Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English+SC&family=Fondamento:ital@0;1&family=Sarabun:wght@300;400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #ff3e3e; }
        body { background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #fff; overflow-x: hidden; }

        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'VT323'; font-size: 28px; letter-spacing: 2px; margin-bottom: 25px; color: #a0a0a0; text-transform: uppercase; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .m-btn { background: #333; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase; }
        .m-btn.active { background: var(--accent); }

        #booth-machine { position: relative; width: 100%; max-width: 360px; background: var(--card-bg); padding: 8px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        #display-box { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; border-radius: 15px; border: 3px solid #333; }
        
        /* กล้องโหมดหนังสือพิมพ์ 1:1 ตามคำสั่ง */
        #display-box.news-mode { aspect-ratio: 1/1; border-color: #ffd700; }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 10; pointer-events: none; }
        .timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 11; font-size: 70px; display: none; font-weight: bold; }

        .controls { margin-top: 25px; width: 100%; max-width: 360px; }
        .filter-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .f-btn { background: transparent; color: #a0a0a0; border: 2px solid #333; width: 60px; height: 60px; border-radius: 50%; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; }
        
        .btn-snap { background: var(--accent); color: #fff; padding: 22px; font-size: 18px; font-weight: bold; border: none; width: 100%; border-radius: 100px; cursor: pointer; text-transform: uppercase; }

        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; }
        .print-container { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); width: 90%; max-width: 320px; }
        .flow-animation { animation: slideDownPaper 7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDownPaper { 0% { transform: translate(-50%, -100%); } 100% { transform: translate(-50%, 40px); } }

        #result-img { width: 100%; display: block; height: auto; box-shadow: 0 0 70px rgba(0,0,0,1); }
        #final-actions { position: absolute; bottom: 50px; left: 0; width: 100%; display: none; text-align: center; }
        .btn-save { background: #fff; color: #000; padding: 16px 32px; font-size: 11px; font-weight: bold; border: none; border-radius: 100px; cursor: pointer; margin: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">Wizarding World Photo Booth</div>
        <div class="mode-selector">
            <button class="m-btn active" id="btn-m-receipt" onclick="changeMode('receipt')">Receipt</button>
            <button class="m-btn" id="btn-m-news" onclick="changeMode('news')">The Prophet</button>
        </div>
        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
            </div>
        </div>
        <div class="controls">
            <div class="filter-group">
                <button class="f-btn active" id="f-norm" onclick="setF('none', this)">Normal</button>
                <button class="f-btn" id="f-bw" onclick="setF('bw', this)">Magic B&W</button>
            </div>
            <button class="btn-snap" id="snap-btn" onclick="takePhotos()">Take Magic Photo!</button>
        </div>
    </div>

    <div id="print-page">
        <div class="print-container" id="print-cont"><img id="result-img"></div>
        <div id="final-actions">
            <button class="btn-save" onclick="saveImage()">Download</button>
            <button class="btn-save" style="background:#333;color:#fff" onclick="location.reload()">Retry</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const timer = document.getElementById('timer');
        const flash = document.getElementById('flash');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const printPage = document.getElementById('print-page');
        const printCont = document.getElementById('print-cont');
        const finalActions = document.getElementById('final-actions');

        let filterStyle = 'none';
        let currentMode = 'receipt'; 

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
        }
        startCam();

        function changeMode(mode) {
            currentMode = mode;
            document.getElementById('btn-m-receipt').classList.toggle('active', mode === 'receipt');
            document.getElementById('btn-m-news').classList.toggle('active', mode === 'news');
            document.getElementById('display-box').classList.toggle('news-mode', mode === 'news');
            if(mode === 'news') setF('bw', document.getElementById('f-bw'));
        }

        function setF(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterStyle = (mode === 'bw') ? 'grayscale(1) contrast(1.3) brightness(1.1) sepia(0.2)' : 'none';
            video.style.filter = filterStyle;
        }

        async function takePhotos() {
            const pics = [];
            const count = (currentMode === 'news') ? 1 : 2;
            for(let i=0; i<count; i++) {
                timer.style.display = 'block';
                for(let s=3; s>0; s--) { timer.innerText = s; await new Promise(r => setTimeout(r, 1000)); }
                timer.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const pCanvas = document.createElement('canvas');
                pCanvas.width = 800; pCanvas.height = 800; // บังคับ 1:1 เสมอ
                const pCtx = pCanvas.getContext('2d');
                pCtx.filter = filterStyle;
                pCtx.translate(800, 0); pCtx.scale(-1, 1);
                
                const vW = video.videoWidth; const vH = video.videoHeight;
                const minSide = Math.min(vW, vH);
                pCtx.drawImage(video, (vW-minSide)/2, (vH-minSide)/2, minSide, minSide, 0, 0, 800, 800);
                pics.push(pCanvas);
                if(i < count - 1) await new Promise(r => setTimeout(r, 1000));
            }
            if(currentMode === 'news') buildNewspaper(pics[0]); else buildReceipt(pics);
        }

        function buildReceipt(pics) {
            canvas.width = 600; canvas.height = 1500;
            ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, 600, 1500);
            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = "bold 80px 'VT323'"; ctx.fillText("CONGRATS!", 300, 150);
            pics.forEach((p, idx) => ctx.drawImage(p, 75, 250 + (idx * 500), 450, 450));
            renderFinal();
        }

        function buildNewspaper(pic) {
            canvas.width = 1000; canvas.height = 1400;
            // พื้นหลังกระดาษเก่า
            ctx.fillStyle = "#d9cfb9"; ctx.fillRect(0, 0, 1000, 1400);
            // Noise เพิ่มความเก่า
            for(let i=0; i<8000; i++) { ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.07})`; ctx.fillRect(Math.random()*1000, Math.random()*1400, 1, 1); }

            ctx.fillStyle = "#1a1a1a";
            ctx.textAlign = "center";
            
            // 1. หัวหนังสือพิมพ์ ขลังกว่าเดิม
            ctx.font = "bold 130px 'Pirata One'";
            ctx.shadowBlur = 2; ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.fillText("THE DAILY PROPHET", 500, 200);
            ctx.shadowBlur = 0;

            ctx.fillRect(50, 230, 900, 5); // เส้นคั่นหนา
            ctx.font = "italic 22px 'IM Fell English SC'";
            ctx.fillText("WIZARDING WORLD'S NO.1 NEWS SOURCE | GALLEON 3", 500, 265);
            ctx.fillRect(50, 280, 900, 2);

            // 2. หัวข่าวหลัก
            ctx.font = "bold 60px 'IM Fell English SC'";
            ctx.fillText("AZKABAN ESCAPEE SPOTTED!", 500, 360);

            // 3. รูปถ่าย 1:1 (ลบกรอบสีดำออก)
            const imgSize = 650;
            const imgX = (1000 - imgSize) / 2;
            const imgY = 410;
            ctx.drawImage(pic, imgX, imgY, imgSize, imgSize);
            
            // 4. เนื้อหาข่าว (ป้องกันหลุดขอบกระดาษ)
            ctx.textAlign = "left";
            ctx.font = "italic 22px 'Fondamento'";
            const content = "LATEST REPORT: The Ministry of Magic has confirmed a massive surge in magical energy following this capture. Witnesses describe the radiance as 'unprecedented' and 'spellbinding'. Citizens are advised to keep this image as a protection charm. This marks a new era in wizarding photography. BEWARE: The happiness contained in this photo is highly contagious!";
            
            // ปรับ maxWidth ให้ปลอดภัย (เว้นขอบข้างละ 80px)
            wrapText(content, 80, 1120, 840, 32);

            // ท้ายกระดาษ
            ctx.font = "bold 40px 'Pirata One'";
            ctx.fillText("THE DARK LORD RETURNS?", 80, 1330);
            ctx.textAlign = "right";
            ctx.font = "italic 20px serif";
            ctx.fillText("Page 3-4 >>", 920, 1330);

            renderFinal();
        }

        function wrapText(text, x, y, maxWidth, lineHeight) {
            let words = text.split(' '); let line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                    ctx.fillText(line, x, y); line = words[n] + ' '; y += lineHeight;
                } else line = testLine;
            }
            ctx.fillText(line, x, y);
        }

        function renderFinal() {
            canvas.toBlob(blob => {
                resultImg.src = URL.createObjectURL(blob);
                document.getElementById('camera-ui').style.display = 'none';
                printPage.style.display = 'block';
                setTimeout(() => printCont.classList.add('flow-animation'), 500);
                setTimeout(() => finalActions.style.display = 'block', 6500);
            });
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'wizard_news_1x1.png'; link.href = resultImg.src; link.click();
        }
    </script>
</body>
</html>
