<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Pirata+One&family=Courier+Prime:wght@400;700&family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #ff3e3e; --text-main: #ffffff; --text-dim: #a0a0a0; }
        body { background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: var(--text-main); overflow-x: hidden; }

        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'VT323'; font-size: 28px; letter-spacing: 2px; margin-bottom: 30px; color: var(--text-dim); text-transform: uppercase; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .m-btn { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-family: 'VT323'; cursor: pointer; font-size: 18px; }
        .m-btn.active { background: var(--accent); }

        #booth-machine { position: relative; width: 100%; max-width: 340px; background: var(--card-bg); padding: 8px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #display-box { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; border-radius: 18px; transition: aspect-ratio 0.3s; }
        #display-box.news-mode { aspect-ratio: 3/4; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 20; pointer-events: none; }
        .timer { font-family: 'Press Start 2P', cursive; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 30; font-size: 60px; display: none; }

        .controls { margin-top: 40px; width: 100%; max-width: 340px; }
        .filter-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .f-btn { background: transparent; color: var(--text-dim); border: 1px solid #333; width: 60px; height: 60px; border-radius: 50%; font-size: 8px; cursor: pointer; font-family: 'Press Start 2P'; display: flex; align-items: center; justify-content: center; }
        .f-btn.active { background: var(--text-main); color: #000; border-color: var(--text-main); }
        
        .btn-snap { background: var(--accent); color: #fff; padding: 20px 40px; font-family: 'Press Start 2P'; font-size: 14px; border: none; width: 100%; border-radius: 100px; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 62, 62, 0.3); }

        /* การเลือกขนาด */
        #size-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 150; flex-direction: column; align-items: center; justify-content: center; }
        .size-box { background: #222; padding: 30px; border-radius: 20px; width: 80%; max-width: 300px; }
        .size-btn { background: #fff; color: #00; border: none; padding: 15px; width: 100%; margin: 10px 0; border-radius: 10px; font-family: 'VT323'; font-size: 20px; cursor: pointer; }

        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; }
        .receipt-container { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); width: 300px; }
        .flow-animation { animation: slideDownFull 7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDownFull { 0% { transform: translate(-50%, -100%); } 100% { transform: translate(-50%, 40px); } }

        #result-img { width: 100%; display: block; box-shadow: 0 0 60px rgba(0,0,0,1); }
        #final-actions { position: absolute; bottom: 50px; left: 0; width: 100%; display: none; text-align: center; }
        .btn-save { background: rgba(255, 255, 255, 0.9); color: #000; padding: 16px 32px; font-family: 'Press Start 2P'; font-size: 10px; border: none; border-radius: 100px; cursor: pointer; margin: 8px; }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">Congratulations to Jarawee!</div>
        <div class="mode-selector">
            <button class="m-btn active" id="btn-m-receipt" onclick="setMode('receipt')">Receipt</button>
            <button class="m-btn" id="btn-m-news" onclick="setMode('news')">Newspaper</button>
        </div>
        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
            </div>
        </div>
        <div class="controls">
            <div class="filter-group" id="filter-group">
                <button class="f-btn active" onclick="setF('none', this)">NORM</button>
                <button class="f-btn" onclick="setF('kodak', this)">FILM</button>
                <button class="f-btn" id="f-bw" onclick="setF('bw', this)">B&W</button>
            </div>
            <button class="btn-snap" id="snap-btn" onclick="takePhotos()">มาถ่ายด่วนน</button>
        </div>
    </div>

    <div id="size-overlay">
        <div class="size-box">
            <h2 style="font-family:'VT323'">CHOOSE SIZE</h2>
            <button class="size-btn" onclick="processFinalRender('std')">ขนาดปัจจุบัน (Standard)</button>
            <button class="size-btn" onclick="processFinalRender('80mm')">ความกว้าง 80mm</button>
        </div>
    </div>

    <div id="print-page">
        <div class="receipt-container" id="receipt-cont">
            <img id="result-img">
        </div>
        <div id="final-actions">
            <button class="btn-save" onclick="saveImage()">เซฟเข้าแกลลอรี่</button>
            <button class="btn-save" style="background:#444; color:#fff" onclick="location.reload()">ถ่ายใหม่เถอะ</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const timer = document.getElementById('timer');
        const flash = document.getElementById('flash');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const printPage = document.getElementById('print-page');
        const receiptCont = document.getElementById('receipt-cont');
        const finalActions = document.getElementById('final-actions');
        const sizeOverlay = document.getElementById('size-overlay');

        let filterStyle = 'none';
        let currentMode = 'receipt';
        let capturedPics = [];

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
        }
        startCam();

        function setMode(m) {
            currentMode = m;
            document.getElementById('btn-m-receipt').classList.toggle('active', m === 'receipt');
            document.getElementById('btn-m-news').classList.toggle('active', m === 'news');
            document.getElementById('display-box').classList.toggle('news-mode', m === 'news');
            if(m === 'news') {
                setF('bw', document.getElementById('f-bw'));
                document.getElementById('filter-group').style.opacity = '0.5';
                document.getElementById('filter-group').style.pointerEvents = 'none';
            } else {
                setF('none', document.querySelectorAll('.f-btn')[0]);
                document.getElementById('filter-group').style.opacity = '1';
                document.getElementById('filter-group').style.pointerEvents = 'auto';
            }
        }

        function setF(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'none') filterStyle = 'none';
            else if(mode === 'kodak') filterStyle = 'contrast(1.2) saturate(1.4) sepia(0.1)';
            else if(mode === 'bw') filterStyle = 'grayscale(1) contrast(1.2)';
            video.style.filter = filterStyle;
        }

        async function takePhotos() {
            capturedPics = [];
            const count = (currentMode === 'receipt') ? 2 : 1;
            document.getElementById('snap-btn').style.opacity = '0';

            for(let i=0; i<count; i++) {
                timer.style.display = 'block';
                for(let s=3; s>0; s--) { timer.innerText = s; await new Promise(r => setTimeout(r, 1000)); }
                timer.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const pCanvas = document.createElement('canvas');
                pCanvas.width = 800; pCanvas.height = (currentMode === 'receipt') ? 800 : 1000;
                const pCtx = pCanvas.getContext('2d');
                pCtx.filter = filterStyle;
                pCtx.translate(pCanvas.width, 0); pCtx.scale(-1, 1);
                
                const vW = video.videoWidth; const vH = video.videoHeight;
                const targetAspect = pCanvas.width / pCanvas.height;
                let sW, sH, sX, sY;
                if (vW/vH > targetAspect) { sH = vH; sW = vH * targetAspect; sX = (vW - sW)/2; sY = 0; }
                else { sW = vW; sH = vW / targetAspect; sX = 0; sY = (vH - sH)/2; }
                
                pCtx.drawImage(video, sX, sY, sW, sH, 0, 0, pCanvas.width, pCanvas.height);
                capturedPics.push(pCanvas);
                if(i < count-1) await new Promise(r => setTimeout(r, 1000));
            }
            sizeOverlay.style.display = 'flex';
        }

        function processFinalRender(sizeType) {
            sizeOverlay.style.display = 'none';
            if(currentMode === 'receipt') buildReceipt(capturedPics, sizeType);
            else buildNews(capturedPics[0], sizeType);
        }

        function buildReceipt(pics, sizeType) {
            const baseW = (sizeType === '80mm') ? 800 : 600;
            const baseH = (sizeType === '80mm') ? 2000 : 1520;
            canvas.width = baseW; canvas.height = baseH;
            ctx.clearRect(0,0,baseW,baseH);
            ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, baseW, baseH);
            for(let i=0; i<5000; i++) { ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.05})`; ctx.fillRect(Math.random()*baseW, Math.random()*baseH, 1, 1); }
            
            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = `bold ${baseW*0.15}px 'VT323'`; ctx.fillText("Congrats!!", baseW/2, baseH*0.075);
            ctx.font = `${baseW*0.08}px 'VT323'`; ctx.fillText("To Jarawee <3", baseW/2, baseH*0.115);
            ctx.font = "20px monospace"; ctx.fillText("------------------------------", baseW/2, baseH*0.14);
            
            ctx.textAlign = "left"; ctx.font = `${baseW*0.05}px 'VT323'`;
            ctx.fillText("Order: #" + Math.floor(100000 + Math.random()*900000), baseW*0.15, baseH*0.17);
            
            pics.forEach((p, idx) => {
                const imgW = baseW * 0.7; const imgH = imgW;
                const x = (baseW - imgW) / 2;
                const y = baseH * 0.2 + (idx * (imgH + 20));
                ctx.drawImage(p, x, y, imgW, imgH);
                ctx.strokeStyle = "#222"; ctx.lineWidth = 2; ctx.strokeRect(x, y, imgW, imgH);
            });

            ctx.font = "bold 25px Sarabun"; ctx.fillText("รายการ: ค่ารักเอ็ง ;-)", baseW*0.15, baseH*0.8);
            for(let k=0; k<60; k++) { ctx.fillRect(baseW*0.15+(k*7), baseH*0.83, [2,4,5][Math.floor(Math.random()*3)], 80); }
            ctx.textAlign = "center"; ctx.font = "26px 'VT323'"; ctx.fillText(new Date().toLocaleString(), baseW/2, baseH*0.91);
            
            // ปรับสีให้เข้มเท่ากัน (ลบ alpha 0.5 ออก)
            ctx.fillStyle = "#111"; ctx.font = `${baseW*0.05}px 'VT323'`;
            ctx.fillText("THANK YOU FOR BEING TOGETHER <3", baseW/2, baseH*0.95);

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.moveTo(0, baseH);
            for(let x=0; x<=baseW; x+=60) { ctx.lineTo(x + 30, baseH-30 + (Math.random()*20)); ctx.lineTo(x + 60, baseH); }
            ctx.fill(); ctx.globalCompositeOperation = 'source-over';
            renderResult();
        }

        function buildNews(pic, sizeType) {
            const baseW = (sizeType === '80mm') ? 1000 : 800;
            const baseH = (sizeType === '80mm') ? 1600 : 1250;
            canvas.width = baseW; canvas.height = baseH;
            ctx.fillStyle = "#e3dccb"; ctx.fillRect(0,0,baseW,baseH);
            
            // ขอบกระดาษ Breaking News
            ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 10; ctx.strokeRect(20, 20, baseW-40, baseH-40);
            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(20, 20, 250, 40);
            ctx.fillStyle = "#fff"; ctx.font = "bold 20px 'Courier Prime'"; ctx.textAlign = "center";
            ctx.fillText("BREAKING NEWS", 145, 48);

            ctx.fillStyle = "#1a1a1a";
            ctx.font = `${baseW*0.13}px 'Pirata One'`; ctx.fillText("THE DAILY WORLD", baseW/2, 140);
            ctx.fillRect(40, 165, baseW-80, 4);
            ctx.font = "bold 16px 'Courier Prime'";
            ctx.fillText("ESTABLISHED 1894 | " + new Date().toDateString().toUpperCase() + " | NO. 4,821", baseW/2, 195);
            ctx.fillRect(40, 210, baseW-80, 1);

            ctx.font = "bold 40px 'Courier Prime'"; ctx.fillText("STUNNING RADIANCE CAPTURED!", baseW/2, 280);

            // รูปถ่าย (ล็อคสัดส่วน)
            const imgW = baseW * 0.65; const imgH = imgW * 1.25;
            const imgX = (baseW - imgW) / 2;
            ctx.drawImage(pic, imgX, 320, imgW, imgH);
            ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 12; ctx.strokeRect(imgX, 320, imgW, imgH);
            
            // ข้อความข่าวเยอะๆ
            ctx.textAlign = "left"; ctx.font = "bold 18px 'Courier Prime'";
            ctx.fillText("LATEST NEWS FROM LONDON:", 50, baseH - 260);
            ctx.font = "13px 'Courier Prime'";
            let news1 = "Reports have surfaced detailing a truly remarkable occurrence, captured here in this exclusive photograph. Witnesses describe the atmosphere as filled with unprecedented joy and magical energy. Sources confirm that the individual pictured has become an overnight sensation across the world, and letters are already arriving from around the globe to offer their congratulations. Experts say this level of charm hasn't been seen in centuries.";
            let news2 = "The world watches in awe as this image represents a pivotal moment in contemporary history. Experts are currently analyzing the resonance from the moment this photograph was taken. Preliminary findings suggest a 100% increase in happiness levels in nearby areas. This is a moment that will be remembered for years to come. Local authorities have declared this a day of celebration, inviting everyone to witness this radiance.";
            let news3 = "ADDITIONAL REPORT: In a related story, photographers are queuing up for miles just to catch a glimpse of the technique used here. The lighting, the composition, and the subject all blend into a masterpiece of modern journalism. Stay tuned for our evening edition where we will feature a 10-page special on this historic breakthrough. The world has never seen anything quite like this smile.";
            
            const colW = (baseW - 140) / 3;
            wrapText(news1, 50, baseH - 230, colW, 16);
            wrapText(news2, 70 + colW, baseH - 230, colW, 16);
            wrapText(news3, 90 + colW*2, baseH - 230, colW, 16);

            renderResult();
        }

        function wrapText(text, x, y, maxWidth, lineHeight) {
            let words = text.split(' '); let line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                    ctx.fillText(line, x, y); line = words[n] + ' '; y += lineHeight;
                } else { line = testLine; }
            }
            ctx.fillText(line, x, y);
        }

        function renderResult() {
            canvas.toBlob(blob => {
                resultImg.src = URL.createObjectURL(blob);
                document.getElementById('camera-ui').style.display = 'none';
                printPage.style.display = 'block';
                setTimeout(() => receiptCont.classList.add('flow-animation'), 500);
                setTimeout(() => finalActions.style.display = 'block', 6500);
            });
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'jarawee_booth.png'; link.href = resultImg.src; link.click();
        }
    </script>
</body>
</html>
