<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Film Receipt</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #d1d1d1; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 20px 0; color: #333; }
        #video-container { 
            position: relative; width: 300px; height: 300px; margin: 0 auto; 
            border: 4px solid #000; background: #000; box-shadow: 8px 8px 0px #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .timer { 
            font-family: 'Press Start 2P', cursive; font-size: 50px; position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: white; z-index: 10;
        }
        .btn { 
            background: #000; color: #fff; padding: 15px; font-family: 'Press Start 2P', cursive; 
            font-size: 10px; border: none; margin-top: 20px; width: 85%; cursor: pointer; box-shadow: 4px 4px 0px #555;
        }
        .filter-group { display: none; margin-top: 15px; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 0 10px; }
        .f-btn { background: #fff; border: 2px solid #000; padding: 8px; font-size: 9px; cursor: pointer; font-family: 'Press Start 2P', cursive; }
        .f-btn.active { background: #000; color: #fff; }
        #result-area { display: none; margin-top: 20px; padding-bottom: 80px; }
        #result-img { width: 85%; filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

    <div style="font-family: 'Press Start 2P', cursive; font-size: 11px; margin-bottom: 15px;">BOOTH NONGJANG</div>
    
    <div id="video-container">
        <div id="timer" class="timer">3</div>
        <video id="video" autoplay playsinline muted></video>
    </div>
    
    <button class="btn" id="btn-snap" onclick="startCapture()">[ มาถ่ายกันจ้า ]</button>

    <div id="filter-selection" class="filter-group">
        <button class="f-btn active" onclick="applyFilter('normal', this)">NORMAL</button>
        <button class="f-btn" onclick="applyFilter('kodak', this)">KODAK</button>
        <button class="f-btn" onclick="applyFilter('fuji', this)">FUJI</button>
        <button class="f-btn" onclick="applyFilter('bw', this)">B&W</button>
        <button class="f-btn" onclick="applyFilter('warm', this)">WARM</button>
    </div>

    <div id="result-area">
        <img id="result-img">
        <br>
        <button class="btn" style="background:#28a745;" onclick="sharePhoto()">[ เซฟด่วนนน ]</button>
    </div>

    <canvas id="c" width="600" height="1600" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let currentBlob = null;
        let capturedPhotos = []; // เก็บรูปต้นฉบับไว้ทำฟิลเตอร์

        async function initCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 720, height: 720 } });
                v.srcObject = s;
                v.play();
            } catch (err) { alert("Camera Error: Please use HTTPS and allow camera access."); }
        }
        initCamera();

        async function startCapture() {
            capturedPhotos = [];
            const timer = document.getElementById('timer');
            document.getElementById('btn-snap').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('filter-selection').style.display = 'none';

            for (let i = 0; i < 2; i++) {
                timer.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timer.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                timer.innerText = "!"; await new Promise(r => setTimeout(r, 300));
                timer.style.display = 'none';

                // เก็บภาพต้นฉบับ
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 480; tempCanvas.height = 480;
                const tCtx = tempCanvas.getContext('2d');
                tCtx.translate(480, 0); tCtx.scale(-1, 1);
                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 480, 480);
                capturedPhotos.push(tempCanvas);
            }

            drawReceipt('normal');
            document.getElementById('filter-selection').style.display = 'flex';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('btn-snap').style.display = 'inline-block';
            document.getElementById('btn-snap').innerText = "[ RETAKE ]";
        }

        function drawReceipt(filterType) {
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "black"; ctx.textAlign = "center";
            
            ctx.font = "38px 'Press Start 2P'"; ctx.fillText("CONGRATULATIONS", 300, 100);
            ctx.font = "20px 'Press Start 2P'"; ctx.fillText("to jarawee <3", 300, 150);
            ctx.font = "20px monospace"; ctx.fillText("----------------------------", 300, 190);

            capturedPhotos.forEach((photoCanvas, i) => {
                const x = 60; const y = (i * 510) + 220;
                ctx.save();
                
                // ตั้งค่าฟิลเตอร์โทนฟิล์ม
                if(filterType === 'kodak') ctx.filter = 'contrast(110%) sepia(30%) saturate(130%)';
                else if(filterType === 'fuji') ctx.filter = 'contrast(105%) hue-rotate(-10deg) saturate(110%) brightness(105%)';
                else if(filterType === 'bw') ctx.filter = 'grayscale(100%) contrast(125%)';
                else if(filterType === 'warm') ctx.filter = 'sepia(50%) brightness(95%) contrast(110%)';
                else ctx.filter = 'none';

                ctx.drawImage(photoCanvas, x, y, 480, 480);
                ctx.restore();
            });

            ctx.textAlign = "left"; ctx.font = "700 28px Sarabun";
            ctx.fillText("รายการ: ค่ารักเอ็ง 3000 บาท", 65, 1280);
            
            // บาร์โค้ดแบบไม่มีเลข
            ctx.fillStyle = "black";
            const bX = 140; const bY = 1320;
            for(let k=0; k<65; k++) {
                let w = [2, 3, 5][Math.floor(Math.random()*3)];
                ctx.fillRect(bX + (k*5), bY, w, 80);
            }
            
            ctx.textAlign = "center"; ctx.font = "16px monospace";
            ctx.fillText(new Date().toLocaleString('th-TH'), 300, 1450);
            ctx.fillText("THANK YOU FOR THE LOVE", 300, 1480);

            // รอยหยักท้ายบิล
            ctx.beginPath(); ctx.moveTo(0, 1600);
            for(let m=0; m<600; m+=20) { ctx.lineTo(m+10, 1585); ctx.lineTo(m+20, 1600); }
            ctx.fillStyle = "#d1d1d1"; ctx.fill();

            canvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
            }, 'image/jpeg', 0.9);
        }

        function applyFilter(type, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            drawReceipt(type);
        }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "receipt.jpg", {type:"image/jpeg"});
            if (navigator.share) { await navigator.share({ files: [f] }); }
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "receipt.jpg"; a.click(); }
        }
    </script>
</body>
</html>
