<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Story Photobooth</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Kanit:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #71C5EE; 
            font-family: 'Kanit', 'Fredoka One', sans-serif; 
            text-align: center; margin: 0; color: white; overflow-x: hidden; 
        }
        
        /* สไตล์ฟอนต์หัวข้อแบบ Toy Story (เหลืองขอบน้ำเงิน) */
        h1 {
            font-size: 50px;
            color: #FFD700; /* สีเหลือง */
            margin-top: 30px;
            text-transform: uppercase;
            /* เทคนิคสร้างขอบหลายชั้นด้วย Text Shadow */
            text-shadow: 
                3px 3px 0 #004AAD, 
                -3px -3px 0 #004AAD,  
                3px -3px 0 #004AAD,
                -3px 3px 0 #004AAD,
                5px 5px 10px rgba(0,0,0,0.3);
        }

        #video { 
            width: 85%; max-width: 400px; 
            border: 12px solid #FFD700; 
            border-radius: 30px; 
            margin-top: 10px; 
            box-shadow: 0 0 0 5px #004AAD; /* ขอบสองชั้นที่กล้อง */
        }

        .timer { 
            font-size: 100px; font-weight: bold; color: #E63946; 
            position: fixed; top: 45%; left: 50%; 
            transform: translate(-50%, -50%); display: none; 
            text-shadow: 4px 4px 0 #FFD700; z-index: 10; 
        }

        .btn { 
            background: #E63946; /* สีแดงแบบหมวก Woody */
            color: white; padding: 20px 45px; 
            font-size: 26px; border-radius: 50px; 
            border: 5px solid #FFD700; 
            font-weight: bold; margin-top: 25px; 
            cursor: pointer; 
            box-shadow: 0 6px 0 #A61D24;
            transition: 0.2s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #A61D24; }

        #result-area { display: none; margin-top: 25px; padding-bottom: 30px; }
        #result-img { max-width: 85%; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
    <h1>Toy Booth</h1>
    
    <div id="timer" class="timer">3</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="c" width="800" height="1600" style="display:none;"></canvas>
    
    <br>
    <button class="btn" id="btn" onclick="start()">เริ่มถ่ายรูป</button>
    
    <div id="result-area">
        <img id="result-img">
        <p style="color: #004AAD; font-size: 20px;"><b>✨ บันทึกรูปแล้วไปปริ้นท์ได้เลย! ✨</b></p>
    </div>

    <script>
        const v = document.getElementById('video');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const timer = document.getElementById('timer');
        const resArea = document.getElementById('result-area');
        const resImg = document.getElementById('result-img');
        const btn = document.getElementById('btn');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => v.srcObject = s);

        async function start() {
            btn.style.display = 'none';
            resArea.style.display = 'none';
            
            // วาดกรอบพื้นหลังสีฟ้าลายเมฆ
            ctx.fillStyle = "#71C5EE";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // วาดเมฆจำลอง
            ctx.fillStyle = "white";

            for (let i = 0; i < 2; i++) {
                timer.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timer.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                timer.innerText = "เริ่ด!";
                
                const photoSize = 700;
                const x = 50;
                const y = (i * 750) + 100;
                
                // ขอบขาวรอบรูป
                ctx.fillStyle = "white";
                ctx.fillRect(x - 10, y - 10, photoSize + 20, photoSize + 20);
                ctx.drawImage(v, x, y, photoSize, photoSize); 
                
                await new Promise(r => setTimeout(r, 500));
                timer.style.display = 'none';
            }
            
            // วาดตัวอักษรบนกรอบ (Style Toy Story)
            ctx.textAlign = "center";
            ctx.font = "bold 70px Kanit";
            
            // วาดเงา/ขอบตัวอักษรบนกรอบรูป
            ctx.fillStyle = "#004AAD"; // ขอบนอกสีน้ำเงิน
            ctx.fillText("TOY BOOTH", canvas.width/2 + 4, 84);
            ctx.fillStyle = "#FFD700"; // ตัวอักษรสีเหลือง
            ctx.fillText("TOY BOOTH", canvas.width/2, 80);
