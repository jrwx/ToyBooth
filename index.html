<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth - Magical Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #ff3e3e; --text-dim: #a0a0a0; }
        body { background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #fff; overflow-x: hidden; }

        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'VT323'; font-size: 28px; letter-spacing: 2px; margin-bottom: 25px; color: #a0a0a0; text-transform: uppercase; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .m-btn { background: #333; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase; }
        .m-btn.active { background: var(--accent); box-shadow: 0 0 15px rgba(255, 62, 62, 0.4); }

        #booth-machine { position: relative; width: 100%; max-width: 360px; background: var(--card-bg); padding: 8px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        #display-box { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; border-radius: 15px; border: 3px solid #333; transition: all 0.3s ease; }
        
        #display-box video {
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            transform: scaleX(-1);
            z-index: 1;
        }

        #booth-machine.news-mode { max-width: 400px; }
        #display-box.news-mode { 
            aspect-ratio: 1000/1400 !important; 
            background: #e3dccb; 
        }

        #display-box.news-mode video {
    width: 80% !important;
    height: 32.14% !important;
    left: 14.5% !important;
    top: 24.28% !important;

    /* โทนเดียวกับรูป final */
    filter: sepia(1) saturate(0.7) contrast(1.2) brightness(0.9) grayscale(0.4) !important;

    opacity: 0.96;
}

        #preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none; 
            z-index: 5;
            object-fit: fill;
        }

        #flash {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.08s ease;
}
        .timer { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 11; font-size: 70px; display: none; font-family: 'Press Start 2P'; text-shadow: 4px 4px 0px #000; }

        .controls { margin-top: 25px; width: 100%; max-width: 360px; }
        .filter-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .f-btn { background: transparent; color: var(--text-dim); border: 2px solid #333; width: 60px; height: 60px; border-radius: 50%; font-size: 9px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; transform: scale(1.1); }
        .btn-snap { background: var(--accent); color: #fff; padding: 22px; font-size: 18px; font-weight: bold; border: none; width: 100%; border-radius: 100px; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 62, 62, 0.4); text-transform: uppercase; }

        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; }
        .print-container { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); width: 90%; max-width: 300px; }
        .flow-animation { animation: slideDownPaper 7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDownPaper { 0% { transform: translate(-50%, -100%); } 100% { transform: translate(-50%, 40px); } } 
    .print-container.news-roll {
    animation: newspaperUnroll 2.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    clip-path: inset(0 0 100% 0);
}

@keyframes newspaperUnroll {
    0% {
        transform: translate(-50%, -40px);
        clip-path: inset(0 0 100% 0);
        opacity: 0.4;
    }
    30% {
        transform: translate(-50%, -10px);
        clip-path: inset(0 0 85% 0);
        opacity: 1;
    }
    60% {
        transform: translate(-50%, 10px);
        clip-path: inset(0 0 40% 0);
    }
    100% {
        transform: translate(-50%, 40px);
        clip-path: inset(0 0 0% 0);
    }
}
        #result-img { width: 100%; display: block; box-shadow: 0 0 70px rgba(0,0,0,1); }
        #final-actions { position: absolute; bottom: 50px; left: 0; width: 100%; display: none; text-align: center; }
        .btn-save { background: rgba(255, 255, 255, 0.9); color: #000; padding: 16px 32px; font-size: 11px; font-weight: bold; border: none; border-radius: 100px; cursor: pointer; margin: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">Congratulations to Jarawee!</div>
        
        <div class="mode-selector">
            <button class="m-btn active" id="btn-m-receipt" onclick="changeMode('receipt')">Receipt Strip</button>
            <button class="m-btn" id="btn-m-news" onclick="changeMode('news')">Newspaper</button>
        </div>

        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <img id="preview-overlay" src="https://raw.githubusercontent.com/jrwx/my-booth/refs/heads/main/harry.PNG">
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
            </div>
        </div>

        <div class="controls">
            <div class="filter-group" id="filter-ui">
                <button class="f-btn active" onclick="setF('none', this)">Normal</button>
                <button class="f-btn" onclick="setF('kodak', this)">Film</button>
                <button class="f-btn" onclick="setF('bw', this)">B&W</button>
            </div>
            <button class="btn-snap" id="snap-btn" onclick="takePhotos()">กดถ่ายเลย!</button>
        </div>
    </div>

    <div id="print-page">
        <div class="print-container" id="print-cont">
            <img id="result-img">
        </div>
        <div id="final-actions">
    <button class="btn-save" onclick="saveImage()">เซฟรูปภาพ</button>
    <button class="btn-save" onclick="printImage()">ปริ้นต์</button>
    <button class="btn-save" style="background: #333; color: #fff;" onclick="location.reload()">ถ่ายใหม่</button>
</div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const timer = document.getElementById('timer');
        const flash = document.getElementById('flash');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const printPage = document.getElementById('print-page');
        const printCont = document.getElementById('print-cont');
        const finalActions = document.getElementById('final-actions');
        const previewOverlay = document.getElementById('preview-overlay');
        const filterUI = document.getElementById('filter-ui');

        let filterStyle = 'none';
        let currentMode = 'receipt';
        let finalBlob = null;

        const newsFrame = new Image();
        newsFrame.crossOrigin = "anonymous";
        newsFrame.src = 'https://raw.githubusercontent.com/jrwx/my-booth/refs/heads/main/harry.PNG'; 

        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch(e) { alert("กรุณาเปิดกล้องจ้า"); }
        }
        startCam();

        function changeMode(mode) {
            currentMode = mode;
            const booth = document.getElementById('booth-machine');
            const display = document.getElementById('display-box');
            document.getElementById('btn-m-receipt').classList.toggle('active', mode === 'receipt');
            document.getElementById('btn-m-news').classList.toggle('active', mode === 'news');
            
            if (mode === 'news') {
                booth.classList.add('news-mode');
                display.classList.add('news-mode');
                previewOverlay.style.display = 'block';
                filterUI.style.visibility = 'hidden'; // ซ่อนตัวเลือกฟิลเตอร์ในโหมดนสพ.
            } else {
                booth.classList.remove('news-mode');
                display.classList.remove('news-mode');
                previewOverlay.style.display = 'none';
                filterUI.style.visibility = 'visible';
            }
        }

        function setF(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'none') filterStyle = 'none';
            else if(mode === 'kodak') filterStyle = 'contrast(1.2) saturate(1.4) sepia(0.1)';
            else if(mode === 'bw') filterStyle = 'grayscale(1) contrast(1.4)';
            
            // ถ้าไม่ใช่โหมดนสพ. ให้เปลี่ยน Filter ตามปกติ
            if(currentMode !== 'news') video.style.filter = filterStyle;
        }

        async function takePhotos() {
            const pics = [];
            const photoCount = (currentMode === 'news') ? 1 : 2;
            document.getElementById('snap-btn').style.opacity = '0';

            for(let i=0; i<photoCount; i++) {
                timer.style.display = 'block';
                for(let s=3; s>0; s--) { timer.innerText = s; await new Promise(r => setTimeout(r, 1000)); }
                timer.style.display = 'none';
                if (currentMode === 'news') {
    flash.style.background = 'white';
    flash.style.opacity = '1';

    setTimeout(() => {
        flash.style.opacity = '0.85';
    }, 60);

    setTimeout(() => {
        flash.style.opacity = '0';
    }, 180);
} else {
    flash.style.opacity = '1';
    setTimeout(() => flash.style.opacity = '0', 100);
}

                const pCanvas = document.createElement('canvas');
                pCanvas.width = video.videoWidth;
                pCanvas.height = video.videoHeight;
                const pCtx = pCanvas.getContext('2d');
                
                // บังคับฟิลเตอร์ถ้าเป็นโหมดนสพ.
if(currentMode === 'news') {
    pCtx.filter = 'sepia(1) saturate(2) contrast(1.8) brightness(0.4) grayscale(0.2)';
} else {
    pCtx.filter = filterStyle;
}
                
                pCtx.translate(pCanvas.width, 0); pCtx.scale(-1, 1);
                pCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
                
                pics.push(pCanvas);
                if(i < photoCount - 1) await new Promise(r => setTimeout(r, 1000));
            }
            
            if (currentMode === 'news') buildNewspaper(pics[0]);
            else buildReceipt(pics);
        }

        function buildReceipt(pics) {
            canvas.width = 600;
            canvas.height = 1520;
            ctx.clearRect(0,0,600,1520);
            ctx.fillStyle = "#fdfaf5"; 
            ctx.fillRect(0, 0, 600, 1520);
            for(let i=0; i<5000; i++) { ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.05})`; ctx.fillRect(Math.random()*600, Math.random()*1520, 1, 1); }
            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = "bold 90px 'VT323'"; ctx.fillText("Congrats!!", 300, 115);
            ctx.font = "48px 'VT323'"; ctx.fillText("To Jarawee <3", 300, 175);
            ctx.font = "20px monospace"; ctx.fillText("------------------------------", 300, 215);
            ctx.textAlign = "left"; ctx.font = "32px 'VT323'";
            ctx.fillText("Order: #" + Math.floor(100000 + Math.random()*900000), 90, 260);
            pics.forEach((p, idx) => {
                const y = 300 + (idx * 440);
                const s = Math.min(p.width, p.height);
                const sx = (p.width - s) / 2;
                const sy = (p.height - s) / 2;
                ctx.drawImage(p, sx, sy, s, s, 90, y, 420, 420);
                ctx.strokeStyle = "#222"; ctx.lineWidth = 2; ctx.strokeRect(90, y, 420, 420);
            });
            ctx.font = "bold 25px Sarabun"; ctx.fillText("รายการ: ค่ารักเอ็ง ;-)", 90, 1200);
            for(let k=0; k<60; k++) { ctx.fillRect(90+(k*7), 1250, [2,4,5][Math.floor(Math.random()*3)], 80); }
            ctx.textAlign = "center"; ctx.font = "26px 'VT323'"; ctx.fillText(new Date().toLocaleString(), 300, 1380);
            ctx.globalAlpha = 0.5; ctx.font = "32px 'VT323'"; ctx.fillText("THANK YOU FOR BEING TOGETHER <3", 300, 1440);
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.moveTo(0, 1520);
            let step = 60;
            for(let x=0; x<=600; x+=step) { ctx.lineTo(x + step/2, 1490 + (Math.random()*20)); ctx.lineTo(x + step, 1520); }
            ctx.fill(); ctx.globalCompositeOperation = 'source-over';
            renderFinal();
        }        

    function buildNewspaper(pic) {
    canvas.width = 1000; 
    canvas.height = 1400;

    ctx.fillStyle = "#e3dccb"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const photoW = 800;  
    const photoH = 450;  
    const photoX = 145; 
    const photoY = 340; 

    const targetRatio = photoW / photoH;
    const zoomFactor = 1.0;

    let sw = pic.width * zoomFactor;
    let sh = sw / targetRatio;

    if (sh > pic.height * zoomFactor) {
        sh = pic.height * zoomFactor;
        sw = sh * targetRatio;
    }

    let sx = (pic.width - sw) / 2;
    let sy = (pic.height - sh) / 2;

    // วาดรูปก่อน
    ctx.drawImage(pic, sx, sy, sw, sh, photoX, photoY, photoW, photoH);

    // ดึง pixel มาแต่งโทนหนังสือพิมพ์
    const imageData = ctx.getImageData(photoX, photoY, photoW, photoH);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
        // แปลงเป็น grayscale ก่อน
        let gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;

        // ✅ เพิ่ม grain แบบสุ่ม
        const grain = (Math.random() - 0.5) * 30;
        gray += grain;

        // จำกัดค่า
        gray = Math.max(0, Math.min(255, gray));

        // ✅ ทำโทนน้ำตาลกระดาษเก่า
        data[i]     = gray * 1.08; // R
        data[i + 1] = gray * 0.95; // G
        data[i + 2] = gray * 0.75; // B
    }

    ctx.putImageData(imageData, photoX, photoY);

    // ✅ เพิ่ม halftone dots
    ctx.fillStyle = "rgba(60,40,20,0.08)";
    for (let y = photoY; y < photoY + photoH; y += 6) {
        for (let x = photoX; x < photoX + photoW; x += 6) {
            ctx.beginPath();
            ctx.arc(x, y, 0.8, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // วาดกรอบทับ
    if (newsFrame.complete) {
        ctx.drawImage(newsFrame, 0, 0, 1000, 1400);
    }

    renderFinal();
}
        function renderFinal() {
            canvas.toBlob(blob => {
                finalBlob = blob; resultImg.src = URL.createObjectURL(blob);
                document.getElementById('camera-ui').style.display = 'none';
                printPage.style.display = 'block';
                setTimeout(() => {
    if (currentMode === 'news') {
        printCont.classList.add('news-roll');
    } else {
        printCont.classList.add('flow-animation');
    }
}, 500);
                setTimeout(() => { finalActions.style.display = 'block'; }, 6500);
            }, 'image/png');
        }

        async function saveImage() {
    if (!finalBlob) return;

    const fileName = (currentMode === 'news')
        ? 'jarawee_newspaper.png'
        : 'jarawee_receipt.png';

    const file = new File([finalBlob], fileName, { type: 'image/png' });

    // ✅ iPhone / Safari / PWA = เซฟเข้ารูปได้เลย
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
            await navigator.share({
                files: [file],
                title: 'Jarawee Booth',
                text: 'บันทึกรูปภาพ'
            });
            return;
        } catch (e) {
            console.log("แชร์ถูกยกเลิก");
        }
    }

    // fallback ถ้า browser ไม่รองรับ
    const link = document.createElement('a');
    link.download = fileName;
    link.href = resultImg.src;
    link.click();
}
        function printImage() {
    const printWindow = window.open('', '_blank');

    const paperWidth = currentMode === 'receipt' ? '58mm' : '100mm';
    const paperHeight = currentMode === 'receipt' ? '220mm' : '160mm';

    printWindow.document.write(`
        <html>
        <head>
            <title>Print Strip</title>
            <style>
                @page {
                    size: ${paperWidth} ${paperHeight};
                    margin: 0;
                }

                body {
                    margin: 0;
                    padding: 0;
                    width: ${paperWidth};
                    background: white;
                    text-align: center;
                }

                img {
                    width: 100%;
                    height: auto;
                    display: block;
                }
            </style>
        </head>
        <body>
            <img src="${resultImg.src}" onload="window.print(); window.close();">
        </body>
        </html>
    `);

    printWindow.document.close();
}
    </script>
</body>
</html>
