<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=UnifrakturMaguntia&family=Sarabun:wght@400;700&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --accent: #ff3e3e; --text-dim: #a0a0a0; }
        body { background: var(--bg); font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #fff; overflow-x: hidden; }
        
        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'VT323'; font-size: 28px; letter-spacing: 2px; margin-bottom: 25px; color: var(--text-dim); text-transform: uppercase; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .m-btn { background: #333; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase; }
        .m-btn.active { background: var(--accent); }

        #booth-machine { position: relative; width: 100%; max-width: 360px; background: var(--card-bg); padding: 8px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        #display-box { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; border-radius: 15px; }
        #display-box.news-mode { aspect-ratio: 4/5; }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 10; pointer-events: none; }
        .timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 11; font-size: 70px; display: none; font-family: 'Press Start 2P'; }

        .controls { margin-top: 25px; width: 100%; max-width: 360px; }
        .filter-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .f-btn { background: transparent; color: var(--text-dim); border: 2px solid #333; width: 60px; height: 60px; border-radius: 50%; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; }
        
        .btn-snap { background: var(--accent); color: #fff; padding: 22px; font-size: 18px; font-weight: bold; border: none; width: 100%; border-radius: 100px; cursor: pointer; text-transform: uppercase; }

        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; }
        .print-container { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); width: 90%; max-width: 300px; }
        .flow-animation { animation: slideDown 7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDown { 0% { transform: translate(-50%, -100%); } 100% { transform: translate(-50%, 40px); } }

        #result-img { width: 100%; display: block; box-shadow: 0 0 70px rgba(0,0,0,1); }
        #final-actions { position: absolute; bottom: 50px; left: 0; width: 100%; display: none; text-align: center; }
        .btn-save { background: rgba(255, 255, 255, 0.9); color: #000; padding: 16px 32px; font-size: 11px; font-weight: bold; border: none; border-radius: 100px; cursor: pointer; margin: 8px; }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">Congratulations to Jarawee!</div>
        <div class="mode-selector">
            <button class="m-btn active" id="btn-m-receipt" onclick="setMode('receipt')">Receipt</button>
            <button class="m-btn" id="btn-m-news" onclick="setMode('news')">Newspaper</button>
        </div>
        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
            </div>
        </div>
        <div class="controls">
            <div class="filter-group">
                <button class="f-btn active" id="f-norm" onclick="setF('none', this)">Normal</button>
                <button class="f-btn" id="f-film" onclick="setF('kodak', this)">Film</button>
                <button class="f-btn" id="f-bw" onclick="setF('bw', this)">B&W</button>
            </div>
            <button class="btn-snap" id="snap-btn" onclick="takePhotos()">มาถ่ายด่วนน</button>
        </div>
    </div>

    <div id="print-page">
        <div class="print-container" id="print-cont">
            <img id="result-img">
        </div>
        <div id="final-actions">
            <button class="btn-save" onclick="saveImage()">เซฟเข้าแกลลอรี่</button>
            <button class="btn-save" style="background:#444; color:#fff" onclick="location.reload()">ถ่ายใหม่เถอะ</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const timer = document.getElementById('timer');
        const flash = document.getElementById('flash');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const printPage = document.getElementById('print-page');
        const printCont = document.getElementById('print-cont');
        const finalActions = document.getElementById('final-actions');

        let filterStyle = 'none';
        let currentMode = 'receipt';

        async function startCam() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
        }
        startCam();

        function setMode(m) {
            currentMode = m;
            document.getElementById('btn-m-receipt').classList.toggle('active', m === 'receipt');
            document.getElementById('btn-m-news').classList.toggle('active', m === 'news');
            document.getElementById('display-box').classList.toggle('news-mode', m === 'news');
            if(m === 'news') setF('bw', document.getElementById('f-bw'));
            else setF('none', document.getElementById('f-norm'));
        }

        function setF(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'none') filterStyle = 'none';
            else if(mode === 'kodak') filterStyle = 'contrast(1.2) saturate(1.4) sepia(0.1)';
            else if(mode === 'bw') filterStyle = 'grayscale(1) contrast(1.3)';
            video.style.filter = filterStyle;
        }

        async function takePhotos() {
            const pics = [];
            const count = (currentMode === 'receipt') ? 2 : 1;
            document.getElementById('snap-btn').style.opacity = '0';

            for(let i=0; i<count; i++) {
                timer.style.display = 'block';
                for(let s=3; s>0; s--) { timer.innerText = s; await new Promise(r => setTimeout(r, 1000)); }
                timer.style.display = 'none';
                
                // เปิดแฟลชทุกโหมดตามสั่ง
                flash.style.opacity = '1'; 
                setTimeout(() => flash.style.opacity = '0', 100);

                const pCanvas = document.createElement('canvas');
                pCanvas.width = 800; pCanvas.height = (currentMode === 'receipt') ? 800 : 1000;
                const pCtx = pCanvas.getContext('2d');
                pCtx.filter = filterStyle;
                pCtx.translate(pCanvas.width, 0); pCtx.scale(-1, 1);
                
                const vW = video.videoWidth; const vH = video.videoHeight;
                const targetAspect = pCanvas.width / pCanvas.height;
                let sW, sH, sX, sY;
                if (vW/vH > targetAspect) { sH = vH; sW = vH * targetAspect; sX = (vW - sW)/2; sY = 0; }
                else { sW = vW; sH = vW / targetAspect; sX = 0; sY = (vH - sH)/2; }
                
                pCtx.drawImage(video, sX, sY, sW, sH, 0, 0, pCanvas.width, pCanvas.height);
                pics.push(pCanvas);
                if(i < count-1) await new Promise(r => setTimeout(r, 1000));
            }
            if(currentMode === 'receipt') buildReceipt(pics); else buildNews(pics[0]);
        }

        function buildReceipt(pics) {
            canvas.width = 600; canvas.height = 1520;
            ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, 600, 1520);
            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = "bold 90px 'VT323'"; ctx.fillText("Congrats!!", 300, 115);
            ctx.font = "48px 'VT323'"; ctx.fillText("To Jarawee <3", 300, 175);
            ctx.font = "20px monospace"; ctx.fillText("------------------------------", 300, 215);
            ctx.textAlign = "left"; ctx.font = "32px 'VT323'";
            ctx.fillText("Order: #" + Math.floor(100000 + Math.random()*900000), 90, 260);
            pics.forEach((p, idx) => {
                ctx.drawImage(p, 90, 300 + (idx * 440), 420, 420);
                ctx.strokeRect(90, 300 + (idx * 440), 420, 420);
            });
            ctx.font = "bold 25px Sarabun"; ctx.fillText("รายการ: ค่ารักเอ็ง ;-)", 90, 1200);
            ctx.textAlign = "center"; ctx.font = "26px 'VT323'"; ctx.fillText(new Date().toLocaleString(), 300, 1380);
            ctx.globalAlpha = 0.5; ctx.font = "32px 'VT323'"; ctx.fillText("THANK YOU FOR BEING TOGETHER <3", 300, 1440);
            renderResult();
        }

        function buildNews(pic) {
            canvas.width = 800; canvas.height = 1200;
            ctx.fillStyle = "#e3dccb"; ctx.fillRect(0,0,800,1200);
            ctx.fillStyle = "#1a1a1a"; ctx.textAlign = "center";
            
            // Header Section
            ctx.font = "bold 110px 'UnifrakturMaguntia'"; ctx.fillText("DAILY PROPHET", 400, 120);
            ctx.fillRect(40, 140, 720, 3);
            ctx.font = "bold 18px 'IM Fell English SC'";
            ctx.fillText("PRICE: 1/2 SICKLE | LONDON, " + new Date().toDateString().toUpperCase() + " | WEATHER: SUNNY", 400, 165);
            ctx.fillRect(40, 180, 720, 1);

            // Headline
            ctx.font = "bold 75px 'IM Fell English SC'"; ctx.fillText("THE GIRL WHO SMILES", 400, 260);
            
            // Main Image
            ctx.drawImage(pic, 150, 300, 500, 625);
            ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 15; ctx.strokeRect(150, 300, 500, 625);

            // Text Columns (Fake News)
            ctx.textAlign = "left"; ctx.font = "14px 'IM Fell English SC'";
            const text = "A truly remarkable occurrence has been recorded today in the heart of the wizarding world. Witnesses claim the joy captured in this frame is enough to ward off a hundred Dementors. The Ministry of Magic has yet to comment on this sudden burst of pure happiness, but sources suggest it may be linked to a celebration of monumental proportions. High-ranking officials were seen raising their goblets in honor of Jarawee, whose presence has brightened even the gloomiest corners of Diagon Alley.";
            wrapText(text, 50, 960, 340, 18);
            wrapText(text, 410, 960, 340, 18);

            renderResult();
        }

        function wrapText(text, x, y, maxWidth, lineHeight) {
            let words = text.split(' '); let line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                    ctx.fillText(line, x, y); line = words[n] + ' '; y += lineHeight;
                } else line = testLine;
            }
            ctx.fillText(line, x, y);
        }

        function renderResult() {
            canvas.toBlob(blob => {
                resultImg.src = URL.createObjectURL(blob);
                document.getElementById('camera-ui').style.display = 'none';
                printPage.style.display = 'block';
                setTimeout(() => printCont.classList.add('flow-animation'), 500);
                setTimeout(() => finalActions.style.display = 'block', 6500);
            });
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'booth_capture.png'; link.href = resultImg.src; link.click();
        }
    </script>
</body>
</html>
