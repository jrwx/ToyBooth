<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Full Print Booth</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #eee; overflow: hidden; }
        
        /* 1. ส่วนของตัวเครื่องและกล้อง (รูปแบบเดิมที่พี่ชอบ) */
        #booth-machine { position: relative; width: 340px; margin: 20px auto; background: #333; padding: 12px; border-radius: 15px; border: 4px solid #555; box-shadow: 0 30px 60px rgba(0,0,0,0.8); z-index: 10; }
        
        #main-display { position: relative; width: 310px; height: 310px; margin: 0 auto; background: #000; overflow: hidden; border: 2px solid #000; }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Camera UI Overlays */
        #camera-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; font-family: 'VT323', monospace; color: #fff; }
        .cam-top-left { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; }
        .cam-top-right { position: absolute; top: 10px; right: 10px; color: #f00; animation: blink 1s infinite; }
        .cam-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; opacity: 0.2; }
        .cam-grid div { border: 0.5px solid #fff; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #shutter-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 100; pointer-events: none; }

        /* 2. ส่วนใบเสร็จไหลเต็มจอ (ไหลมาจากขอบบนสุดของ Browser) */
        #print-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            display: none; justify-content: center; z-index: 999; 
            background: rgba(0,0,0,0.8); overflow-y: auto; scrollbar-width: none;
        }
        #print-overlay::-webkit-scrollbar { display: none; }

        .receipt-paper { 
            position: relative; width: 100%; max-width: 450px; /* ขยายให้เกือบเต็มหน้าจอ */
            background: #fdfaf5; transform: translateY(-100%); 
            box-shadow: 0 0 50px rgba(0,0,0,1); 
        }
        
        /* Animation การไหลลื่นสมูท */
        .printing-act { animation: fullSlideDown 7s linear forwards; }
        
        @keyframes fullSlideDown { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(0); } 
        }

        #result-img { width: 100%; display: block; mix-blend-mode: multiply; }
        .torn-edge { width: 100%; height: 20px; background: #000; clip-path: polygon(0% 100%, 5% 15%, 10% 100%, 15% 20%, 20% 100%, 25% 15%, 30% 100%, 35% 25%, 40% 100%, 45% 15%, 50% 100%, 55% 20%, 60% 100%, 65% 15%, 70% 100%, 75% 25%, 80% 100%, 85% 15%, 90% 100%, 95% 20%, 100% 100%); }

        /* ปุ่มควบคุม */
        .timer-overlay { font-family: 'Press Start 2P', cursive; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 110; }
        #timer-num { font-size: 60px; display: none; }
        
        #controls { margin-top: 20px; }
        .btn-main { background: #ff3e3e; color: #fff; padding: 18px; font-family: 'Press Start 2P', cursive; font-size: 11px; border: none; width: 280px; cursor: pointer; border-radius: 10px; box-shadow: 0 6px 0 #b32a2a; }
        
        #action-buttons { display: none; position: relative; z-index: 1000; padding: 40px 0 100px 0; }
    </style>
</head>
<body>

    <div style="font-family: 'VT323', monospace; font-size: 28px; margin-top: 20px;">DIGITAL CAM BOOTH</div>

    <div id="booth-machine">
        <div id="main-display">
            <div id="camera-ui">
                <div class="cam-top-left"><span>[🔋]</span><span>FULL</span></div>
                <div class="cam-top-right">● REC</div>
                <div class="cam-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
            </div>
            <div id="shutter-flash"></div>
            <video id="video" autoplay playsinline muted></video>
            <div class="timer-overlay"><div id="timer-num">3</div></div>
        </div>
    </div>

    <div id="controls">
        <button class="btn-main" id="btn-snap" onclick="startCapture()">TAKE PHOTO</button>
    </div>

    <div id="print-overlay">
        <div id="receipt-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="receipt-paper" id="receipt-paper">
                <img id="result-img">
                <div class="torn-edge"></div>
            </div>
            
            <div id="action-buttons">
                <button class="btn-main" style="background:#fff; color:#000; box-shadow: 0 6px 0 #ccc;" onclick="sharePhoto()">SAVE RECEIPT</button>
                <br><br>
                <button class="btn-main" style="background:#444; box-shadow: 0 6px 0 #222;" onclick="location.reload()">RETAKE</button>
            </div>
        </div>
    </div>

    <canvas id="c" width="600" height="1520" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const flash = document.getElementById('shutter-flash');
        const tNum = document.getElementById('timer-num');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const printOverlay = document.getElementById('print-overlay');
        const receiptPaper = document.getElementById('receipt-paper');
        const actionButtons = document.getElementById('action-buttons');
        
        let currentBlob = null;
        let stream = null;

        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = stream;
            } catch (e) { alert("เปิดกล้องไม่ได้ครับ"); }
        }
        init();

        async function startCapture() {
            const photos = [];
            document.getElementById('btn-snap').style.display = 'none';

            for (let i = 0; i < 2; i++) {
                tNum.style.display = 'block';
                for (let j = 3; j > 0; j--) { tNum.innerText = j; await new Promise(r => setTimeout(r, 1000)); }
                tNum.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const tmp = document.createElement('canvas');
                tmp.width = 420; tmp.height = 420;
                const tCtx = tmp.getContext('2d');
                tCtx.translate(420, 0); tCtx.scale(-1, 1);
                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 420, 420);
                
                photos.push(tmp);
                if(i === 0) await new Promise(r => setTimeout(r, 1200)); 
            }
            generateFinalReceipt(photos);
        }

        function generateFinalReceipt(photos) {
            const orderNo = Math.floor(100000 + Math.random() * 900000);
            ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Texture
            for(let i=0; i<5000; i++) { ctx.fillStyle = `rgba(0,0,0,0.05)`; ctx.fillRect(Math.random()*600, Math.random()*1520, 1.2, 1.2); }

            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = "bold 60px 'VT323'"; ctx.fillText("JARAWEE BOOTH", 300, 100);
            ctx.font = "20px monospace"; ctx.fillText("------------------------------", 300, 160);

            // Order No ชิดซ้าย
            ctx.textAlign = "left"; 
            ctx.font = "22px 'VT323'"; ctx.fillText("Order: #" + orderNo, 90, 200);

            photos.forEach((img, i) => {
                const y = (i * 440) + 240;
                ctx.drawImage(img, 90, y, 420, 420);
                ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.strokeRect(90, y, 420, 420);
            });

            ctx.font = "bold 24px Sarabun"; ctx.fillText("รายการ: ความรักความหล่อ 100%", 90, 1150);
            
            // Barcode
            ctx.fillStyle = "#111"; const bx = 90; const by = 1220;
            for(let k=0; k<70; k++) { let w = [2, 4, 7][Math.floor(Math.random()*3)]; ctx.fillRect(bx + (k*6), by, w, 80); }
            
            ctx.textAlign = "center"; 
            ctx.font = "bold 24px 'VT323'"; ctx.fillText(new Date().toLocaleString('th-TH'), 300, 1360);

            canvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
                startPrinting();
            }, 'image/png');
        }

        function startPrinting() {
            // โชว์แผ่นปริ้นท์ทับทั้งหน้าจอ
            printOverlay.style.display = 'flex';
            receiptPaper.classList.add('printing-act');
            
            // เมื่อปริ้นท์เสร็จค่อยโชว์ปุ่ม
            setTimeout(() => { 
                actionButtons.style.display = 'block';
            }, 7200);
        }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "receipt.png", {type:"image/png"});
            if (navigator.share) await navigator.share({ files: [f] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "receipt.png"; a.click(); }
        }
    </script>
</body>
</html>
