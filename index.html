<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Pro Booth - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #ff3e3e; --text-dim: #a0a0a0; }
        body { background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 0; color: #fff; overflow-x: hidden; }

        #camera-ui { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-title { font-family: 'VT323'; font-size: 28px; letter-spacing: 2px; margin-bottom: 25px; color: #a0a0a0; text-transform: uppercase; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .m-btn { background: #333; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase; }
        .m-btn.active { background: var(--accent); box-shadow: 0 0 15px rgba(255, 62, 62, 0.4); }

        #booth-machine { position: relative; width: 100%; max-width: 360px; background: var(--card-bg); padding: 8px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        #display-box { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; border-radius: 15px; border: 3px solid #333; transition: all 0.3s ease; }
        
        /* แก้ไขให้กล้องมือถือฟิตเต็มจอ 16:9 */
        #display-box video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            transform: scaleX(-1);
        }

        #booth-machine.news-mode { max-width: 480px; }
        #display-box.news-mode { aspect-ratio: 16/9 !important; }

        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 10; pointer-events: none; }
        .timer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 11; font-size: 70px; display: none; font-family: 'Press Start 2P'; }

        .controls { margin-top: 25px; width: 100%; max-width: 360px; }
        .filter-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .f-btn { background: transparent; color: var(--text-dim); border: 2px solid #333; width: 60px; height: 60px; border-radius: 50%; font-size: 9px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .f-btn.active { background: #fff; color: #000; border-color: #fff; transform: scale(1.1); }
        .btn-snap { background: var(--accent); color: #fff; padding: 22px; font-size: 18px; font-weight: bold; border: none; width: 100%; border-radius: 100px; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 62, 62, 0.4); text-transform: uppercase; }

        #print-page { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100; overflow: hidden; }
        .print-container { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); width: 90%; max-width: 300px; }
        .flow-animation { animation: slideDownPaper 7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideDownPaper { 0% { transform: translate(-50%, -100%); } 100% { transform: translate(-50%, 40px); } }

        #result-img { width: 100%; display: block; box-shadow: 0 0 70px rgba(0,0,0,1); }
        #final-actions { position: absolute; bottom: 50px; left: 0; width: 100%; display: none; text-align: center; }
        .btn-save { background: rgba(255, 255, 255, 0.9); color: #000; padding: 16px 32px; font-size: 11px; font-weight: bold; border: none; border-radius: 100px; cursor: pointer; margin: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="camera-ui">
        <div class="header-title">Congratulations to Jarawee!</div>
        
        <div class="mode-selector">
            <button class="m-btn active" id="btn-m-receipt" onclick="changeMode('receipt')">Receipt Strip</button>
            <button class="m-btn" id="btn-m-news" onclick="changeMode('news')">Newspaper</button>
        </div>

        <div id="booth-machine">
            <div id="display-box">
                <video id="video" autoplay playsinline muted></video>
                <div id="flash"></div>
                <div id="timer" class="timer">3</div>
            </div>
        </div>

        <div class="controls">
            <div class="filter-group">
                <button class="f-btn active" onclick="setF('none', this)">Normal</button>
                <button class="f-btn" onclick="setF('kodak', this)">Film</button>
                <button class="f-btn" onclick="setF('bw', this)">B&W</button>
            </div>
            <button class="btn-snap" id="snap-btn" onclick="takePhotos()">กดถ่ายเลย!</button>
        </div>
    </div>

    <div id="print-page">
        <div class="print-container" id="print-cont">
            <img id="result-img">
        </div>
        <div id="final-actions">
            <button class="btn-save" onclick="saveImage()">เซฟรูปภาพ</button>
            <button class="btn-save" style="background: #333; color: #fff;" onclick="location.reload()">ถ่ายใหม่</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const timer = document.getElementById('timer');
        const flash = document.getElementById('flash');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImg = document.getElementById('result-img');
        const printPage = document.getElementById('print-page');
        const printCont = document.getElementById('print-cont');
        const finalActions = document.getElementById('final-actions');

        let filterStyle = 'none';
        let currentMode = 'receipt';
        let finalBlob = null;

        const newsFrame = new Image();
        newsFrame.crossOrigin = "anonymous";
        newsFrame.src = 'https://raw.githubusercontent.com/jrwx/my-booth/refs/heads/main/harry.PNG'; 

        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch(e) { alert("กรุณาเปิดกล้องจ้า"); }
        }
        startCam();

        function changeMode(mode) {
            currentMode = mode;
            const booth = document.getElementById('booth-machine');
            const display = document.getElementById('display-box');
            document.getElementById('btn-m-receipt').classList.toggle('active', mode === 'receipt');
            document.getElementById('btn-m-news').classList.toggle('active', mode === 'news');
            
            if (mode === 'news') {
                booth.classList.add('news-mode');
                display.classList.add('news-mode');
            } else {
                booth.classList.remove('news-mode');
                display.classList.remove('news-mode');
            }
        }

        function setF(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(mode === 'none') filterStyle = 'none';
            else if(mode === 'kodak') filterStyle = 'contrast(1.2) saturate(1.4) sepia(0.1)';
            else if(mode === 'bw') filterStyle = 'grayscale(1) contrast(1.4)';
            video.style.filter = filterStyle;
        }

        async function takePhotos() {
            const pics = [];
            const photoCount = (currentMode === 'news') ? 1 : 2;
            document.getElementById('snap-btn').style.opacity = '0';

            for(let i=0; i<photoCount; i++) {
                timer.style.display = 'block';
                for(let s=3; s>0; s--) { timer.innerText = s; await new Promise(r => setTimeout(r, 1000)); }
                timer.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const pCanvas = document.createElement('canvas');
                pCanvas.width = video.videoWidth;
                pCanvas.height = video.videoHeight;
                const pCtx = pCanvas.getContext('2d');
                pCtx.filter = filterStyle;
                pCtx.translate(pCanvas.width, 0); pCtx.scale(-1, 1);
                pCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
                
                pics.push(pCanvas);
                if(i < photoCount - 1) await new Promise(r => setTimeout(r, 1000));
            }
            
            if (currentMode === 'news') buildNewspaper(pics[0]);
            else buildReceipt(pics);
        }

        function buildReceipt(pics) {
    // ตั้งค่าขนาดใบเสร็จ
    canvas.width = 600;
    canvas.height = 1520;

    // 1. วาดพื้นหลังกระดาษใบเสร็จ (ขาวนวล)
    ctx.fillStyle = "#fdfaf5";
    ctx.fillRect(0, 0, 600, 1520);

    // 2. ตั้งค่า Font และวาด Header
    ctx.fillStyle = "#111";
    ctx.textAlign = "center";
    ctx.font = "bold 90px 'VT323'";
    ctx.fillText("Jarawee Booth", 300, 115);
    ctx.font = "24px 'Sarabun'";
    ctx.fillText("Thank you for being together", 300, 165);
    ctx.font = "30px 'VT323'";
    ctx.fillText("---------------------------", 300, 210);

    // 3. วาดรูปถ่าย (ส่วนที่แก้ไขให้ภาพฟิตพอดีขอบ)
    pics.forEach((p, idx) => {
        const y = 280 + (idx * 480); 
        const targetSize = 440; // ขนาดช่องสี่เหลี่ยม

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = targetSize;
        tempCanvas.height = targetSize;
        const tempCtx = tempCanvas.getContext('2d');

        // โทนขาวดำอมน้ำตาล
        tempCtx.filter = 'grayscale(1) sepia(0.2) contrast(1.2) brightness(0.9)';

        // --- สูตรคำนวณให้ภาพฟิตพอดีขอบ (Center Crop) ---
        const targetRatio = 1; 
        const picRatio = p.width / p.height;
        let sw, sh, sx, sy;

        if (picRatio > targetRatio) {
            sh = p.height;
            sw = p.height * targetRatio;
            sx = (p.width - sw) / 2;
            sy = 0;
        } else {
            sw = p.width;
            sh = p.width / targetRatio;
            sx = 0;
            sy = (p.height - sh) / 2;
        }

        // วาดภาพที่คำนวณแล้วลง tempCanvas
        tempCtx.drawImage(p, sx, sy, sw, sh, 0, 0, targetSize, targetSize);

        // วาดลงใบเสร็จจริง
        ctx.drawImage(tempCanvas, 80, y, targetSize, targetSize);

        // วาดเส้นขอบรูป
        ctx.strokeStyle = "#222";
        ctx.lineWidth = 2;
        ctx.strokeRect(80, y, targetSize, targetSize);
    });

    // 4. วาด Footer ท้ายใบเสร็จ
    const footerY = 1320;
    ctx.font = "30px 'VT323'";
    ctx.fillText("---------------------------", 300, footerY);
    ctx.font = "22px 'Sarabun'";
    ctx.fillText("MEMORIES WITH YOU", 300, footerY + 50);
    const now = new Date();
    ctx.font = "18px 'VT323'";
    ctx.fillText(now.toLocaleString(), 300, footerY + 90);

    renderFinal();
}

        function buildNewspaper(pic) {
    if (newsFrame.complete && newsFrame.naturalWidth !== 0) {
        canvas.width = newsFrame.naturalWidth;
        canvas.height = newsFrame.naturalHeight;
    }

    // --- [ ส่วนที่ปรับให้ "ซูมเข้า" และ "ฟิตเฟรม" ] ---
    // ขยายขนาดภาพให้ใหญ่ขึ้น (จาก 0.45 เป็น 0.55) เพื่อให้ดูซูมเข้าและเต็มช่อง
    const photoW = canvas.width * 0.55; 
    const photoH = photoW * (9/16); 
    const photoX = (canvas.width - photoW) / 2; 
    // ปรับพิกัด Y ให้ภาพขึ้นไปอยู่ในกรอบ (ลองปรับเลข 0.28 ถ้ายังไม่กลาง)
    const photoY = canvas.height * 0.28; 

    // 1. วาดพื้นหลังกระดาษ
    ctx.fillStyle = "#e3dccb"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = photoW;
    tempCanvas.height = photoH;
    const tempCtx = tempCanvas.getContext('2d');
    
    // --- [ สูตรสีน้ำตาลไหม้: Burnt Brown Filter ] ---
    // ลดความสว่าง (brightness) เหลือ 0.65 เพื่อให้ดูไหม้เข้มๆ
    // เร่งความอิ่มตัวสี (saturate) เป็น 1.8 ให้สีน้ำตาลชัดเจน
    tempCtx.filter = 'sepia(1) saturate(1.8) contrast(1.3) brightness(0.65) grayscale(0.1)';

    // Center Crop: ตัดส่วนกลางภาพมาขยายให้เต็ม (ทำให้ภาพดูซูมและไม่เหลือขอบดำ)
    const targetRatio = photoW / photoH;
    const picRatio = pic.width / pic.height;
    let sw, sh, sx, sy;
    
    if (picRatio > targetRatio) {
        sh = pic.height;
        sw = pic.height * targetRatio;
        sx = (pic.width - sw) / 2;
        sy = 0;
    } else {
        sw = pic.width;
        sh = pic.width / targetRatio;
        sx = 0;
        sy = (pic.height - sh) / 2;
    }

    // วาดรูปที่ตัดแล้วลงในพื้นที่ที่เตรียมไว้
    tempCtx.drawImage(pic, sx, sy, sw, sh, 0, 0, photoW, photoH);
    ctx.drawImage(tempCanvas, photoX, photoY, photoW, photoH);

    // 2. วาดเฟรมหนังสือพิมพ์ทับ (Layer บนสุด)
    if (newsFrame.complete) {
        ctx.drawImage(newsFrame, 0, 0, canvas.width, canvas.height);
    }
    
    renderFinal();
}
        function renderFinal() {
            canvas.toBlob(blob => {
                finalBlob = blob; resultImg.src = URL.createObjectURL(blob);
                document.getElementById('camera-ui').style.display = 'none';
                printPage.style.display = 'block';
                setTimeout(() => { printCont.classList.add('flow-animation'); }, 500);
                setTimeout(() => { finalActions.style.display = 'block'; }, 6500);
            }, 'image/png');
        }

        async function saveImage() {
            if (!finalBlob) return;
            const link = document.createElement('a');
            link.download = (currentMode === 'news') ? 'jarawee_newspaper.png' : 'jarawee_receipt.png';
            link.href = resultImg.src;
            link.click();
        }
    </script>
</body>
</html>
