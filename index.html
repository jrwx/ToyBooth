<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarawee Digital Cam Booth</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; font-family: 'Sarabun', sans-serif; text-align: center; margin: 0; padding: 10px 0; color: #eee; overflow-x: hidden; }
        
        /* ตัวเครื่อง Booth ออกแบบให้ดูเป็นโลหะมากขึ้น */
        #booth-machine { position: relative; width: 340px; margin: 20px auto; background: #333; padding: 12px; border-radius: 15px; border: 4px solid #555; box-shadow: 0 30px 60px rgba(0,0,0,0.8); z-index: 10; overflow: hidden; }
        
        /* จอ Digital Camera UI */
        #main-display { position: relative; width: 310px; height: 310px; margin: 0 auto; background: #000; overflow: hidden; border: 2px solid #000; box-shadow: inset 0 0 10px rgba(0,0,0,1); }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Camera UI Overlays */
        #camera-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; font-family: 'VT323', monospace; color: #fff; text-shadow: 1px 1px 2px #000; }
        .cam-top-left { position: absolute; top: 10px; left: 10px; display: flex; align-items: center; gap: 5px; }
        .cam-top-right { position: absolute; top: 10px; right: 10px; color: #f00; animation: blink 1s infinite; }
        .cam-bottom-left { position: absolute; bottom: 10px; left: 10px; }
        .cam-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0.5px solid rgba(255,255,255,0.1); display: grid; grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; }
        .cam-grid div { border: 0.5px solid rgba(255,255,255,0.1); }
        .focus-bracket { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid #0f0; opacity: 0.7; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #shutter-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 30; pointer-events: none; }
        
        /* นับถอยหลัง */
        .timer-overlay { font-family: 'Press Start 2P', cursive; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; z-index: 35; text-align: center; width: 100%; pointer-events: none; }
        #timer-num { font-size: 60px; display: none; }

        /* การไหลของใบเสร็จแบบสมจริง */
        #print-output { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; z-index: 40; background: #000; overflow-y: auto; scrollbar-width: none; }
        .receipt-paper { position: relative; width: 260px; background: #fdfaf5; box-shadow: 0 0 25px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.05); transform: translateY(-100%); margin-bottom: 60px; }
        .printing-act { animation: slideOutSmooth 6.5s linear forwards; }
        
        @keyframes slideOutSmooth { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(0); } 
        }

        #result-img { width: 100%; display: block; filter: contrast(1.1) brightness(1.05); mix-blend-mode: multiply; }
        .torn-edge { position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; background: #000; clip-path: polygon(0% 100%, 5% 15%, 10% 100%, 15% 20%, 20% 100%, 25% 15%, 30% 100%, 35% 25%, 40% 100%, 45% 15%, 50% 100%, 55% 20%, 60% 100%, 65% 15%, 70% 100%, 75% 25%, 80% 100%, 85% 15%, 90% 100%, 95% 20%, 100% 100%); }

        /* ปุ่มและ Filter */
        .filter-nav { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .f-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px; font-size: 9px; cursor: pointer; font-family: 'Press Start 2P', cursive; border-radius: 8px; }
        .f-btn.active { background: #fff; color: #000; }
        
        .btn-main { background: #ff3e3e; color: #fff; padding: 20px; font-family: 'Press Start 2P', cursive; font-size: 11px; border: none; margin-top: 15px; width: 85%; cursor: pointer; border-radius: 12px; box-shadow: 0 6px 0 #b32a2a; transition: 0.1s; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #b32a2a; }
        
        #action-buttons { display: none; margin-top: 25px; padding-bottom: 120px; }
    </style>
</head>
<body>

    <div style="font-family: 'VT323', monospace; font-size: 32px; margin-top: 20px; color: #fff; letter-spacing: 4px;">DIGITAL CAM PHOTO BOOTH</div>

    <div id="booth-machine">
        <div id="main-display">
            <div id="camera-view">
                <div id="camera-ui">
                    <div class="cam-top-left"><span>[🔋]</span><span>FULL</span></div>
                    <div class="cam-top-right">● REC</div>
                    <div class="cam-grid"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
                    <div class="focus-bracket"></div>
                    <div class="cam-bottom-left">ISO 400 | F2.8</div>
                </div>
                <div id="shutter-flash"></div>
                <video id="video" autoplay playsinline muted></video>
            </div>
            
            <div id="print-output">
                <div class="receipt-paper" id="receipt-paper">
                    <img id="result-img">
                    <div class="torn-edge"></div>
                </div>
            </div>

            <div class="timer-overlay"><div id="timer-num">3</div></div>
        </div>
    </div>

    <div class="filter-nav" id="filter-box">
        <button class="f-btn active" onclick="updateFilter('none', this)">STANDARD</button>
        <button class="f-btn" onclick="updateFilter('bw', this)">B&W</button>
        <button class="f-btn" onclick="updateFilter('vintage', this)">Y2K</button>
    </div>
    
    <button class="btn-main" id="btn-snap" onclick="startCapture()">[ SHOT ]</button>

    <div id="action-buttons">
        <button class="btn-main" style="background:#444; box-shadow: 0 6px 0 #222;" onclick="sharePhoto()">SAVE RECEIPT</button>
        <br>
        <button class="btn-main" style="background:#222; box-shadow: 0 6px 0 #000;" onclick="resetBooth()">RETAKE</button>
    </div>

    <canvas id="c" width="600" height="1520" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('video');
        const flash = document.getElementById('shutter-flash');
        const tNum = document.getElementById('timer-num');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const printOutput = document.getElementById('print-output');
        const receiptPaper = document.getElementById('receipt-paper');
        const actionButtons = document.getElementById('action-buttons');
        
        let currentBlob = null;
        let currentFilterStyle = 'none';
        let stream = null;

        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = stream;
            } catch (e) { alert("เปิดกล้องไม่ได้จ้า!"); }
        }
        init();

        function updateFilter(mode, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let fs = 'none';
            if(mode === 'bw') fs = 'grayscale(1) contrast(1.3) brightness(1.1)';
            else if(mode === 'vintage') fs = 'sepia(0.5) saturate(1.4) contrast(1.1)';
            v.style.filter = fs;
            currentFilterStyle = fs;
        }

        async function startCapture() {
            const photos = [];
            document.getElementById('btn-snap').style.display = 'none';
            document.getElementById('filter-box').style.opacity = '0';

            for (let i = 0; i < 2; i++) {
                tNum.style.display = 'block';
                for (let j = 3; j > 0; j--) { tNum.innerText = j; await new Promise(r => setTimeout(r, 1000)); }
                tNum.style.display = 'none';
                flash.style.opacity = '1'; setTimeout(() => flash.style.opacity = '0', 100);

                const tmp = document.createElement('canvas');
                tmp.width = 420; tmp.height = 420;
                const tCtx = tmp.getContext('2d');
                tCtx.filter = currentFilterStyle;
                tCtx.translate(420, 0); tCtx.scale(-1, 1);
                const min = Math.min(v.videoWidth, v.videoHeight);
                tCtx.drawImage(v, (v.videoWidth-min)/2, (v.videoHeight-min)/2, min, min, 0, 0, 420, 420);
                
                // Add Thermal Grain
                tCtx.globalCompositeOperation = 'source-atop';
                tCtx.fillStyle = 'rgba(0,0,0,0.06)';
                for(let y=0; y<420; y+=3) { for(let x=0; x<420; x+=3) { if(Math.random()>0.8) tCtx.fillRect(x,y,1.5,1.5); } }
                tCtx.globalCompositeOperation = 'source-over';
                
                photos.push(tmp);
                if(i === 0) await new Promise(r => setTimeout(r, 1500)); 
            }
            if(stream) stream.getTracks().forEach(track => track.stop());
            generateFinalReceipt(photos);
        }

        function generateFinalReceipt(photos) {
            const orderNo = Math.floor(100000 + Math.random() * 900000);
            ctx.fillStyle = "#fdfaf5"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Background Texture
            for(let i=0; i<10000; i++) { ctx.fillStyle = `rgba(0,0,0,0.05)`; ctx.fillRect(Math.random()*600, Math.random()*1520, 1, 1); }

            ctx.fillStyle = "#111"; ctx.textAlign = "center";
            ctx.font = "bold 65px 'VT323'"; ctx.fillText("Congrats!!", 300, 100);
            ctx.font = "30px 'VT323'"; ctx.fillText("To Jarawee <3", 300, 145);
            ctx.font = "20px monospace"; ctx.fillText("------------------------------", 300, 180);

            // Order No ชิดซ้าย
            ctx.textAlign = "left"; 
            ctx.font = "18px 'VT323'"; ctx.fillText("Order No: #" + orderNo, 90, 215);

            photos.forEach((img, i) => {
                const y = (i * 440) + 240;
                ctx.drawImage(img, 90, y, 420, 420);
                ctx.strokeStyle = "#444"; ctx.lineWidth = 1.5; ctx.strokeRect(90, y, 420, 420);
            });

            ctx.textAlign = "left"; 
            ctx.font = "bold 24px Sarabun"; ctx.fillText("รายการ: ค่ารักเอ็ง ฮี่ๆๆ ;-)", 90, 1150);
            
            // Barcode
            ctx.fillStyle = "#111"; const bx = 90; const by = 1220;
            for(let k=0; k<70; k++) { let w = [2, 4, 7][Math.floor(Math.random()*3)]; ctx.fillRect(bx + (k*6), by, w, 80); }
            
            ctx.textAlign = "center"; 
            ctx.font = "bold 28px 'VT323'"; ctx.fillText(new Date().toLocaleString('th-TH'), 300, 1360);
            ctx.font = "18px 'VT323'"; ctx.fillText("*** THANK YOU - POS SERVICE ***", 300, 1410);

            const tornCanvas = document.createElement('canvas');
            tornCanvas.width = canvas.width; tornCanvas.height = canvas.height;
            const tCtx = tornCanvas.getContext('2d');
            tCtx.beginPath(); tCtx.moveTo(0, 0);
            for (let i = 0; i < tornCanvas.width; i += 12) {
                tCtx.lineTo(i + 6, tornCanvas.height - 15);
                tCtx.lineTo(i + 12, tornCanvas.height);
            }
            tCtx.lineTo(tornCanvas.width, tornCanvas.height); tCtx.lineTo(tornCanvas.width, 0);
            tCtx.closePath(); tCtx.clip();
            tCtx.drawImage(canvas, 0, 0);

            tornCanvas.toBlob((b) => {
                currentBlob = b;
                document.getElementById('result-img').src = URL.createObjectURL(b);
                startPrinting();
            }, 'image/png');
        }

        function startPrinting() {
            document.getElementById('camera-view').style.display = 'none';
            printOutput.style.display = 'flex';
            receiptPaper.classList.add('printing-act');
            
            setTimeout(() => { 
                actionButtons.style.display = 'block'; 
                actionButtons.scrollIntoView({ behavior: 'smooth' }); 
            }, 6800);
        }

        function resetBooth() { location.reload(); }

        async function sharePhoto() {
            if (!currentBlob) return;
            const f = new File([currentBlob], "jarawee_y2k.png", {type:"image/png"});
            if (navigator.share) await navigator.share({ files: [f] });
            else { const a = document.createElement('a'); a.href = URL.createObjectURL(currentBlob); a.download = "jarawee_y2k.png"; a.click(); }
        }
    </script>
</body>
</html>
