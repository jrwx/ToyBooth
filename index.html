<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Story Photobooth</title>
    <style>
        body { 
            background-color: #71C5EE; /* สีฟ้าห้อง Andy */
            font-family: 'Arial Rounded MT Bold', sans-serif;
            text-align: center; margin: 0; overflow-x: hidden;
        }
        /* สร้างลายเมฆจำลอง */
        .cloud { background: white; width: 100px; height: 40px; border-radius: 50px; position: absolute; z-index: -1; opacity: 0.8; }
        
        #video { width: 90%; max-width: 400px; border: 8px solid #FFD700; border-radius: 15px; margin-top: 20px; background: #000; }
        
        #result-canvas { display: none; width: 300px; border: 10px solid white; margin: 20px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .timer { font-size: 80px; color: #E63946; -webkit-text-stroke: 2px #FFD700; font-weight: bold; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); display: none; }
        
        .btn-start { 
            background: #FFD700; color: #004AAD; border: 4px solid #004AAD; padding: 15px 40px; 
            font-size: 24px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1 style="color: #004AAD; text-shadow: 2px 2px white;">TOY STORY BOOTH</h1>
    
    <div id="timer" class="timer">3</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="temp-canvas" width="600" height="600" style="display:none;"></canvas>
    
    <br>
    <button class="btn-start" id="startBtn" onclick="startProcess()">เริ่มถ่ายรูป!</button>
    
    <div id="output-area">
        <canvas id="result-canvas"></canvas>
        <p id="instruction" style="display:none; color: #004AAD;"><b>กดค้างที่รูปเพื่อบันทึก แล้วนำไปปริ้นท์ได้เลย!</b></p>
    </div>

    <script>
        const video = document.getElementById('video');
        const timerEl = document.getElementById('timer');
        const resultCanvas = document.getElementById('result-canvas');
        const tempCanvas = document.getElementById('temp-canvas');
        const ctx = tempCanvas.getContext('2d');
        const resCtx = resultCanvas.getContext('2d');

        // ตั้งค่าขนาดรูป 2 ช่อง (กว้าง 600 สูง 1200)
        resultCanvas.width = 600;
        resultCanvas.height = 1250;

        // เปิดกล้อง
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("กรุณากดอนุญาตให้ใช้กล้อง"));

        async function startProcess() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('result-canvas').style.display = 'none';
            
            for (let i = 0; i < 2; i++) {
                // นับถอยหลัง 3 วิ
                timerEl.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timerEl.innerText = j;
                    await new Promise(r => setTimeout(r, 1000));
                }
                timerEl.innerText = "แชะ!";
                
                // ถ่ายภาพลง Canvas ลับ
                ctx.drawImage(video, 0, 0, 600, 600);
                
                // เอารูปไปแปะในหน้าผลลัพธ์ (บน หรือ ล่าง)
                resCtx.drawImage(tempCanvas, 0, i * 625, 600, 600);
                
                await new Promise(r => setTimeout(r, 500));
                timerEl.style.display = 'none';
            }

            // แสดงผลลัพธ์
            document.getElementById('result-canvas').style.display = 'block';
            document.getElementById('instruction').style.display = 'block';
            document.getElementById('startBtn').innerText = "ถ่ายใหม่";
            document.getElementById('startBtn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
